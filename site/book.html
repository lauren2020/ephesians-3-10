us, God’s rationale or motivation for Creation cannot result from a sequential cause-and-effect. But the Genesis account reveals that everything was created as a sequential cause-and-effect event that occurs in time-and-space.", "Thus, God’s rationale for creating must be described metaphorically simply because humans cannot conceive anything that exists outside the sequential cause- and-effect of our time-and-space dimension. For example, the literature of Revelations 4 uses metaphor to describe Heavenly construction materials that simply don’t exist in time-and-space. Things that are indescribable can only be described metaphorically.", "Revelation 13:8 uses metaphor to describe those “whose names are not written in the Book of Life of the Lamb slain from the foundation of the world.” The metaphor is written in the past tense for us humans even though there is neither past tense nor future tense where “I AM” resides.", "The literature of Isaiah 6 describes “seraphim crying unto each other, and saying, Holy, Holy, Holy is the LORD of hosts. The whole earth is full of His Glory” That obviously describes a future time-and-space testimony because the “I AM” has always been “Holy” but “seraphim” have just discovered that “The whole earth is full of His Glory.”", "Nevertheless, Isaiah 6 describes a real event. Revelation 4:8 describes a similar event except “the seraphim” are described metaphorically as “four beasts.” Each of these descriptions uses metaphor to describe a sequential cause-and-effect event that occurred in a dimension that has no sequential cause-and-effect.", "The events are real but each description is metaphorical for the benefit of time- and-space residents whose perception is restricted to observing only sequential cause-and-effect events.", "The “I AM” simultaneously observes “the beginning and the ending” of every sequential event that has ever occurred or will occur in time-and-space. More to the point of this chapter, it seems “the principalities and powers” who reside with God “in heavenly places” have that same capability.", "If that is true then “The principalities and powers” can observe finished events that time-and-space humans think haven’t happened yet.", "For example, “The principalities and powers” viewed the “ransom atonement” being paid by “the Lamb slain from the foundation of the world.” By contrast, time-and-space humans think the “atonement” wasn’t paid until about 2000 time-and-space years ago. “The principalities and powers” have similarly already viewed “The Day of the Lord” (2Pet 3:10) even though time-and-space humans think “The Day of the Lord” is yet future.", "The omnipotent “I AM” could have instantly spoken creation into existence within His own Heavenly dimension. But He didn’t. The “I AM” personally describes His effort as a deliberate dragging out of creation over six sequential days of time-and-space cause-and-effect.", "Why did God take six days to do that which He could have done instantaneously? I am not theologically trained so I am not credentialed to offer a theologically correct answer. Nevertheless, I observe the question “Why did God take six days to create” is typically ignored by Biblically trained theologians. But I suggest answering that question is critical to understanding God’s Purpose for all His creative effort.", "Humans are restricted from viewing either the beginning or the end of time-and- space. However, “the principalities and powers in heavenly places” have already observed both the creation and the final destruction of time-and-space.", "Time-and-space Humans observe everything sequentially but “the principalities and powers” have already observed the destruction of creation (2Pet 3:10) as well as observed “the new Jerusalem” (Rev 3:12, 21:2.) Thus, the “principalities and powers” have already viewed the beginning and end of God’s temporary time-and-space case-study. The “I AM” who resides in “the heavenlies” has already accomplished everything He intended to demonstrate by creating a temporary and disposable environment populated with temporary and disposable humans. Please pause reading to meditate on the limitations and restrictions of a temporary and disposable time-and-space environment. The Heavenly perspective of our time-and-space bubble can only begin to be understood after extensive meditation about predicted events that living humans are incapable of either “understanding” or experiencing.", "The purpose for God’s creative effort", "Ephesians 3:10 reveals the “I AM’s” Purpose-For-Creation (i.e., “to the intent that…”). The “I AM” has created sequentially executed events. Thus, the Ephesians context requires lengthy meditation. It requires “trust in the Lord with all your heart and He will direct your path.”", "The analysis in this book is my inadequate and fallible attempt to describe God’s elaborately complicated Purpose that He planned in a dimension that exists outside our created dimension of time-and-space.", "Each sequential step of God’s time-and-space creation as well as everything that has happened after creation was planned and executed (i.e., “predestined”) “by the determinate counsel and foreknowledge of God” (Acts 2:23).", "I admit I was never taught this concept during the first half of my life. Thus, I never taught this concept to my children. The generations of my family have historically been God-believers and we have always claimed to trust God but none of us has ever heard this concept taught by the preachers in the churches we attend. This conceptual explanation of Creation has always been a “hidden mystery” within our religious communities.", "However, God has allowed me to read the literature of Ephesians 3:2-10 without “leaning unto my own understanding.” Thus, I was forced to humbly admit that nothing was created for the benefit of us humans. The preamble to God’s Purpose Statement is recorded in Ephesians 3:2-9 “How that by revelation he made known unto me the mystery; (as I wrote afore in few words, Whereby, when ye read, ye may understand my knowledge in the mystery of Christ) which in other ages was not made known unto the sons of men, as it is now revealed unto his holy apostles and prophets by the Spirit; That the Gentiles should be fellow-heirs, and of the same body, and partakers of his promise in Christ by the gospel: Whereof I was made a minister, according to the gift of the grace of God given unto me by the effectual working of his power. Unto me, who am less than the least of all saints, is this grace given, that I should preach among the Gentiles the unsearchable riches of Christ; And to make all men see what is the fellowship of the mystery, which from the beginning of the world hath been hid in God, who created all things by Jesus Christ.” Verse 10 reveals “To the intent that now unto the principalities and powers in heavenly places might be known by the church the manifold wisdom of God.” Thus, everything was created for the benefit of “the principalities and powers” and nothing was created for the benefit of us temporary and disposable humans.", "Hebrews 9:27 reveals “it is appointed unto men once to die.” Thus, every human including Adam and Eve was created to die – typically we humans die of old age, however, “the principalities and powers” who reside “in heavenly places” are neither temporary nor disposable like us humans.", "Egotistical humans tend to think creation was for our benefit but the humiliating reality is that humans are merely temporary and disposable tools being used by God to accomplish a temporary time-and-space task for the benefit of “the principalities and powers.” Each temporary and disposable human (i.e., you and me) lives for a moment and then we die.", "The literature of Scripture is replete with reports of entire populations being destroyed by God’s “wrath.” Noah’s Flood is a notable example. Another notable example is God’s command to Joshua to destroy the disposable nations that populated the “Promised Land.” Those disposable nations were destined for destruction due to their corrupt lifestyle of worshipping “Molech” and sacrificing their own babies to that non-existent god. The “good” God of “wrath” righteously planned for their destruction.", "Scripture is clear that “God so loved the world.” But it is also clear that “loving the world” was not a motivating force when temporary and disposable humans like Adam and Eve were judged “thou shalt surely die” even though they had been created and or “born of the flesh” without prior knowledge of either “good or evil.”", "“The principalities and powers” are obviously more important to God than any humans who are created to be temporary and disposable.", "The elimination of temporary and disposable humans who challenge God is an extremely obvious cause-and-effect of God’s Plan. In that regard, Theophilus suggests Luke’s observation of 1st Century Christians challenging “the certainty of those things wherein thou hast been instructed” was also according to God’s Plan. It also describes every instance of modern sectarian conflict.", "Given the obvious reality that humans are temporary and disposable, why would any modern theologian think that God did all this Creation stuff so that temporary and disposable humans could purchase “everlasting life” by simply making a volitional decision to “believe in Him”? It is incredible that egotistical theologians believe disposable humans are precious even though “God is love.” Please affirm that every disposable human is born to be “dead in trespasses and sin” (Eph 2:1) and is incapable of choosing to do anything at all. Humans especially cannot choose to “believe in Him” (John 3:16). That’s the way an omniscient and omnipotent God planned for everything to work.", "Ephesians 3:10 teaches “the principalities and powers” are so important to God that He took 6 days to create an elaborate but disposable world including disposable humans “to the intent that the principalities and powers in heavenly places” could observe “the manifold wisdom of God” as a sequential cause-and-effect activity.", "Human participation in God’s time-and-space case study will eventually be complete. The literature of 2Peter 3:10 predicts “But the day of the Lord will come as a thief in the night; in the which the heavens shall pass away with a great noise, and the elements shall melt with fervent heat, the earth also and the works that are therein shall be burned up.” Peter reports the final step of God’s Plan will be the elimination of God’s entire temporary time-and-space.", "However, eternity continues after time-and-space is eliminated. The elimination of time-and-space is mentioned in a song written by James M. Black “When the trumpet of the Lord shall sound, and time shall be no more … when the roll is called up yonder, I’ll be there.”", "God’s graciousness is displayed by God’s creation", "The literature of Hebrews 9:27 teaches that you and I were each created to be disposable. However, “a few” disposable humans have been graciously “called and elect” to be “born again by the Spirit” (John 3:8) to inherit a new Spiritual DNA of “everlasting life.” Those “few called and elect humans” will escape the elimination of time-and-space into an eternity of “everlasting life.”", "Humans who are “called and elect” will benefit greatly because the “called and elect” are divinely protected from “the judgment” of “a good” God’s “wrath” according to “the manifold wisdom of God.”", "“The manifold wisdom of God” ≡ “the Grace of God.”", "“The many” disposable humans who are not “called and elect” will simply get whatever God created them to get – nothing more and nothing less. Satan and his demons are also disposable and will get exactly what they were created to get. “For God so loved the world” that “the world” will get exactly that which a “good” God planned “before the foundation of the world.” Accordingly, it is absolutely true that “God is good all the time; All the time, God is good.” Who are the principalities and powers", "Those who reside in time-and-space are precluded from knowing “the principalities and powers in the Heavenlies.” Nevertheless, it is clear they are not disposable humans.", "The only information available to time-and-space humans is that “the principalities and powers” reside where God resides. Angels and Seraphim (perhaps even Satan and his evil demons) may be included in “the principalities and powers” but we can’t be sure because God does not say so.", "“The principalities and powers” reside “in the heavenlies” where the sequential cause-and-effect of time-and-space does not exist. Dimensions “in the third Heaven” seem to have some similarity with the created dimension of The Universe but the dimension of “the Heaven and Hell” have always been a “mystery” to time-and-space humans. It is a “mystery” to us simply because we are disposable and don’t need to know all those extraneous details.", "The logical implications of cause-and-effect", "Every event within our created dimension of time-and-space is the outcome of a cause. This is true even when the cause is unknown to us mere humans.", "Nothing happens that was not caused by God. And every cause results in an event. Random events may be allowed by God in some other dimension but random events do not exist within our dimension of time-and-space.", "Randomness does not exist at the sub-atomic level despite the expensive Cyclotron experiments being studied in hope of learning about the Higgs Boson and proving/disproving Heisenberg’s thesis about “The Uncertainty Principle.” Please affirm that an unpredictable sub-atomic event is evidence of scientific ignorance rather than evidence of randomness.", "Neither does randomness exist at higher levels of complexity as proposed by Darwin in his thesis titled “The Origin of Species.”", "Studies of biological mutations may have medical and academic benefits but questioning how life originated is evidence of scientific ignorance rather than evidence of random mutations.", "Scripture suggests every event in time-and-space is caused by a prior event simply because God uses sequential cause-and-effect to demonstrate “the manifold wisdom of God” to “the principalities and powers in the Heavenlies.” The evidence suggests there was no other reason for God’s creative efforts. Cause-and-effect is essential to God’s plan. By contrast, Cyclotron experiments and evolutionary studies are proposed by humanistic scientists to demonstrate the absurdity that disposable humans don’t need an eternal God. Thus, “Professing themselves to be wise, they became fools” (Rom 1:22).", "Wisdom deficient theologians have neither “eyes to see nor ears to hear.” They agree with humanistic scientists by devising doctrine to teach that humans are capable of volitional free will choices despite any “predestined” cause-and-effect established by God. That explains their foolishness.", "For example, typical Christians seem to be aware when a “salvation” event occurs but wisdom deficient humanistic sectarian-created Theophanies of God conflict about the volitional intellectual decisions disposable humans must make to cause a “salvation” event to occur. Sectarian-created Theophanies of God teach the wisdom deficient humanistic doctrine that “salvation” is a volitional free will choice that needs no “predestination” by a sovereign God.", "Despite conflicted theological doctrines manufactured by sectarian-created Theophanies of God, the literature of John 1:3 asserts “All things were made by him and without him was not anything made that was made.” Thus, God’s literature seems to indicate that a Creator God could conceivably have veto authority over everything including “All things” about which sectarians are observed to conflict.", "Yet, the evidence is that God rarely vetoes sectarian conflict. Nor does God immediately veto debates about “the certainty of” God’s Words. It seems the human sin of questioning “the certainty of” God’s Words as well as all other human sin was planned by “the determinate counsel and foreknowledge of God.”", "There is nothing that characterizes the time-and-space Christian religion more than religious conflict. Every sectarian segment of that which egotistical theologians assume to be God’s Universal Church is characterized by conflict with rival egotistical sectarians.", "It seems that God planned sectarian conflict to demonstrate “the manifold wisdom of God” to “the principalities and powers” using the cause-and-effect example of local churches being populated by “predestined called and elect” God-believers who sit next to those who were deliberately created to be egotistically conflicted sectarians.", "It is intuitively obvious that not every member of a local church is also a member of God’s Universal Church.", "Nevertheless, God graciously “calls and elects a few” out of our sectarian churches to be included within God’s Universal Church despite the obvious universal conflict between sectarian rivals. The obvious implications of sectarian conflict", "Theologically created sectarian Theophanies of God are observed teaching that a sovereign God effectively cancels His own sovereign control of cause-and-effect by allowing humans to volitionally cause the population of God’s Heaven to be expanded (i.e., salvation is volitionally acquired). Some of those same sectarian Theophanies of God extend the contradiction by teaching Heaven’s population can be volitionally reduced (i.e., salvation can be lost).", "Those kinds of Biblical interpretations are effectively the Magna Carta of sectarianism – sectarians declare themselves to be free from God’s sovereign control just as the Magna Carta stripped governing control from British monarchs.", "True-sovereigns control everything. By contrast, very little is controlled by pseudo-sovereigns. For example, Queen Elizabeth II of England was a pseudo- sovereign who controlled virtually nothing. She couldn’t even control her own family much less control the British Empire.", "British royalty is merely a figurehead supported by taxation without representation. As I am writing this paragraph, some tax-supported British royalty (i.e., Harry and Megan) don’t even reside on British soil.", "Sovereign control by a British Monarch was stripped by the Magna Carta in 1215. Since then, all decisions have been made by Parliamentary peers.", "The common theological concept of Partial-Sovereign-Control is a logical absurdity yet some sectarian-created Theophanies of God attempt to teach that absurdity as if it is their Magna Carta from God’s sovereignty.", "Theologians who teach that absurdity are frequently observed contradicting themselves by teaching that God’s Words are preeminent to all other words just as British citizens typically believe the nonsense that they are governed by British Royalty.", "Scholars are aware dictionaries define “Sovereign” as “a supreme ruler, especially a monarch” but sectarian theologians inexplicably redefine that definition to limit God’s sovereign control of time-and-space.", "The literature of Deuteronomy 4:2 and Revelation 22:18-19 seems to teach it is sin to redefine the meaning of any of God’s preeminent Words. If those verses apply to all of Scripture, then pulpit attempts to explain (i.e., “understand”) Scripture must be done carefully and respectfully to ensure correctness. The risk of incorrect clarification is eternal damnation and yet sectarian clarifications are famous for conflicting with rival sectarian clarifications. Sectarian preachers always conflict with rival preachers. Both sides of that conflict also conflict with God’s Words. Theologians who matriculated at an academically deficient Bible school may be humanly excused for preaching nonsense. But why would an educated theologian claim authorization to clarify (i.e., mutilate) the immutable Words omnisciently inspired by a sovereign God? That kind of educated thinking is the antithesis of “Trusting the LORD with all thine heart.”", "Every theologically motivated clarification of Scripture is an opinionated mutilation of a preeminent text which had been sovereignly inspired by God to be both immutable and inerrant.", "Imagine the effect on theological conflict if egotistical theologians would humbly and respectfully pray to a sovereign God to request an explanation of their questions about the meaning of His inspired Words.", "Think about how the Christian life would appear if Christians would humbly relinquish the absurdity that sectarian theologians control the meaning of God’s Words. Think how the Christian life would appear if Christians would humbly pray “not my will but thine be done”?", "“Theological-Interpretation” is the cause and “Pulpit-Conflict” is the effect when egotistical theologians usurp control from a sovereign God by choosing to “lean unto their own understanding” rather than humbly and respectfully “trust in the Lord with all their hearts.”", "Following is a list of questions intended to demonstrate the futility of theologically sectarian interpretations", "• Why did an God create Adam even though He omnisciently knew they would", "sin?", "• Why does God tell us that Cain martyred Abel?", "• Why does God tell us about “The Flood”?", "• Why does God reveal the gross disobedience of “God’s Chosen People”?", "• Why does God tell us about “His only begotten Son” being crucified?", "• Why doesn’t God just “forgive” us and then declare “it is finished”?", "• If God “is not willing that any should perish” then why does everyone perish?", "Answers are de facto when God’s Purpose is recognized.", "My credentials to summarize God’s plan", "You don’t need a theological education to analyze the Literature of Scripture. Anyone who can read is credentialed to analyze the Literature of Scripture.", "I was taught to read as an adolescent in the early grades of elementary school. Therefore, I have those credentials. You are reading this book so it is obvious you also have those credentials. My summary of the Literature of God’s plan is in the next chapter titled “The conclusion of this book.” Please read that chapter to see if my summary agrees with your summary."]}, {"n": 13, "title": "The conclusion of this book", "paras": ["No one cannot improve on the wise conclusion God inspired to be written by Solomon. Solomon records that inspired conclusion in the form of a “command” in Proverbs 3:5-8", "Trust in the LORD with all thine heart; and lean not unto thine own", "understanding. In all thy ways acknowledge him, and he shall direct thy paths. Be", "not wise in thine own eyes: fear the LORD and depart from evil. It shall be health to", "thy navel, and marrow to thy bones.", "During the first half of my life, I was taught that the Proverbs are merely suggestions about that which God believers ought to obey. That kind of interpretation was also taught to apply to Proverbs 22:6 “Train up a child in the way he should go: and when he is old, he will not depart from it.” Parents of unruly children frequently claim they have done all they could do to “Train up their unruly child in the way he should go.” However, that is an appeal to nonsense because even the best parents can always do a better job.", "But my observation of the evidence is that sectarian Christians who teach that the Proverbs are merely generalities rather than guaranteed outcomes are frequently the same Christians who have children who have in some sense “departed from God’s Truth.” It is common for those who have wayward children to claim that they have done everything they can be expected to do but their free-willed children have somehow disobeyed despite their parents’ very best effort to train their wayward children.", "It is common for guilty humans to want to blame someone or something other than themselves. That is exactly what Adam and Eve did when confronted by God in Genesis 3:19-13", "And the LORD God called unto Adam, and said unto him, Where art thou? And", "Adam said, I heard thy voice in the garden, and I was afraid, because I was naked;", "and I hid myself. And the LORD God asked, who told thee that thou wast naked?", "Hast thou eaten of the tree, whereof I commanded thee that thou shouldest not eat?", "And Adam said, the woman whom thou gavest to be with me, she gave me of the", "tree, and I did eat. And the LORD God asked the woman, what is this that thou hast", "done? And Eve said, the serpent beguiled me, and I did eat. Modern sectarians emulate Adam and Eve’s technique for “passing the buck” when they teach the nonsense that Satan was an effective force who prevailed against God by causing Eve to commit sin.", "However, if Satan is capable to prevail against God at the beginning of time, then it would be utter nonsense to believe God can prevail against Satan at the end of time. And yet that is exactly what many wisdom-deficient Bible scholars seem to believe and teach.", "What is your own interpretation of the importance of the 1st half of Proverbs 3:5 that states “Trust in the LORD with all thine heart.” Do you think that statement is literally God’s command or is it God’s suggestion? I ask the same question about the 2nd half of Proverbs 3:5 that commands “Lean NOT unto your own understanding.”", "As of AD60 the epistle to the Ephesians has informed modern humans about why God created anything. That information is written “to the intent that now unto the principalities and powers in heavenly places might be known BY THE CHURCH the manifold wisdom of God” (Eph 3:10). Accordingly, every pulpit message must recognize that every CHURCH is nothing more than a gathering of humans who are metaphorically identified as being either “tares or wheat.” And every “pastor teacher” who offers “dead tares” the option of choosing to no longer be “dead” by simply “believeth in Him” is guilty of a wisdom deficient “leaning unto his own understanding” rather than “trusting the LORD with all his heart.”", "The conclusion from reading this book is the responsibility of each reader no matter how sincerely you address Jesus as LORD and no matter how sincerely you claim the accuracy of your conflicted belief system. A sovereign and omniscient God has “predestined” everything to happen the way God wants it to happen.", "Do you really think God want you to read and trust the published commentaries and study helps written by Bible scholars who conflict with rival Bible scholars who also publish commentaries and study helps?", "Does your preferred “pastor teacher” “Trust in the LORD with all his heart?” or does your preferred “pastor teacher” “lean to his own conflicted understanding” about that which sectarian approved commentaries and study helps say?"]}]</script>

<div id="stage" class="stage" hidden>
  <button id="prev" class="flip-arrow flip-prev" aria-label="Previous page">&lsaquo;</button>
  <div id="book" class="flipbook"></div>
  <button id="next" class="flip-arrow flip-next" aria-label="Next page">&rsaquo;</button>
</div>
<div id="resume" class="resume-bar" hidden></div>
<div id="flip-foot" class="flip-foot" hidden>
  <button id="bookmark-btn" class="bk-mark-btn" title="Bookmark this page">&#x2691;&nbsp;<span>Bookmark</span></button>
  <span id="pagelabel"></span>
  <span class="flip-hint">click a page edge, drag a corner, or use &larr; &rarr;</span>
</div>

<script>
const BOOK = JSON.parse(document.getElementById('bookdata').textContent);
const TITLE = "Christian Preaching That Devalues Scripture";
const AUTHOR = "Theophilus";

function calcSize(){
  const vw = innerWidth, vh = innerHeight;
  const portrait = vw < 860;
  // base page height on the space actually left between the top bar and footer
  const bar = document.querySelector('.topbar');
  const barH = bar ? bar.offsetHeight : 56;
  const footH = 46;
  const avail = vh - barH - footH - 24;     // 24 = stage padding/breathing room
  let h = Math.min(avail, 820);
  h = Math.max(h, 320);
  let w = Math.round(h / 1.5);
  const maxW = portrait ? (vw - 36) : (vw - 130) / 2;
  if (w > maxW) { w = Math.floor(maxW); h = Math.round(w * 1.5); }
  return { w, h, portrait };
}

let pageFlip = null;

function buildPageEl(inner, cls){
  const d = document.createElement('div');
  d.className = 'page ' + (cls || '');
  d.innerHTML = '<div class="page-content">' + inner + '</div>';
  return d;
}

function paginate(size){
  // offscreen measurer matching the real page content box
  const m = document.createElement('div');
  m.className = 'page-content measurer';
  m.style.width = size.w + 'px';
  document.body.appendChild(m);
  const padY = 0; // padding already in CSS .page-content
  const limit = size.h; // content box height target
  // measurer has same padding; compare scrollHeight to page height
  m.style.height = 'auto';

  const pages = [];     // array of html strings (content only)
  let curHTML = '';
  const fits = () => m.scrollHeight <= size.h;

  function flush(){ if (curHTML.trim()) { pages.push(curHTML); curHTML = ''; m.innerHTML=''; } }
  function tryBlock(htmlStr){
    const prev = curHTML;
    m.innerHTML = curHTML + htmlStr;
    if (fits()) { curHTML += htmlStr; return true; }
    // does not fit
    if (!prev.trim()){ // empty page but block too big -> must split (paragraph)
      return splitParagraph(htmlStr);
    }
    m.innerHTML = prev; // revert
    flush();
    // retry on fresh page
    m.innerHTML = htmlStr;
    if (fits()) { curHTML = htmlStr; return true; }
    return splitParagraph(htmlStr);
  }
  function splitParagraph(htmlStr){
    // htmlStr is a <p ...>....</p>; split text by words
    const mo = htmlStr.match(/^(<p[^>]*>)([\s\S]*)(<\/p>)$/);
    if (!mo){ curHTML += htmlStr; return true; }
    const open = mo[1], close = mo[3];
    const words = mo[2].split(' ');
    let lo = '';
    for (let i=0;i<words.length;i++){
      const test = (lo ? lo+' ' : '') + words[i];
      m.innerHTML = curHTML + open + test + close;
      if (fits()){ lo = test; }
      else {
        if (!lo){ // single word too big, force it
          curHTML += open + words[i] + close; flush();
          return splitParagraph(open + words.slice(i+1).join(' ') + close);
        }
        curHTML += open + lo + close; flush();
        return splitParagraph(open + words.slice(i).join(' ') + close);
      }
    }
    curHTML += open + lo + close;
    return true;
  }

  // cover page
  const tocLis = BOOK.map(c => '<li><span>'+c.n+'</span>'+c.title+'</li>').join('');
  pages.push('<div class="cover-face"><p class="bk-kicker">An essay in '+BOOK.length+' chapters</p>'
    + '<h1 class="bk-title">'+TITLE+'</h1><p class="bk-author">'+AUTHOR+'</p>'
    + '<ol class="bk-toc">'+tocLis+'</ol></div>');

  // chapters
  let PID = 0;
  for (const ch of BOOK){
    flush(); // each chapter starts on a fresh leaf
    const headHTML = '<div class="bk-chaphead"><p class="bk-chapnum">Chapter '+ch.n
      + '</p><h2 class="bk-chaptitle">'+ch.title+'</h2></div>';
    m.innerHTML = headHTML; curHTML = headHTML;
    let CIDX = 0;
    for (const p of ch.paras){
      tryBlock('<p data-pid="'+(PID++)+'" data-chap="'+ch.n+'" data-cidx="'+(CIDX++)+'">'+p+'</p>');
    }
  }
  flush();
  m.remove();
  return pages;
}

function render(){
  const size = calcSize();
  const pages = paginate(size);

  const bookEl = document.getElementById('book');
  bookEl.innerHTML = '';
  // page numbers (skip cover = leaf 0)
  pages.forEach((htmlStr, i) => {
    const isCover = (i === 0);
    const foot = isCover ? '' : '<div class="page-num">'+i+'</div>';
    const run = isCover ? '' : '<div class="run-head">'+TITLE+'</div>';
    const el = buildPageEl(run + htmlStr + foot, isCover ? 'page-cover' : '');
    el.dataset.density = isCover ? 'hard' : 'soft';
    bookEl.appendChild(el);
  });

  if (pageFlip) { try { pageFlip.destroy(); } catch(e){} }
  pageFlip = new St.PageFlip(bookEl, {
    width: size.w, height: size.h,
    size: 'fixed',
    minWidth: 280, maxWidth: 1000, minHeight: 380, maxHeight: 1200,
    usePortrait: size.portrait,
    showCover: true,
    maxShadowOpacity: 0.5,
    flippingTime: 700,
    drawShadow: true,
    mobileScrollSupport: false,
    swipeDistance: 20,
  });
  pageFlip.loadFromHTML(document.querySelectorAll('#book .page'));

  // hyperlink scripture references on the freshly paginated pages
  if (window.linkifyScripture) window.linkifyScripture(document.getElementById('book'));

  const total = pages.length;
  const label = document.getElementById('pagelabel');
  function upd(){
    const idx = pageFlip.getCurrentPageIndex();
    label.textContent = idx === 0 ? 'Cover' : ('Page ' + idx + ' / ' + (total-1));
  }

  // ---------- bookmark + resume (anchored to text, resize-safe) ----------
  const LS_LAST = 'cpds:last', LS_MARK = 'cpds:mark';
  const lsGet = k => { try { return JSON.parse(localStorage.getItem(k) || 'null'); } catch(e) { return null; } };
  const lsSet = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} };
  const lsDel = k => { try { localStorage.removeItem(k); } catch(e) {} };

  const leaves = [...document.querySelectorAll('#book .page')];
  const pidLeaf = new Map();   // paragraph id -> first leaf it appears on
  const leafPid = [];          // first paragraph id on each leaf
  leaves.forEach((el,i) => {
    const ids = [...el.querySelectorAll('[data-pid]')].map(n => +n.dataset.pid);
    leafPid[i] = ids.length ? ids[0] : null;
    ids.forEach(pid => { if (!pidLeaf.has(pid)) pidLeaf.set(pid, i); });
  });
  const sortedPids = [...pidLeaf.keys()].sort((a,b) => a-b);
  function leafForPid(pid){
    if (pid == null) return 1;
    if (pidLeaf.has(pid)) return pidLeaf.get(pid);
    let best = 1;
    for (const p of sortedPids) { if (p <= pid) best = pidLeaf.get(p); else break; }
    return best;
  }
  function currentAnchor(){
    const idx = pageFlip.getCurrentPageIndex();
    let i = idx, pid = null;
    while (i < leaves.length && pid == null) { pid = leafPid[i]; i++; }
    return { pid: pid, page: idx };
  }

  const markBtn = document.getElementById('bookmark-btn');
  function refreshMarkBtn(){
    const mark = lsGet(LS_MARK);
    const idx = pageFlip.getCurrentPageIndex();
    const on = mark && leafForPid(mark.pid) === idx;
    markBtn.classList.toggle('is-marked', !!on);
    markBtn.querySelector('span').textContent = on ? 'Bookmarked' : 'Bookmark';
  }
  markBtn.onclick = () => {
    const mark = lsGet(LS_MARK);
    const idx = pageFlip.getCurrentPageIndex();
    if (mark && leafForPid(mark.pid) === idx) lsDel(LS_MARK);
    else lsSet(LS_MARK, currentAnchor());
    refreshMarkBtn();
  };

  pageFlip.on('flip', () => { upd(); lsSet(LS_LAST, currentAnchor()); refreshMarkBtn(); });
  upd();
  refreshMarkBtn();

  const rb = document.getElementById('resume');
  const hideResume = () => { rb.hidden = true; };
  function jump(pid){ pageFlip.turnToPage(leafForPid(pid)); upd(); refreshMarkBtn(); hideResume(); }

  if (!window.__cpdsBooted) {
    // first load: offer to resume bookmark and/or last position
    window.__cpdsBooted = true;
    const mark = lsGet(LS_MARK), last = lsGet(LS_LAST);
    const offers = [];
    if (mark && mark.pid != null) offers.push({ label: '\u2691 Bookmark · p.' + leafForPid(mark.pid), pid: mark.pid });
    if (last && last.page > 0 && (!mark || leafForPid(last.pid) !== leafForPid(mark.pid)))
      offers.push({ label: 'Continue · p.' + leafForPid(last.pid), pid: last.pid });
    if (offers.length) {
      rb.innerHTML = '';
      const msg = document.createElement('span');
      msg.className = 'resume-msg'; msg.textContent = 'Pick up where you left off:';
      rb.appendChild(msg);
      offers.forEach(o => {
        const btn = document.createElement('button');
        btn.className = 'resume-go'; btn.textContent = o.label;
        btn.onclick = () => jump(o.pid);
        rb.appendChild(btn);
      });
      const x = document.createElement('button');
      x.className = 'resume-x'; x.innerHTML = '&times;'; x.title = 'Dismiss';
      x.onclick = hideResume; rb.appendChild(x);
      rb.hidden = false;
      setTimeout(() => { hideResume(); }, 15000);
    }
  } else {
    // re-render after a resize: silently restore the reader's place
    const last = lsGet(LS_LAST);
    if (last && last.pid != null) { pageFlip.turnToPage(leafForPid(last.pid)); upd(); refreshMarkBtn(); }
  }

  document.getElementById('loader').hidden = true;
  document.getElementById('stage').hidden = false;
  document.getElementById('flip-foot').hidden = false;
}

document.getElementById('next').onclick = () => pageFlip && pageFlip.flipNext();
document.getElementById('prev').onclick = () => pageFlip && pageFlip.flipPrev();
document.addEventListener('keydown', e => {
  if (!pageFlip) return;
  if (e.key === 'ArrowRight') pageFlip.flipNext();
  if (e.key === 'ArrowLeft') pageFlip.flipPrev();
});

function safeRender(){
  try { render(); }
  catch (e) {
    console.error(e);
    const l = document.getElementById('loader');
    if (l) { l.hidden = false; l.textContent = 'Sorry — the flip-book could not be laid out. Please reload the page.'; }
  }
}

let rt;
window.addEventListener('resize', () => {
  clearTimeout(rt);
  rt = setTimeout(() => {
    document.getElementById('stage').hidden = true;
    document.getElementById('flip-foot').hidden = true;
    document.getElementById('loader').hidden = false;
    document.getElementById('loader').textContent = 'Setting the type\u2026';
    requestAnimationFrame(safeRender);
  }, 250);
});

// Build once fonts are ready so pagination matches rendered metrics, but never
// wait more than 1.8s — otherwise a slow/blocked font request would hang the loader.
const fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
Promise.race([fontsReady, new Promise(r => setTimeout(r, 1800))])
  .then(() => requestAnimationFrame(safeRender));
</script>
</body></html>
