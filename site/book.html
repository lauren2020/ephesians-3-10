<script type="application/json" id="bookdata">[{"n": 1, "title": "All Bible scholars are wisdom deficient", "paras": ["No one wants to be wisdom deficient but 1 Kings 4:29-34 reports God gifting Solomon with wisdom that exceeds the wisdom of “all men.” God even reports the names of a few wise men who were divinely replaced when God gifted Solomon (see also the web site biblehub.com/q/Why_are_the_men_in_1_Kings_4_31_important.html).", "However, 1 Kings 11 was inspired by God to report the wisest man in the world egotistically abusing God’s gift of wisdom such that the gift of wisdom and the gift of wealth was used sinfully. Solomon finally admitted his sinful ways by the statement “Vanity of vanities, saith the Preacher, all is vanity” (Eccl 1:2ff) and concluding his admission of sin by “Let us hear the conclusion of the whole matter: Fear God and keep his commandments: for this is the whole duty of man. For God shall bring every work into judgment, with every secret thing, whether it be good, or whether it be evil” (Eccl 12:13-14). That seems to be Solomon’s basis for the wise alternative of Proverbs 3:5-6 “Trust in the LORD with all thine heart; and lean not unto thine own understanding.”", "But Solomon’s wise instruction is rejected by wisdom deficient “pastor teachers” who were trained by wisdom deficient Bible school professors to “lean unto thine own sectarian understandings” to hermeneutically manufacture belief systems which enhance God’s inspired Words. It is a “mystery” but God intended for “all men” to be conflicted by creating an environment containing “the god of this world” and “evil” and “death” and then declaring in Genesis 1:31 “behold, it was very good.” God’s Purpose was hidden simply because God believing sectarians would have objected to any Purpose that included the crucifixion of “the LORD of Glory” (1Cor 2:8).", "The reality is that a DNA with a high IQ is distinct from God’s gracious gift of wisdom. For example, a wisdom deficient high IQ “pastor teacher” publicly read 2Peter 1:8 from his pulpit “For if these things be in you, and abound, they make you that ye shall neither be barren nor unfruitful in the knowledge of our Lord Jesus Christ” followed by his wisdom deficient “understanding” that “giving all diligence to believe” is required before God can fulfil the 2Peter 1:4 “promise that by these ye might be partakers of the divine nature, having escaped the corruption that is in the world through lust.”", "That high IQ but wisdom deficient “pastor teacher leans unto his own understanding” to teach that John 3:16 requires “whosoever to believe in Him” before “whosoever” can be “born again of the Spirit” even though John was inspired to report Jesus answering a question by Niccodemus about “entering the second time into his mother’s womb.” Jesus accused Niccodemus of being “a ruler of the Jews” who didn’t know the axiom “that which is born of the Flesh is Flesh, and that which is born of the Spirit is Spirit” (John 3:6). But God’s inspired Words literally teach “whosoever” that “salvation is by grace through faith that is not of your own effort lest whosoever should boast” (Eph 2:8-9). Wisdom deficient “pastor teachers” require “belief in Him” by those who are “Spiritually dead in sin and thus incapable of believing anything.” Wisdom deficient “pastor teachers” proof text John 3:16 to teach that God requires “belief” before a sovereign God can “predestine dead in trespasses and sin” humans to no longer be “dead” by receiving the gift of “everlasting life” as the outcome of being “born again of the Spirit” (John 3:6).", "Miriam-Webster.COM defines “proof text” as “a Scriptural passage adduced as proof for a theological doctrine, belief, or principle.” Thus, that wisdom deficient “pastor teacher” has “adduced a Scriptural passage” to mean something that literally conflicts with the answer by “God’s only beloved Son” to the question asked by “Niccodemus.”", "Wisdom deficient preaching is always “Christian preaching that devalues Scripture.” That’s why the philosophical basis for this book is WHY > WHAT.", "The Christian religion is characterized by sectarian affiliations and denominations which conflict with each of their sectarian rivals. Even so-called “Independent” churches affiliate to conflict with rival “Independent” churches.", "But the mere existence of sectarian conflict forces me to question WHY a sovereign God created anything at all when He omnisciently knew wisdom deficient sectarian Bible scholars were going to “lean unto their own understanding” to persuade church attendees to “trust” a conflicted sectarian belief system “with all their heart” even though ALL sectarian belief systems conflict with rival sectarian belief systems?", "Scripture “commands” us to “not think of ourselves more highly than we ought to think” (Rom 12:3). But every wisdom deficient Bible scholar “thinks” his own “understanding” is superior to the “understanding” of every rival Bible scholar.", "It is axiomatic that knowing WHY anything happens yields more “understanding” than knowing WHAT may have happened. In other words, WHY > WHAT. For example, USA Judges tend to sentence criminals based on WHY a crime was committed despite WHAT crime is being judged. Similarly, wisdom deficient Bible scholars ignore the axiom by “leaning unto their own understanding” about WHAT God really meant to say rather than asking WHY God said anything at all. Bible scholars are observed “Trusting” their own “understandings” about WHAT God inspired to be written even when those “understandings” conflict with the “understandings” of rival Bible scholars.", "Ephesians 4:11 teaches “God gifts pastor teachers to the saints till we all come in the unity of the faith.” However, “church attending saints” have never been “unified” since Acts 9:15 when Saul was divinely appointed as an Apostle “to bear my name before the Gentiles, and kings, and the children of Israel.” 1Corinthians 1:10ff is irrefutable evidence that “church attending saints” have never been “unified in the faith.” It is reality that every conflicted sectarian doctrine was hermeneutically manufactured by wisdom deficient Bible scholars who claim to “Trust in the LORD with all their heart.” That wisdom deficient claim was “predestined” by “the determinant counsel and foreknowledge of God” (Acts 2:23) “from before the foundation of the world” (Rev 13:8). God deliberately hid His Purpose from God believers.", "Conflicted belief systems are taught by sectarian Bible school professors who were not given enough wisdom to recognize their own wisdom deficiency.", "Both “good and evil” Bible scholars are avatars of “The tree of the knowledge of good and evil” (Gen 2:9). God deliberately causes modern Bible scholars to be wisdom deficient just as Adam and Eve were caused to be wisdom deficient.", "It is obvious that only humans are capable of sin. Animals are never accused of sin even when they kill and eat humans. Romans 3:23 teaches “all have sinned and come short of the glory of God.” That verse also describes Adam and Eve. Despite Romans 3:23, modern wisdom deficient Bible scholars teach that Adam and Eve were created to be sinless before Eve was tempted by Satan to sin. In other words, modern wisdom deficient Bible scholars teach the incredible doctrine that an immutable God changed His immutable mind because “the god of this world” whom an immutable God had created had literally obeyed his creator by tempting Eve to sin. That kind of teaching is obviously completely wisdom deficient.", "Some Bible schools deliberately choose to be unaccredited, but accreditation never fixes non-Biblical hermeneutics. Despite accreditation, every Bible school teaches hermeneutical rules which conflict with the hermeneutical rules taught in rival Bible schools. Without exception Bible schools justify their belief systems by hermeneutically “leaning unto sectarian understandings” about WHAT God really meant to say rather than teach WHY an immutable God said anything at all.", "Your own conflicted “understandings” are always “Trusted with all your heart” to be Scripturally correct despite conflicting with all sectarian rivals. Sectarian conflict always indicates an “understanding” which is a hermeneutical interpretation (i.e., an opinion) about WHAT God really meant to say rather than “Trusting” an exposition of WHAT an omniscient God literally inspired to be written.", "Merriam-webster.com defines “hermeneutics” as “the study of the methodological principles of interpretation (as of the Bible).” Without exception your own hermeneutical “understanding” methodically conflicts with rival hermeneutical “understandings.”", "And yet an omniscient God declares that all creation was “very good” exactly as He intended because everything was created to accomplish God’s Purpose-For- Creation. An omniscient God knew exactly what He was doing. An omniscient God deliberately created universal “Wars and rumors of war” (Matt 24:6) . Your own Bible school trained “pastor teacher” has learned a conflicted version of sectarian belief because God intends for all Bible schools to teach proficiency in sectarian (i.e., conflicted) hermeneutics rather than teach proficient methods for “rightly dividing” (2Tim 2:15) the context of WHAT an immutable God literally inspired to be written. Bible schools never major on “the things that thou hast heard of me, the same commit thou to faithful men, who shall be able to teach others also” (2Tim 2:2).", "Even Bible schools that are already famous for promoting an expositional preaching style are observed hermeneutically “understanding” doctrines which conflict with rival Bible school hermeneutical “understandings.” Every hermeneutical “understanding” reflects a sectarian opinion about Scripture.", "The title of this book is Christian preaching that devalues Scripture. The outcome of that kind of preaching is always the establishment and maintenance of conflicted affiliations of sectarian churches. The book title describes reality every time a “pastor teacher” applies a hermeneutically interpreted Biblical proof-text. And yet an omniscient God includes Christian preaching that devalues Scripture when God evaluates everything He has created as being “very good” simply because without exception everything was created exactly as Creator God intended.", "Without exception every theological conflict is the outcome of a wisdom deficient hermeneutical opinion about WHY God created anything. And conflicted opinions (i.e., “understandings”) about WHY God created anything are always derived from a hermeneutical analysis of WHAT God literally said that He did.", "However, the context of Isaiah 48:6 teaches that God’s inspired Words have always been “hidden” from God’s chosen people. Similarly, the inspired context of Ephesians 3:3-9 teaches that God’s Purpose-For-Creation was previously “hidden.”", "Sectarian conflict is proof that God’s Purpose-For-Creation was especially “hidden” from Bible school professors. The alternative to “leaning unto thine own understanding” is always “Trust in the LORD with all thine heart” that an omniscient God literally knew “before the foundation of the world” the reason WHY He created anything at all including the reason WHY an omniscient God “predestined” Adam and Eve to “lustfully sin” (Gen 3:6 and James 1:14-15) so they could be evicted from the Garden.", "It is conceivable that some sectarian opinions approach being consistent with God’s Purpose-For-Creation. However, every “born of the flesh” human (John 3:6) is temporary and disposable being deliberately “appointed once to die, but after this the judgment” (Heb 9:27). Thus, everyone who is “born of the flesh” is eternally precluded from knowing the reason WHY God created anything at all unless an omniscient God deliberately chooses to inform everyone the reason WHY anything was created. WHY God created anything is always more informative than any hermeneutical opinion about WHAT God did or any opinion about WHAT God expects you and me to do. “Leaning unto thine own understanding” is the reason WHY you and I are characterized by sectarian conflict with every rival who claims to be a God believer.", "That conclusion results from observing the Christian religion as a marketing agency for persuading and selling conflicted sectarian belief systems. The philosophical axiom is WHY > WHAT. Please meditate on that philosophical axiom as it applies to your preferred sectarian system of conflicted beliefs.", "Your preferred Bible scholar never cites Scripture to explain WHY a sovereign and omniscient God allows your own sectarian belief system to conflict with rival belief systems. Ephesians 3:3 & 3:9 reports a sovereign God “mysteriously hid” that knowledge from virtually everyone before AD60 when the epistle to the Ephesians was inspired to be written. Nevertheless, each conflicted belief system was included in God’s Genesis 1:31 evaluation that all creation was “very good” exactly as God intended it to be. The reality is that God created sectarian conflict “to the intent that” God’s Purpose-For-Creation will be fulfilled without risking sabotage (1Cor 2:8).", "Some wisdom deficient Bible scholars teach that an immutable God changes His mind after “dead in trespasses and sin humans” have been persuaded to make volitional-free-will decisions to no longer be “dead.” Yet an omniscient God asserts in Genesis 1:31 that every free-will decision made by “dead humans” is “very good” simply because invalid assumptions about volitional-free-will are exactly what God intended when God omnisciently created temporary and disposable humans “who are dead in trespasses and sin” (Eph 2:1).", "I have literally heard wisdom deficient Bible scholars “leaning unto their own understanding” about WHAT God said He did so they could teach that God did everything “for His own Glory.” God’s inspired Words teach that God is Glorious. Nevertheless, Bible scholars ignore Ephesians 4:11ff that God gifts “the saints with pastor teachers till we all come in the unity of the faith.” Every Bible school teaches homiletics that literally prevent “church attending saints from ever being unified.”", "“Trusting in the LORD with all thine heart” will immediately fix the conflict that characterizes your own wisdom deficient sectarian belief system. However, “Trusting in the LORD with all thine heart” is the outcome rather than the reason anyone is “born again of the Spirit.” “Dead in trespasses and sin” humans are “mysteriously called and elect” to salvation (2Pet 1:10). Those names were “written in the Lamb’s book of life before the foundation of the world” (Rev 13:8), (i.e., before believing was possible).", "The fact is that “The Lamb’s book of life” was written “before the foundation of the world.” God DID NOT create anything so that EVERY human could “come in the unity of the faith.” God’s own inspired Words inform us in Isaiah 6:10 and Matthew 13:11ff that NEITHER God NOR Jesus intends for EVERY human to “come in the unity of the faith and the knowledge of the Son of God.” And yet an omniscient God declared in Genesis 1:31 that God’s “command” to Isaiah was “very good” despite God’s “commands” contradicting your own wisdom deficient sectarian opinion.", "The fact that God DOES NOT WANT EVERY human to “come in the unity of the faith” has always been a “mystery” for wisdom deficient “pastor teachers” who have been religiously taught that 2Peter 3:9 is proof-text teaching that God is “not willing that any should perish, but that all should come to repentance.” If a sovereign God really WANTED EVERY human to be saved then that’s exactly the way it would happen.", "However, that incorrect “understanding” of 2Peter 3:9 is literary nonsense simply because wisdom deficient “pastor teachers” are being taught to ignore that 2Peter is written “to them that have obtained like precious faith with us through the righteousness of God and our Saviour Jesus Christ” (2Pet 1:1).", "Peter’s 2nd Epistle literally teaches that God deliberately limits His “faithful promise” of “calling and election” to the “few who enter at the narrow gate” (Matt 7:14) simply because “the Lord is not slack concerning his promise <to the called and elect> as some men such as the Scoffers in 2Peter 3:4 count slackness but is longsuffering to us <who are called and elect>, not willing that any <of us who are called and elect> should perish, but that all <who are called and elect> should come to repentance” (this editing is dependent on the literal context of 2Peter 3:9).", "Incidentally, Matthew 7:13-23 of The Sermon on the Mount reports that “many who address Jesus as LORD” will be told to “depart from me, ye that work iniquity.” The incredible reality is that “many” Bible school trained “pastor teachers” will not be allowed to enter Heaven. That incredible reality contradicts “many wisdom deficient understandings” of that which a sovereign God inspired to be written.", "Those same wisdom deficient Bible scholars incorrectly proof-text John 3:16 to read “For God so loved the world, that he gave his only begotten Son, that <any dead person who has been intellectually persuaded to> believeth in him should not perish but have everlasting life.” That proof-text is literary nonsense simply because every human “dies and perishes” just as an immutable (i.e., unchangeable) God intended when God “predestined Adam and Eve to be sinners” who were both “appointed once to die, but after this the judgment” (Heb 9:27). That reality is specifically and intentionally confirmed in Ephesians 2:8-9 simply because the intellectual “work” of “believing in him” has never saved anyone. Salvation has always been “the gift of God. Not of works, lest any man who is dead in trespasses and sin should boast.” According to merriam-webster.com every “proof-text” is “a Scriptural passage adduced as proof for a theological doctrine, belief, or principle.” Thus, every “proof-text” is merely your own wisdom deficient attempt to “adduce” a hermeneutical “understanding” about that which an immutable God really intended to say if only He had stopped for a moment to think about what He said.", "The Scriptural alternative to every wisdom deficient “proof-text” is to “Trust in the LORD with all thine heart; and lean not unto thine own understanding. In all thy ways acknowledge him, and He shall direct thy paths” (Prov 3:5-6).", "Conflict with rival sectarian opinions is proof that your own wisdom deficient sectarian methods for hermeneutically interpreting (i.e., altering) God’s immutable Words is evidence that you “lean unto your own understanding.”", "Please meditate on the Scriptural command to “lean not unto thine own understanding” (Prov 3:5). Did “the LORD” really inspire Solomon to command every human including both me and you to “lean not unto thine own understanding”?", "The outcome of “rightly dividing the Word of Truth” is never an interpretation of Scripture which conflicts with rival interpretations.", "In the past I interpreted Proverbs 3:5 consistent with sectarian doctrinal beliefs. More recently I was led by God’s Spirit to “Study to shew myself approved unto God, a workman that needeth not to be ashamed, rightly dividing the word of truth” (2Tim 2:15). That kind of study led me to write this book about Christian preaching that devalues Scripture. I finally discovered that thousands of years ago in AD60 God finally inspired His Purpose-For-Creation to be revealed in Ephesians 3:10.", "That “Study” taught me to “Trust in the LORD with all my heart” about the reason WHY God created anything “to the intent that now unto the principalities and powers in heavenly places might be known by the church the manifold wisdom of God” (Eph 3:10).", "Please be aware that Ephesians 3:10 specifically ignores any so-called “Great Commission” for either establishing or maintaining “the church” simply because Jesus said in Matthew 16:18 that “He would build His church and the gates of hell would not prevail against it.” Please affirm that the “Great Commission” at the end of Matthew 28 was specifically directed to only “eleven” disciples so that Jesus could divinely command them to “Teach them to observe all things whatsoever I have commanded you.” Disciples other that the “eleven” were taught only “some things.”", "It ought to be intuitively obvious that Matthew 28 has absolutely nothing to do with either “winning souls” (Prov 11:30) or establishing and maintaining “churches.” So, WHY do wisdom deficient “pastor teachers” teach otherwise? That reality contradicts the belief systems taught in Bible schools. The reality is that God’s Ephesians 3:10 Purpose-For-Creation completely ignores all temporary and disposable “dead in trespasses and sin” humans except as they assemble together into a conflicted sectarian “church” (i.e., an “ἐκκλησία”).", "Some of the “born of the flesh” humans who assemble together into an “ἐκκλησία” were named in “the Lamb’s book of life before the foundation of the world” but the names of “ἐκκλησία” groupies have always been notably missing from “the Lamb’s book of life from the foundation of the world.”", "The remainder of this book is my analysis of God’s Purpose-For-Creation with respect to “the church” which “mysteriously” was not even hinted when “In the beginning God created the heaven and the earth.”", "WHY did God wait until AD60 to inspire the Apostle Paul to write the epistle to the Ephesians that describes God’s purpose for “the church”?", "WHY didn’t God tell everyone about His purpose for “the church” when “in the beginning” God was creating everything including a “sinful” Adam and Eve who volitionally “lusted after” food that was provided by a God who is “good all the time; all the time, God is good”?", "Nevertheless, it is intuitively obvious that God deliberately created temporary and disposable humans to be wisdom deficient. The religious leaders of “God’s chosen people” as well as Satan and his demons were denied knowledge about God’s Purpose-For-Creation because “none of the princes of this world knew: for had they known it, they would not have crucified the Lord of glory” (1Cor 2:8). The “crucifixion of the Lord of glory” had always been God’s Purpose-For-Creation “from before the foundation of the world.”", "The reality is that no one who claims to be “born again of the Spirit” would ever vote to “crucify the Lord of glory.” And yet the crucifixion of “the Lord of glory” is exactly what God intended when He created everything consistent with His Ephesians 3:10 Purpose Statement. That’s the reason WHY an omniscient God had to “hide the mystery” from everyone until after Jesus had been crucified and until after “the church” had been established by the Apostle Paul. Otherwise, “the Lord of glory” would have never been crucified simply because every God believer would have voted against it.", "You and I and every other human who is “born again of the Spirt” (John 3:6) would have sabotaged God’s Purpose-For-Creation by voting against the crucifixion of “the Lord of glory.” Please meditate on that painful reality as you continue reading."]}, {"n": 2, "title": "God planned every step of creation", "paras": ["Genesis 1:1 summarizes God’s creative effort as “In the beginning God created the heaven and the earth.” Creation was completed in six days after which God evaluated all His creative effort in Genesis 1:31 as “behold, it was very good” simply because everything was created exactly as God intended. So “God rested on the seventh day.”", "Bible scholars “lean unto their own wisdom deficient understandings” to manufacture conflicted opinions about the reason why God created anything. But those opinions always conflict with the opinions of rival Bible scholars. Following is an exposition of the inspired account of what God literally created. The Genesis account was inspired by a sovereign God when He omnisciently and immutably created everything ex nihilo (i.e., “out of nothing”). True exposition is always “Trusting the LORD with all your heart.” True exposition is never a conflicted “understanding.”", "Day 1 – Genesis 1:1-5", "The initiation of God’s creative plan", "In the beginning God created the heaven and the earth. And the earth was without", "form, and void; and darkness was upon the face of the deep. And the Spirit of God", "moved upon the face of the waters. And God said, let there be light: and there was", "light. And God saw the light, that it was good: and God divided the light from the", "darkness. And God called the light Day, and the darkness he called Night. And the", "evening and the morning were the first day.", "God initialized Creation to be “without form, and void.” Tangible things are never “without form, and void” and yet in Genesis 1:4 God saw that everything “was good” because being “without form, and void” was exactly what God planned.", "These verses are a summary rather than a detail description as indicated by vague and imprecise Hebrew words. For example, “the first day” of God’s Creation is vague and imprecisely delimited by “evening and morning” even though the Earth, Sun, and Moon do not yet exist.", "Some wisdom deficient Bible scholars “understand” this to imply a prior existence of “the earth.” That “understanding” is often referred to as the so-called “Gap Theory.” Search the web for “Gap Theory” if you are curious about the term. However, the English word “created” was translated from the Hebrew word “‫”בָּ ָּרא‬, Strong’s H1254 defined as “a primitive root; (absolute) to create; (qualified) to cut down (a wood), select, feed (as formative processes) :- choose, create (creator), cut down, dispatch, do, make (fat).” Strong’s Concordance seems to teach that H1254 “absolutely” describes the creation of something that had no prior existence.", "These verses also vaguely and imprecisely summarize that “the Spirit of God moved upon the face of the waters” before “water” or anything else had been created. The reality is that all creation “was without form, and void” prior to “the Spirit of God moving upon the face of the waters.” Thus, the insertion of “light” into a completely “void” container is vague and imprecise just as we may expect from a mere summary.", "The English word “water” was translated from the Hebrew word “‫( ”מַ יִם‬Strong's H4325) defined as “dual of a primitive noun (but used in a singular sense); water; figurative juice; by euphemism urine, semen :- + piss, wasting, water (-ing, [-course, -flood, -spring]).” H4325 normally describes H2O. In that regard, verse six will subsequently describe the division between “the waters which were under the firmament from the waters which were above the firmament.” The “waters” in v6 seem to be literal H2O.", "This translation conundrum regarding “water” suggests the Genesis 1:1-5 summarization uses Strong's H4325 to emphasize “the completely void nature of the time-and-space container created in Day 1” by euphemistically comparing “the face of the deep” with raw sewage (i.e., “urine, semen, piss, wasting”). Accordingly, this euphemistic usage of “‫ ”מַ יִם‬emphasizes that being “without form, and void” suggests a Creation having the same value as raw sewage. It is extremely difficult to “understand” but a God who simply speaks and it instantly happens describes God’s Creation as being initialized with a dimension of “time-and-space” that was completely “without form, and void” even though “the Spirit of God” acted on it sequentially consistent with the “cause-and-effect” intrinsic to “time-and-space.”", "Another indication these verses are merely a summarization is that at least three levels of “heaven” are known to exist. The English word “heaven” in Genesis 1:1 was translated from the Hebrew word “‫( ”שָּ מַ יִם‬Strong’s H8064) “alluding to the visible arch in which the clouds move, as well as to the higher ether where the celestial bodies revolve.” However, it is intuitive that God did not create the “heaven” where God has eternal residency.", "Many who translate the Hebrew word “‫ ”שָּ מַ יִם‬into English treat it as a plural noun simply because Strong’s H8064 describes both “the visible arch in which the clouds move as well as the higher ether where all the celestial bodies revolve.” However, neither of those meanings describes “the third heaven” where God eternally resided with the principalities and powers before “the earth” existed. English translators describe the place where God resides as “the third heaven” based on the 2Corinthians 12:2 translation of the Greek noun “τρίτος” (Strong's G5154) “order from <G5140> (treis); third; neuter (as noun) a third part, or (as adverb) a (or the) third time, thirdly :- third (-ly).” The environmental dimension of “The third heaven” has never been described to created humans but that environment is not restricted by either “cause-and-effect” or by “time-and-space.”", "And the Ephesians 3:10 Greek adjective “ἐπουράνιος” (Strong's G2032) is translated into English as “heavenly places” or “the heavenlies” to qualify “the third heaven” where God resides eternally. Strong's definition of G2032 is “from <G1909> (epi) and <G3772> (ouranos); above the sky :- celestial, (in) heaven (-ly), high.” Thus, translators of God’s inspired Words recognize at least three distinct places called “heaven”, but the English language makes no distinction between those three.", "The other English term in these verses describing God’s creation is “the earth” which is translated from the Hebrew word “‫”רץ‬ ֶ (Strong’s H776) “from an unused root probably meaning to be firm; the earth (at large, or partitively a land) :- × common, country, earth, field, ground, land, × nations, way, + wilderness, world.”", "It is critically important to notice that verse 1:2 focuses on “the earth” simply because “the earth” is where God’s Purpose-For-Creation will be accomplished rather than being accomplished within either the Universe (i.e., the sky above “the firmament”) or accomplished within “the third heaven” where God resides eternally.", "The English word “earth” refers to the entire ball-of-matter where all humans will eventually reside after God’s creative effort is complete. But the summary usage of H776 in Genisis 1-5 makes no attempt to identify the source for the matter God used to insert an “earth” into “the void container.”", "Some wisdom deficient Bible scholars assume matter is eternal even though there is no Scriptural basis for “leaning unto that understanding.” However, I suggest that an omnipotent God’s infinite energy is the source for all the matter that fills “the void time-and-space container” with “the earth” as well as with the stars and galaxies and everything else that exists within the Universe.", "“The earth” will eventually be created within the “empty and void container” but the English clause “darkness was upon the face of the deep” suggests the “void container” was initialized to be “completely void” of even the spectrum of electromagnetic energy that will allow human eyes to sense illumination.", "This is critical information because the English word “darkness” in Genesis 1:2 was translated from Hebrew “‫( ”חשֶ ך‬Strong’s H2822) “the dark; hence (literal) darkness; figurative misery, destruction, death, ignorance, sorrow, wickedness,- dark (-ness), night, obscurity.” The English word “darkness” is normally used to describe a partial absence of the visible spectrum of electromagnetic energy. However, the term “darkness” in verse 2 seems to describe the contents of an empty container that is completely “void” of everything including the entire spectrum of electromagnetic energy until “the Spirit of God moved upon the wasted face of raw sewage.” Thus, the English word “darkness” in verse 2 describe a condition which is much more descriptive than the mere absence of illumination. “Darkness” in verse 2 describes the contents of an empty  according to God’s Purpose-For- Creation.", "There can be no question that everything including “the man who was formed by the LORD God ” “was very good” exactly as God had intended. God’s Word teaches that nothing happens that was not “predestined” to happen by “the determinate counsel and foreknowledge of God” (Acts 2:23). In other words, nothing exists in Creation that is not “good” simply because everything is exactly as God intended.", "“The LORD God formed man of the dust of the ground” and then completed the process by “breathing into man’s nostrils the breath of life; and man became a living soul.” This is the same “man” whom “the LORD God sent him forth from the garden of Eden, to till the ground from whence he was taken” (Gen 3:23).", "Genesis 2:9b", "God’s Purpose-For-Creation is finally initiated", "God planted “the tree of life also in the midst of the garden, and the tree of", "knowledge of good and evil.”", "Whether these two trees are real or metaphorical is of no consequence to you or me. Scripture does not further speak about these trees until Revelations 22:2. Nevertheless, the “the tree of life” being planted in the Garden of Eden seems to suggest God gave Eve every opportunity to choose to obey God’s command regarding “the tree of knowledge of good and evil.” However, if Eve had chosen to eat of “the tree of life” rather than “the tree of knowledge of good and evil” she would have presumably received “everlasting life” without any need for “the Lamb slain before the foundation of the world.” Thus, it seems Eve’s “sin” and “the slaying of the Lamb” were both intentionally “predestined from before the foundation of the world.”", "It seems God’s Purpose-For-Creation “from the foundation of the world” was to incarnate “the Lamb that was slain” to shed His blood as the “redemption for sin” (i.e., the ransom price) demanded by Satan for the purchase of slaves of sin. It seems Adam and Eve were literally “predestined” to learn the distinction between “good and evil” by eating of “the tree of knowledge of good and evil” so that they required “redemption for sin.”", "God “predestined” it to happen that way “from the foundation of the world” just so “the principalities and powers in the heavenlies” could observe “the manifold wisdom of God” demonstrating the reason why God should be worshipped for His Holiness.", "Scripture doesn’t say so, but we hope the names of Adam and Eve were listed in “the Lamb’s book of life from the foundation of the world.” We “Trust in the LORD with all our heart” that their names were listed but only God knows the names listed in “the Lamb’s book of life from the foundation of the world.”", "The remainder of Genesis, indeed, the remainder of all of Scripture continues to describe either what God did or else to describe what God expects you and me to do. Nevertheless, God’s Purpose-For-Creation has been initiated. And everything God did is evaluated as being “very good” simply because God did exactly what God intended to do. But our knowledge of what God did would be much more accurate if only God had revealed why He created anything.", "The conclusion of WHAT God actually did", "God scientifically created everything in six days. God literally created the “Laws-of-Motion” which wouldn’t be “discovered” until the 17th Century by Isaac Newton. God also created the “Theory of Relativity” which wouldn’t be “discovered” until the 20th Century by Albert Einstein.", "Despite any divine revelation of God’s Purpose-For-Creation, rival Bible schools teach conflicted wisdom deficient opinions about the “mystery” of that which God really meant to do or say. And yet every wisdom deficient instance of Bible school taught sectarian conflict is included in God’s evaluation that “everything God created was very good.” Amazingly, every (no exceptions) conflicted sectarian leader is doing exactly that which God has “predestined” them to do. The reality is that God’s “calling” to be a conflicted sectarian “pastor teacher” is theologically disjoint from God’s “calling to salvation.” It is to be hoped that “many” sectarian “pastor teachers” will hear God say, “Well done, thou good and faithful servant … enter thou into the joy of thy LORD” (Matt 25:21) but conflict between sectarian belief systems makes that kind of hope to be very doubtful.", "I say “Hopefully” only because salvation is entirely due to being “predestinated unto the adoption of children by Jesus Christ to himself, according to the good pleasure of his will” (Eph 1:5). You and I have no control over that “adoption” process.", "Salvation is only offered to temporary and disposable humans “whose names were written in the book of life of the Lamb slain from the foundation of the world” (Rev 13:8). In other words, salvation is only for those who are “predestined to salvation.” Bugs, catfish, cows, and crows are never “predestined to salvation.”", "It seems reasonable that “pastor teachers” who were “called by God to a pulpit pastorate” are also “called and elected to be saved” by being named in “the Lamb’s book of life” but the “determinate counsel and foreknowledge of God” is not something that can be altered by volitional-free-will decision making.", "Temporary and disposable humans are precluded from writing their own name in “the Lamb’s book of life that was divinely written before the foundation of the world.”"]}, {"n": 3, "title": "God created Christian conflict", "paras": ["Every Bible believer knows God is sovereign, omnipotent, and omniscient.", "If those attributes literally characterize God, then why did a sovereign and omnipotent God create humans whom God omnisciently knew would “sin and come short of the glory of God” (Rom 3:23)? And yet an omniscient God included “a sinful Adam and Eve” in God’s Genesis 1:31 evaluation that “behold, everything was very good” exactly as He had planned.", "An omniscient God knows every human is temporary and disposable due to being “appointed once to die, but after this the judgment” (Heb 9:27) so why did a sovereign omnipotent God plant “the tree of knowledge of good and evil in the midst of the garden” (Gen 2:9) and then threaten a temporary and disposable Adam and Eve by “commanding thou shalt not eat of it: for in the day that thou eatest thereof thou shalt surely die” (Gen 2:17)? God knew that every human “dies” and yet God omnisciently evaluated the death and judgment of every temporary and disposable human as being “very good” exactly as He had planned. Why did God make that evaluation?", "An omniscient God knew “the Lamb was slain from the foundation of the world” (Rev 13:8) before He made Adam and Eve. Thus, Adam and Eve were “predestined from the foundation of the world” to disobey God otherwise there would have been no reason for God to incarnate “the slain Lamb” to be “born of the flesh” as the son of a virgin named Mary. On the other hand, “all that dwell upon the earth shall worship him, whose names are NOT written in the book of life” (Rev 13:8). That kind of universal worship could never happen without the “predestined disobedience” of both “redeemed and unredeemed Wheat and Tares” (Matt 13:24ff). Without exception literally everything was divinely created to be consistent with God’s Purpose-For-Creation.", "An omniscient God also knew Cain would offer an unacceptable sacrifice while Abel’s sacrifice would be accepted. That same omniscient God knew that Cain would react to God’s evaluation of sacrificial methods by martyring Abel (Gen 4:1- 8). And yet God included the conflict between Cain and Abel as being “very good.”", "An omniscient God knew the progeny of Abram and Sara’s grandson Jacob/Israel would eventually become known as “God’s chosen people” or “the children of Israel.” But an omniscient God also knew that Abram’s progeny with Hagar and Abram’s 2nd wife Keturah would be the mortal enemies of “God’s chosen people.” And yet an omniscient God evaluated that fact as being “very good.”", "It is intuitive that before “in the beginning God created the heaven and the earth” an omniscient God already knew “which names were written in the Lamb’s book of life.” That’s why the Apostle Paul begins his divinely inspired Ephesians 1:4-6 words with the invocation “Blessed be the God and Father of our Lord Jesus Christ, who hath blessed us with all spiritual blessings in heavenly places in Christ according as he hath chosen us in him before the foundation of the world, that we should be holy and without blame before him. In love having predestinated us unto the adoption of children by Jesus Christ to himself, according to the good pleasure of his will.” In other words, in AD60 God “made known unto us the mystery of his will, according to his good pleasure which he hath purposed (i.e., predestinated) in himself” (Eph 1:9 and 3:3).", "An omniscient God knew that “everything was very good” despite knowing that bad stuff would continuously happen. Yet God’s assertion of “very good” was absolute Truth simply because a sovereign and omniscient God omnipotently predestinated His Words to be absolute Truth “from before the foundation of the world.” Nevertheless, wisdom deficient Bible scholars “lean unto their own understanding” to manufacture hermeneutically conflicted interpretations about that which an immutable God changed His mind to do and say.", "An omniscient and omnipotent God sovereignly created everything including both figurative and literal sectarian “wars and rumors of war” to be fought by those who claim to believe “Thy Word is Truth.” Sectarian conflict is publicly observable in the form of Christian preaching that devalues Scripture. And yet sectarian “wars and rumors of war” are included in God’s omniscient declaration that “everything created by God was very good.”", "The evidence is that a “good” God deliberately “predestinated” everything that has happened since creation including the crucifixion of “His only begotten Son.” However, if an omniscient God evaluates what has been created as being “very good” then God’s definition of “good” is different from the sectarian chants that assert “God is good all the time; all the time, God is good.” A “good” God created all the “bad” stuff like sickness and every other form of human suffering.", "In Exodus 4:11 God asked Moses “Who hath made man's mouth? or who maketh the dumb, or deaf, or the seeing, or the blind? have not I the LORD?” God’s own Words assert that “a good” God deliberately created sickness, suffering, and all other human frailties. God has always used sin, sickness, and suffering to accomplish God’s Purpose-For-Creation. The reason an omniscient God declared “everything was very good” is because everything was created consistent with God’s Purpose-For-Creation. An omniscient God created universal conflict between sectarian belief systems and then declared “it was very good.”", "Conflict fulfills God’s plan", "It is philosophically intuitive that asking why anything was done is always more informative than knowing what has been done. For example, sentencing by judges in USA Courts of Law is typically based on why a crime was committed rather than based on what elected lawmakers legislated as the maximum penalty for that same crime. Thus, it is philosophically intuitive that Christian conflict fulfills God’s plan.", "The philosophical nomenclature is written as “WHY > WHAT.”"]}, {"n": 4, "title": "My introduction to this book", "paras": ["This book is introduced by asking two questions which require minimal Bible knowledge to answer correctly. 1st question: “Do any other life forms exist in the Heavenlies where God resides?” 2nd question: “Does death exist in the Heavenlies where God resides?”", "Anyone who knows anything about Heaven will answer the 1st question as “Yes, angels also exist in the Heavenlies” and the 2nd question will be answered “No; death does not exist in the Heavenlies where God resides.”", "Those questions were suggested by simply reading the first 3 verses of Isaiah 6 which report that “Seraphim cry, Holy, holy, holy, is the LORD of hosts. The whole earth is full of his glory.” Why do “Seraphim” claim “the whole earth is full of his glory” when all the available evidence demonstrates the whole earth is full of sin and death? And why do “Seraphim” think they ought to worship “the LORD’s Holiness” when they don’t worship every other Holy thing that can be found in Heaven?", "Revelation 13:8 suggests answers to these questions by asserting “And all that dwell upon the earth shall worship him, whose names are not written in the book of life of the Lamb slain from the foundation of the world.” It is intuitively obvious that “redemption by slaying the Lamb” (i.e., death by crucifixion of “the Lamb”) cannot happen in the place where God and “Seraphim” both reside. Thus, God must create a non-Heavenly environment just so “Seraphim” can observe “the death of the Lamb that was slain from the foundation of the world.” God’s inspired Words reveal that’s exactly what happened. However, wisdom deficient sectarian Bible scholars continue to “lean unto their own understandings” about God’s Purpose-For-Creation.", "The “rightly divided” context of Scripture (i.e., Gen 1:1, Eph 3:5-10, Acts 2:29) reveals “In the beginning God created the heavens and the earth as a mystery, which from the beginning of the world hath been hid in God, who created all things by Jesus Christ to the intent that now UNTO THE PRINCIPALITIES AND POWERS in heavenly places might be known BY THE CHURCH the manifold wisdom of God.”", "“Rightly divided” Scriptural context reveals God’s “determinate counsel and foreknowledge” was to create an environment where “death by crucifixion” could happen. This was necessary simply because “death” is impossible in the place “where God resides in the heavenlies with the principalities and powers.” In fact, everything was created according to God’s “determinate counsel and foreknowledge.” That multi-worded English phrase can be summarized by the single English word “predestination.”", "Authors of secular murder mysteries create environments containing a murdered victim even though typical secular authors have never experienced anyone being murdered. In like manner, “the mystery story” inspired to be written by the Divine Author (i.e., God) creates an environment where “the Lamb of God will be slain” even though no one had ever been “slain” where The Divine Author resides. However, “the mystery of His-Story” (i.e., “history”) must be contextually “studied” if God’s motivation “is to be understood” by wisdom deficient Bible scholars.", "God’s motivation ought to be contextually intuitive simply because “In the beginning” NEITHER “the heavens” NOR “the earth” NOR “the Lamb that was slain” NOR “the church” existed in the place where God resides along with “the principalities and powers in heavenly places.” Thus, God’s “determinate counsel and foreknowledge” was to create an environment for telling “His-Story.” However, God deliberately “hid” any knowledge of His “determinate counsel and foreknowledge” as a “mystery, which from the beginning hath been hid in God, who created all things by Jesus Christ” (Eph 3:9).", "God also chose to “mysteriously hide” the identity of “the principalities and powers.” (I assume “Seraphim” are included in the classification of “principalities and powers” but this is “mysteriously” never confirmed within Scripture). A search of God’s “mystery story” reveals “principalities and powers” are created to be either “good” or “evil.” However, “evil principalities and powers” cannot reside “in the heavenlies” where God resides with “the Seraphim.” So, God had to create an alternative environment where “evil principalities and powers” can reside with wisdom deficient Bible scholars.", "From the moment of Creation until AD60 God recognized the risk that God’s Purpose-For-Creation can be sabotaged by humans who thought they were literally honoring God’s Holiness by resisting the “evilness of the principalities and powers whom God had created”. That kind of sabotage was actually attempted in Scripture when the leadership of “God’s chosen people” attempted to protect the Holiness of God by accusing Jesus of “blasphemy” (Matt 26:65 and Mark 14:64). Nevertheless, an omnipotent God caused God’s Purpose-For-Creation to be fulfilled by crucifying “His only begotten Son.”", "Tradition reports that in AD60 God inspired the Apostle Paul to write the epistle to the Ephesians about “the good principalities and powers who continue to exist in the Heavenlies along with God.” In other words, in AD60 God finally revealed “the mystery” to those who “Trust in the LORD with all thine heart.” However, wisdom deficient Bible scholars continue to “lean unto their own” theological opinions “to the intent” of interpreting God’s Words as if their wisdom deficient “conflicted understanding” truly reflects God’s motivation.", "Wisdom deficient Bible scholars pretend to agree with John 17:7 that “Thy Word is Truth” while literally teaching sectarian opinions which conflict with rival sectarian opinions as well as conflict with God’s Purpose as revealed within the inspired context of “Thy Word is Truth.” Conflicted wisdom deficient sectarian opinions are publicly observable in the form of Christian preaching that devalues Scripture.", "The point being made in this book", "The point is that without exception every Bible school educated “pastor teacher” disagrees with rival “pastor teachers” about the literal meaning of “Thy Word is Truth.” Without exception the outcome of that kind of disagreement is always Christian preaching that devalues Scripture. God’s Creation has always been characterized by conflict despite an omniscient Creator God’s making His strange assertion in Genesis 1:31 that “all His creative effort was very good.” Scripture reports conflict between humans immediately after Adam and Eve were evicted from The Garden of Eden at the end of Genesis 3. 1Corinthians 1:12 reports sectarian conflict in one of the earliest Churches established by the Apostle Paul. Conflict existed long before Jesus was crucified and conflict between God believers continues to be characteristic of modern times. However, God inspired Paul in AD60 to reveal in his Ephesians Epistle the “the mystery of God’s Purpose-For-Creation that has been hidden since the foundation of the world.”", "Despite God’s inspiration, wisdom deficient Bible schools continue to teach “pastor teachers” to trust sectarian opinions about God promise of salvation to those who are “dead in trespasses and sin.” Bible scholars foolishly “proof-text” 2Peter 3:9 to teach “The Lord is not slack concerning his promise, as some men count slackness; but is longsuffering to us-ward, not willing that any should perish, but that all should come to repentance.” However, if a sovereign and immutable God really wants “all to come to repentance” then why do so many NOT “come to repentance”?", "Those same wisdom deficient Bible schools “deceitfully lean unto their own understanding” to teach “pastor teachers” the unscriptural opinion that John 3:16 universally offers “everlasting life” to “whosoever” makes-a-free-will-decision “to believe in Him.”", "There is a high statistical probability approaching 100% that you also “trust” those same deceitfully wrong wisdom deficient sectarian “understandings.” However, the human author of John 3:16 implies in Revelation 13:8 that salvation is “predestined by the list of names that were already written in the Lamb’s book of life before the foundation of the world.” If John’s implication is true, then wisdom deficient Bible scholars either “misunderstand” or else deliberately “misinterpret” the context of both John 3:16 and 2Peter 3:9.", "Please affirm that the Wisdom Literature of Proverbs 3:5-6 specifically teaches us to “lean NOT unto our own understanding” simply because “conflicted understandings” always result in Christian preaching that devalues Scripture. The wise alternative is to “Trust in the LORD with all thine heart. In all thy ways acknowledge him, and he shall direct thy paths.” It is philosophically intuitive that the reason WHY God created anything at all is always more instructive than knowing WHAT God has created.", "The philosophical nomenclature is “WHY > WHAT.”", "If your “understanding” of God’s Word happens to be contextually correct, then you have literally exposited God’s Word rather than interpreted God’s Word. It is egotistically absurd to claim “interpreted understandings” are honoring to God. In other words, “Thy Word is Truth” despite every egotistical wisdom deficient attempt to “lean unto thine own understanding” to interpret that which God may have meant to say.", "Without exception, a humble “trusting” of contextual expositions of God’s Words always evaluates Scripture at the highest level possible rather than egotistically devaluing Scripture with “thine own understanding.” Romans 3:4 teaches that “Pastor teachers” who counsel church attendees from a pulpit ought to worry about their own salvation simply because they are each “liars.”", "The Apostle John’s assertion in John 3:16 that “God so loved the world” seems to contradict the same Apostle John’s command in 1John 2:15 to “Love not the world, neither the things that are in the world.” How can it be that “God so loved the world” while “whosoever believeth in him” is commanded to “Love not the world”?", "John rationalizes his 1John 2:15 command by asserting “If any man loves the world, the love of the Father is not in him.” The English word “world” in both John 3:16 and 1John 2:15 was translated from the same Greek word “κόσμος” (Strong’s G2889). Thus, the only way to resolve the appearance of a contradiction between 1John 2:15 and John 3:16 is to exposit (i.e., “rightly divide”) the context of both verses.", "The “rightly divided” context of 1John 2:15 teaches that “loving the world” rather than “loving God” evaluates “the world” as having more value than “the Creator of the world” which is merely a minute part of an elaborately created Universe. However, 2Peter 3:10 reveals God’s elaborate Universe is scheduled for destruction. And God’s divinely scheduled destruction includes both living and dead un-redeemed humans. Thus, John teaches that “loving a temporary and disposable world” rather than “loving the Creator of the temporary and disposable world” is nonsense simply because “loving a world that is scheduled for destruction” is literally religious sabotage of God’s Purpose-For-Creation.", "A contextual exposition of John 3 reports “Nicodemus” asking “how can a man be born again when he is old?” Jesus bases His answer on the 3:6 axiom “That which is born of the flesh is flesh; and that which is born of the Spirit is spirit.” It is axiomatic that every life form (no exception) is determined by parentage so Jesus tells “Nicodemus to marvel not that I said unto thee, Ye must be born again. The wind bloweth where it listeth, and thou hearest the sound thereof, but canst not tell whence it cometh, and whither it goeth. So is every one that is born of the Spirit.” In other words, being “born of the Spirit” is “predestined” by the same Father who “predestines the blowing of the wind.”", "The axiom of John 3:6 teaches that the birth of bugs, catfish, cows, crows, and humans is always the outcome of parental copulation that created a previously non- existing DNA. In like manner, being “born again of the Spirit” describes a previously non-existing Spiritual DNA being created by “the determinant council and foreknowledge of God the Father.” That previously non-existing Spiritual DNA intrinsically “believeth in Him” as well as intrinsically inherits “everlasting life.” But only humans can be “born again of the Spirit.” Bugs, catfish, cows, and crows are never “born again of the Spirit.”", "It is intuitive that both “born of the Flesh” and “born again of the Spirit” are the outcome of “the determinant counsel and foreknowledge of God” as reported in Acts 2:23. Both kinds of life were “predestined” by the same “determinant counsel and foreknowledge of God.”", "The reality is that God “predestines the DNA” of both “Fleshly” and “Spiritual” conceptions and births. In fact, nothing happens that Creator God did not “predestine” to happen. Nevertheless, the concept of “predestination” is often rejected by wisdom deficient Bible scholars.", "“Predestination” is clearly taught within the context of “Thy Word is Truth” so why does anyone question the reality of “predestination.” The reality of “predestination” is the reason WHY God commands all humans to “trust in the LORD with all thine heart and lean NOT unto thine own understanding.”", "God’s Word is always Truthful. For example, the context of Peter’s 2nd epistle literally reports Peter writing “to them that have obtained like precious faith with us through the righteousness of God and our Savior Jesus Christ.” The literal Truth is that Peter writes to “brethren” whose names were already “written in the Lamb’s book of life from the foundation of the world” (Rev 13:8). However, the concept of a “predestined calling and election” is often hermeneutically interpreted to be “understood” as “The Lord is longsuffering to us <sinful humans>, not willing that any <sinful humans> should perish, but that all <sinful humans> should come to repentance.” By contrast, the literal context of 2Peter 1:10 specifically instructs “the brethren” to “give diligence to make your calling and election sure.” Accordingly, typical wisdom deficient Bible scholars and “pastor teachers” are guilty of “giving diligence to” interpret 2Peter 3:9 incorrectly in order to proof-text their foolish wisdom deficient assumptions.", "It is a “mystery” that “MANY who address Jesus as LORD” (Matt 7:22) literally misunderstand the concept of “giving diligence” even though an omniscient God declared in Genesis 1:31 that “everything God created was very good.”", "Another example reports Saul on the road to Damascus was a highly educated leader in the Jewish religion who diligently hated Christians. Thus, Saul was the epitome of “giving diligence” by diligently rejecting The Gospel. But the resurrected Jesus who was also “the Lamb slain from the foundation of the world” had already “called and elected” that diligent unbeliever named Saul to be reeducated (Gal 1:15ff) by the resurrected Jesus to be divinely “commissioned” as “Paul, the apostle to the Gentiles” (Rom 11:13).", "The reality is that every “call to salvation” was “predestined from the foundation of the world” before the gift of “everlasting life” could be given to humans who won’t even be conceived and birthed (i.e., “born of the flesh”) until thousands of years after “In the beginning God created the heaven and the earth.”", "2Peter is written to those who are “predestined to obtain like precious faith” who will each “diligently add to your faith virtue; etc.” In other words, “Giving all diligence” is merely doing the absolute minimum God has “called and elected” you to do “For if these things be in you, and abound, they make you that ye shall NEITHER be barren NOR unfruitful in the knowledge of our Lord Jesus Christ” (2Pet 1:8).", "“Giving all diligence” is the absolute minimum expected by a Creator God who asserts that “everything was created exactly as God intended.”", "Those who don’t “give all diligence to add to your faith virtue; etc.” are “blind” and incapable to “see they were purged from their old sins” (2Peter 1:9). However, \"giving all diligence” is NOT what is MOST IMPORTANT.", "2Peter 1:10 reports THAT WHICH IS MOST IMPORTANT IS TO “make your calling and election sure” by “remembering” that “God always keeps His promise.” Multiple “reminders of God keeping His promise” are listed in 1:12, 1:13, 1:15, and all of chapter 2. Thus, Peter concludes in 3:9 “The Lord is not slack concerning His promise, as <scoffers> count slackness; but is longsuffering to <the called and elect>, not willing that any <called and elect> should perish, but that all <called and elect> should come to repentance.”", "The reality is that Peter’s 2nd epistle teaches “the assurance of promised salvation” rather than “an offer of volitional salvation if wisdom deficient Bible scholars can somehow persuade you to make-a-free-will-decision.”", "However, wisdom deficient Bible schools ignore the context of John 3:16, 1John 2:15, and 2Peter 3:9 as well as many other contexts of Scripture. It is obvious that Bible schools never teach Biblical proficiency simply because without exception graduates of every Bible school are observed believing doctrines that conflict with the doctrines believed by those who graduated from rival Bible schools. Pervasive sectarian conflict is irrefutable evidence of a pervasive lack of Biblical proficiency. That irrefutable evidence cannot be “understood incorrectly.”", "Instead of teaching Biblical proficiency, Bible schools teach proficiency in a hermeneutical “understanding” about that which God really meant to say if only God had thought about it just a little bit more.", "The outcome of that kind of hermeneutical “understanding” is always Christian preaching that devalues Scripture even when that message contains “proof-text” verses quoted from “Thy Word is Truth.”", "Referencing a “proof-text” of Scripture is the exact opposite of Biblical preaching. The distinction is made obvious by asking if the preacher in your church ever conflicts with any other preacher. The alternative is always an exposition of the literal context of Scripture. The evidence is irrefutable that Bible schools neglect teaching methods for expositing Scripture.", "God commands everyone to “Trust in the LORD”", "Every living human resides in a world that was created by God. But no human was present when “In the beginning God created the heaven and the earth.” Thus, if any living human wants to know what God did during the first 5 days of creation he must be told. Revealing history is what God does in “Thy Word is Truth” and God does a really good job of revealing history.", "Scriptural History reveals that “all have sinned and come short of the glory of God” (Rom 3:23). That kind of Scriptural History is not “a mystery.”", "However, the reason why God created “a world that comes short of the glory of God” has always been a “mystery, which from the beginning of the world hath been hid in God, who created all things by Jesus Christ” (Eph 3:9). Tradition teaches that Paul was inspired to write the epistle to the Ephesians in AD60. Prior to AD60 God only informed us about what God has already done or else a prophesy of what God is going to do.", "Instead of revealing the reason why the world was created, God commands every human to “Trust in the LORD with all your heart and He shall direct your path.” The alternative to “Trusting the LORD” has always been disobedience of God’s command by “leaning unto thine own understanding” to manufacture speculations about that which God really meant to do or say if only God had stopped for a moment to think about what He was doing and saying.", "The irrefutable evidence is that Bible schools teach “pastor teachers” to disobey God by “leaning unto their own understanding.” There are no exceptions to that evidence. And rival “pastor teachers” teach church attendees to “lean unto an approved sectarian understanding” about that which God really meant to tell us if only God could have done a better job of communicating. Sectarian church attendees are taught to trust their wisdom deficient “sectarian authorized pastor teacher” rather than taught to “trust God.” The Christian religion is characterized by sectarian conflict between both organized and so-called independent affiliations of churches. It is intuitively obvious that every “born of the Flesh” human is “predestined to sin” simply because “all have sinned and come short of the glory of God” (Rom 3:23). The only exception is the incarnate “Lamb of God” who was “in all points tempted like as we are, yet without sin” (Heb 4:15). He was “slain from the foundation of the world” (Rev 13:8) as a prelude to His “coming to seek and to save that which was lost” (Lk 19:10).", "“Cain killing Abel” is another irrefutable example of “leaning unto a conflicted understanding” about that which God really meant to say. “All have sinned and come short of the glory of God” is exactly what God “predestined” to happen when “the LORD God sent <Cain’s parents> forth from the garden of Eden, to till the ground from whence <his parents were> taken” (Gen 3:23).", "A more modern example of “leaning unto a conflicted understanding” is churches conflicting with rival churches about what God really meant to say. Wisdom deficient Bible students are taught to “lean unto their own understanding” that Eve’s “sin” was due to Satan’s temptation. But the real reason why God did anything at all was “mysteriously” (Eph 3:3) hidden by God.", "To be sure, Scripture frequently identifies Satan as “the Tempter” but the context of Revelation 13:8 implies that “the Lamb was slain to pay the penalty for sin” before Satan had been “cast down” to become “the Tempter.”", "I humbly ask each reader to exposit the context of Genesis 3 to affirm “the serpent which the LORD God had made” (rather than Satan) merely verified that Eve understood God’s command (3:1) followed by “the serpent” (rather than Satan) revealing Truth which God had “mysteriously hid” from Adam and Eve (Gen 3:4-5, Eph 3:9). The Truth which God “mysteriously hid” is contextually explained in Hebrews 9:27 that Adam and Eve were already “appointed once to die, but after this the judgment.”", "Admittedly, “The Tempter” Satan wants everyone to “sin” but Genesis 3:6 reveals Eve’s sin was entirely due to “the woman <lustfully> saw that the tree was good for food, and that it was pleasant to the eyes, and a tree to be desired to make one wise, she took of the fruit thereof, and did eat, and gave also unto her husband with her, and he did eat.” Apostle Peter contextually explains in Acts 2:22ff that “Eve’s sin” was “deliberately predestined from the foundation of the world” by “the determinate counsel and foreknowledge of God.” The literature of God’s Word is clear that “predestination” and “foreknowledge” are symbiotic terms. Each of those symbiotic words assumes the reality of the other word. But wisdom deficient Bible scholars seem ignorant of literary symbiosis.", "The reality is that Eve’s sin was nothing more than an every-day event of eating food which God had graciously provided.", "It is a “mystery” to virtually all wisdom deficient Bible scholars that God used an every-day event to initiate God’s Purpose-For-Creation as well as God’s purpose for the conception and birth of each “born of the flesh” human who has temporary and disposable existence on “the earth” which was created by God to be temporary and disposable.", "To be sure, the angelic Lucifer/Satan used “the serpent which God had created” to reveal the Hebrews 9:27 context that was “predestined” to be hidden from Adam and Eve according to God’s own “determinate council and foreknowledge.” Genesis 3:14 explains that an omniscient God “made the serpent” to be cursed “above all cattle, and above every beast of the field.”", "For certain the angelic Satan or Lucifer is implicated by Genesis 3:14, however, the evidence of God’s curse “of serpents” continues to be observed by all modern humans despite any wisdom deficient theological opinion about Satan or Lucifer.", "The context doesn’t say so but “cursing the serpent” could be the event causing God to “cast down the angelic Lucifer” to become “Satan the tempter” of every human including temptation of the incarnated “Lamb of God” (Lk 4:1ff).", "However, Job 1:6ff reveals “the cast down Tempter Satan” is restricted to doing only that which fulfills God’s Purpose-For-Creation as revealed in Ephesians 3:10 that everything was created by God “To the intent that now unto the principalities and powers in heavenly places might be known BY THE CHURCH the manifold wisdom of God.” A history professor named Santayana is credited with the quoted analysis “Those who cannot remember the past are condemned to repeat it.” (Search the web for “Santayana’s quotes” if you are curious about his quotes. Santayana was a prolific analyzer of history.)", "Santayana’s quote provides a perspective for “understanding” why “the woman whom thou gavest to be with me” chose to “lean unto her own understanding” rather than choosing to “Trust the LORD with all her heart.” Santayana’s perspective is that Eve had no concept of “death” simply because Eve had no past that could be remembered. Thus, the penalty “thou shalt surly die” was a complete “mystery” to Eve. The only thing Eve could remember was that “God provided trees as the source for food.” Eve “lustfully sinned” simply because God chose to never tell her why she was created. The reality is that Eve was “predestined by God to sin” and yet God asserted “everything that He had created was very good” simply because it fulfilled God’s Purpose.", "The angelic Satan who spoke thru “the serpent which the LORD God had made” (Gen 3:1) “leaned unto his own understanding” about that which God had deliberately hidden from Adam and Eve. Even the very best Bible school trained “pastor teachers” emulate the angelic Satan by “leaning unto their own understanding” when preparing pulpit messages. Bible schools persuade wisdom deficient preachers to believe that a sectarian proof-text about that which God did NOT mean to say is more applicable to human needs than that which God literally did say. That kind of sectarian interpretation is exactly what Satan led “the serpent” to do in Genesis 3.", "Bible schools teach the homiletic that pulpit sermons are to be structured as Christian counseling to persuade sectarian approved applications of good behavior. Wisdom deficient Bible schools teach that “Spiritually dead humans” can make-a- volitional-decision to no longer be “Spiritually dead.” That absurdity is a sectarian approved wisdom deficient message application.", "Bible schools ignore the reality that “conflicted understandings” (i.e., sectarian interpretations) about that which God meant to say always result in Christian preaching that devalues Scripture even when the preacher is counseling “Entire Sanctification” such that human behavior can be observed as emulating “Holiness unto the Lord.” Counseling an emulation of “Entire Sanctification” rejects “If we say that we have not sinned, we make him a liar, and his word is not in us” (1John 1:10).", "The reality is that humans are incapable of emulating “Holiness unto the Lord” because “Holiness” is always “the gift of God. That gift is Not of works lest any man should boast” (Eph 2:8-9)", "Scripture teaches 2Timothy 2:2 that preaching ought to be “the things that thou hast heard of me among many witnesses, the same commit thou to faithful men, who shall be able to teach others also.” That verse restricts preaching to only expositions of “the things that thou hast heard of me.” However, Bible schools never emphasize “the things that thou hast heard of me.” Bible schools always emphasize homiletics that result in Christian preaching that devalues Scripture. There are no exceptions.", "Many Bible schools teach the homiletic that pulpit messages must end with applications that resist Satan’s temptations by obeying a list of sectarian approved rules and regulations. However, God’s Laws have never been consistently obeyed by “born of the Flesh” humans. In just that way “pastor teachers” are taught to reject the Ephesians 4:11-13 “gifting of God” intended to result in every church “coming in the unity of the faith.”", "Rival church affiliations tend to teach similar Biblical doctrines. So, why don’t rival churches emphasize their similarities rather than affiliate based on their distinctive doctrines? Rival affiliated local church buildings have even been built on opposite corners of the same streets.", "God’s answer to questions about why God created sectarian rivalries is that every CHURCH is created “To the intent that now unto the principalities and powers in heavenly places might be known BY THE CHURCH the manifold wisdom of God” (Eph 3:10). “The principalities and powers in the heavenlies” learn the distinction between “good and evil” by observing the conflicted versions of Truth which are taught in rival sectarian CHURCHES. God’s plan requires the “good and evil” that characterizes every sectarian CHURCH which claims to believe “Thy Word is Truth.” Conflicted CHURCHES are merely temporary and disposable tools for teaching the distinction between “God’s goodness” and “the evil of conflicted opinions about that which God really meant to say.”", "Instead of teaching “pastor teachers” how to “Trust in the LORD with all your heart” Bible schools teach “pastor teachers” to “trust” the conflicted writings of dead theologians such as Agustine, Arminius, Calvin, Ignatius, Pelagius, Spurgeon, Wesley, as well as various other living and dead sectarian approved theological scholars. Each of those men seems to have desired to serve God even though each taught a conflicted system of belief.", "To be sure, conflicted opinions often partially reflect that which God really meant to say, but even the most nearly correct conflicted opinion is never the outcome of a literal exposition of “Thy Word is Truth.”", "It is intuitive that “Trust in the LORD” requires trusting God’s Words without any interpretation. By contrast, “leaning unto your own understanding” absolutely always requires altering God’s Words by interpretation.", "Please affirm the historic teachings of conflicted Bible scholars such as Arminius, Calvin, Wesley, Whitfield, and Pelagius are being used to initiate religious “wars and rumors of war.” History is replete with both religious and secular “wars and rumors of war.” The motivation for every “war” is to eliminate the opposition by effective martyrdom. In that regard, the divine author who inspired Proverbs 3:5-6 also inspired Ecclesiastes 1:9 “There is no new thing under the sun” since “Cain martyred Able” after “leaning unto conflicted understandings about approved methods for offering sacrifices.” That kind of conflict is the guaranteed outcome when sectarian theologians “lean unto proprietary interpretations of God’s Words.”", "The “war” between “Cain and Able” is reported immediately after their parents were “ejected from the garden of Eden, to till the ground from whence they were taken” (Gen 3:23). The martyrdom of “Able” and the later martyrdom/crucifixion of the incarnate “Lamb of God” was “predestined” by “the determinate council and foreknowledge of God.”", "Despite Bible schools “leaning unto thine own understanding” they tend to be valuable simply because it is impossible to “understand” (i.e., interpret) that which God meant to say unless you already know that which God literally did say.", "It is extremely important for local church “pastor teachers” to be Biblically proficient simply because typical church attendees are NOT Biblically proficient. Church attendees need to literally hear God’s Words rather than hear conflicted sectarian proof-text speculations about that which God may have really meant for church attendees to hear. Literally hearing God’s Words is the only way church attendees can possibly “come in the unity of the faith.”", "But Bible schools never emphasize Biblical proficiency. The very best Bible schools teach hermeneutics that conflict with the hermeneutics taught at rival Bible schools. Bible schools attract new students by marketing the sectarian hermeneutics preferred by students rather than specializing in Biblical proficiency. It is a financially expedient marketing strategy.", "Every Bible school trained “pastor teacher” is taught to conflict with rival Bible school trained “pastor teachers.” Thus, it is inevitable that every church attendee conflicts with rival church attendees. Conflict between CHURCHES is so pervasive that the only conceivable conclusion is that conflict between CHURCHES is “predestined” by God “to the intent that now unto the principalities and powers in heavenly places might be known BY THE CONFLICT BETWEEN CHURCHES the manifold wisdom of God.”", "Moses was told that God deliberately “maketh the dumb, or deaf, or the seeing, or the blind” (Ex 4:11). And God also created CONFLICT BETWEEN CHURCHES to fulfill His Purpose-For-Creation. Why did God delay revealing His plan", "It is natural to be curious about why a sovereign and omniscient God would “mysteriously” wait until AD60 to finally reveal why God created anything at all. I suggest one reason why God delayed revealing His Plan was to preclude well- intentioned and sincere God-believers from sabotaging God’s Purpose-For- Creation.", "A well-intentioned resistance to God’s Purpose-For-Creation is described in 1Corinthians 2:8 where Paul admits “for had they known it they would not have crucified the Lord of glory.” Please affirm the statistical probability that the best educated Jewish Scholars would never request Pilate to crucify Jesus if God had allowed those well-intentioned scholarly Jewish leaders to know that Jesus was really their promised Messiah.", "God literally intends His Words to be hidden as commanded in Isaiah 6:9-10 “And he said, Go, and tell this people, HEAR ye indeed, BUT UNDERSTAND NOT; and SEE ye indeed, BUT PERCEIVE NOT.”", "As a matter of fact, well-intentioned modern Bible scholars emulate Jewish scholars by tolerating the “evil conflict” of doctrinal diversity simply because God “caused or predestined THE CHURCH” to be conflicted as required by Ephesians 3:10.", "Isaiah 6:9-10 contradicts Bible school hermeneutics that teach God universally offers “salvation and healing” to anyone and everyone simply because “God so loved the world.” However, the “mysterious” reality is that God does NOT want everyone to be saved and/or healed.", "Thus, it was statistically necessary for God to hide “the mystery” until after Jesus had been crucified to provide “redemption from sin for those who are called and elect” and after New Testament Churches had been initiated by Apostle Paul. Otherwise, some well-intended Bible scholar may inadvertently “understand” and God would be obligated to allow them to “convert and be healed.”", "Hiding the “mystery from the foundation of the world” prevented statistical sabotage of the “mystery.” An infinitely omniscient and wise God recognized the statistical risk of sabotage by well-intentioned but wisdom deficient religious leaders.", "My caveat", "Please affirm that the consensus of “many” (Matt 7:22) wisdom deficient Bible scholars and Bible school teachers is that God created the world simply because God wanted to be glorified by free agent humans choosing to “believeth in Him.” But that consensus literally disagrees with “Thy Word is Truth.” My own wisdom deficient opinion is that the “mysterious reason” why an omniscient and omnipotent God created the world is “to the intent that” wisdom deficient Bible scholars and Bible school teachers would fail to teach Ephesians 3:10 as God’s Purpose-For-Creation.", "That is exactly what has happened.", "Wisdom deficient Bible scholars typically interpret God’s Words to teach that “whosoever believeth in Him” will be divinely rewarded for making that volitional decision by divinely receiving “everlasting life.” Bible scholars and city-wide Evangelists typically think God created the world so that “dead in trespasses and sin” free-agent humans could make-a-decision to no longer be “dead” by coming forward during their “Hour-of-Decision.”", "Wisdom deficient Bible scholars tend to assume the human descendants of Adam and Eve are the beneficiaries of God’s creation. However, the reality is that eve
