 “good and evil.”", "Matthew 7:22 teaches the disturbing fact that “Many pastor teachers will say to me in that day, Lord, Lord, have we not prophesied in thy name? and in thy name have cast out devils? and in thy name done many wonderful works” but Jesus will simply tell them to “depart from me, ye that work iniquity. I never knew you.” No one enters Heaven “whose name is not written in the Lamb’s book of life from before the foundation of the world.” Behavior is not an issue as demonstrated by a sinful David who was described as “a man after God’s own heart” (1Sam 13:14 and Acts 13:22). Extreme disbelief is not an issue as demonstrated by a sinful Saul on the road to Damascus (Acts 9). God specializes in “calling and electing” the most despicable people.", "Ephesians 4:13 teaches that God intends the outcome of preaching to be “Till we all come in the unity of the faith, and of the knowledge of the Son of God, unto a perfect man, unto the measure of the stature of the fulness of Christ.” However, “the unity of the faith” has never been the goal of sectarian preaching. The definition of “Denominational Sectarianism” guarantees that “the unity of the faith” will never characterize church-attending Christians. In fact, religious sectarian conflict was deliberately created by God to demonstrate the “evil of conflict” to “the principalities and powers in the heavenlies.”", "1Corinthians 1:9-29 suggests that every (i.e., no exceptions) scholarly “understanding” (i.e., interpretation) of God’s Words disagrees in some sense with God’s intentions. Despite all my claims of “trusting the LORD with all my heart” I confess my own pride precludes me from “coming in the unity of the faith” with any who disagree with me.", "That’s my caveat of the reason my prayer is presented to God in humility. My caveat is that I sincerely want to emulate the humble prayer of Jesus when He prayed “Nevertheless, not my will, but thine, be done.”", "That’s my prayer for this book. Amen."]}, {"n": 9, "title": "Critical definitions and distinctions", "paras": ["The following definitional distinctions are intended to aid analysis of the inexplicable phenomena that Bible scholars have conflicted “understandings” of God’s Words. I trust these distinctions will help explain my analysis despite any conflicted sectarian “understanding” Bible scholars have taught you to prefer.", "Scriptural evaluation vs Polemical accusations", "Polemical accusations are always helpful when analyzing doctrinal beliefs, nevertheless, all my analytical effort simply identifies my own “hypocrisy.” You and I are both included in God’s Romans 3 evaluation that all humans are in conflict with “the oracles of God … yea, let God be true, but every man a liar; as it is written, that thou mightest be justified in thy sayings, and mightest overcome when thou art judged … for all have sinned and come short of the glory of God.” The Matthew 7:1-5 “beam that is in my eye” is larger than “any mote that may be in your eye.” I am a “hypocrite, who must first cast out the beam in my own eye” but I admit I don’t do that very well.", "Thus, I am not qualified to judge that your “understandings” need correction. If you sense polemic in my writing it is because my writing needs correcting. I simply report what Scripture says. Your fallible “understandings” are your own responsibility.", "Please be assured this book is not intended to be polemical. Nevertheless, I cannot deny that Scripture teaches that “leaning unto your own understanding” (i.e., “some did not believe”) about “the oracles of God” is divinely evaluated as “lying” about “the oracles of God” (Rom 3:2-4).", "Scripture vs Bible vs Literature", "In this book I use the term “Scripture” as an abstraction referring to every statement God inspired to be written to the humans who are “predestined” to “understand” God’s Words. However, modern humans are rarely conversant in the language used when “Scripture” was originally inspired to be written.", "Thus, I distinguish “Scripture” from “Bible” because each “Bible” is a fallible attempt to translate infallible “Scripture” into some language or dialect other than the original. It is likely each “Bible” contains ambiguity due to the intrinsic fallibility of every human translator. Thus, a concordance is always necessary to reconcile inaccurate and inadequate translations.", "Whenever English language books quote Scripture they must copy from a published English translation. The version I typically quote is the King James Version (KJV) (this is the font I use to indicate Bible text). And it will be the old KJV simply because my computer software provides cut-and-paste linkage with Strong’s Concordance. No other reason.", "Typical pulpit preachers prefer more modern “Bible” translations but your choice of “Bible” is of no consequence to the thesis of this philosophically conceived book.", "My choice to quote from the old KJV simply provides readers with reference consistency while reading. To me it provides cut-and-paste convenience while writing.", "I frequently use the philosophically secular term “Literature” when speaking about God’s Words to emphasize the theologically neutral nature of this book.", "It is human nature for Christians to have theologically prejudiced opinions about that which God really meant to say. However, I intend this book to be neutral about conflicted theological opinions. I admit my opinions are fallible. But then, that is also true about your own fallible opinions.", "Accordingly, “Bible” text is quoted only for literary content and never as proof- text promoting my own theologically prejudiced opinion about God’s Truth.", "I intend this book to avoid polemic. However, polemic may slip in simply because I am extremely prejudiced. Please consider your shared fallibility when you think I am lapsing into polemic.", "Exegesis vs Eisegesis WRT Exposition vs Interpretation", "“Exegesis” is defined as “the process of careful analytical study of the Bible to produce useful interpretations of those passages. The word comes from the Greek term ἐξηγέομαι (exegeomai), which means to explain or to narrate or to show the way.”", "“Eisegesis” is defined as “reading into the text with a preconceived notion we may have. This can often mean coming to the Scripture with a biased cultural lens that didn’t exist during the time the Bible was written.”", "“Exegesis” always treats God’s Words as “Thus saith the Lord.”", "“Eisegesis” is always “Thus saith I about what the Lord hath said.” “Exegesis” is frequently a tool used to “Exposit” the definition and usage when a Scriptural word was originally inspired to be written.", "“Eisegesis” is an interpretation that pretends to be “Exegesis.”", "“Eisegesis” is always a corruption of “Thus saith the Lord” even when theological interpretations essentially agree with “Thus saith the Lord.”", "Without exception every instance of “Christian preaching that devalues Scripture” is the outcome of a conflicted “Eisegesis” of God’s Words even when segments of “Thus saith the Lord” may be “deceitfully” inserted into the sectarian approved message.", "Sectarian opinions vs God’s Truth", "Jesus prayed for you and me in John 17:17 “Sanctify them through thy truth: thy word is truth.” It is a philosophical reality that the source for Scriptural Sanctification is always an outcome of “Thus saith the Lord.” By contrast, every sectarian claim of Sanctification is merely an opinion about that which God really meant to say.", "Conflicted opinions including opinions about sanctification are always an “Eisegesis” of assumptions about “thy word is truth.”", "The “church being built by Jesus” is based on “thy word is truth.” The churches being built by Bible scholars are based on sectarian “understandings” about “thy word is truth.” Sectarian “understandings” always “deceitfully” compete with the Truth of God’s Words.", "A common phenomena is that conflicted sectarian Bible scholars tend to religiously believe their sectarian “understandings” are true reflections of the literal meaning of God’s Words. But every interpretation of God’s immutable Words mutilates “thy word is truth.”", "A Big-Picture-Summary of Scripture", "The Big-Picture-Summary of the sixty-six inspired “oracles of God” (Rom 3:2) reports that “In the beginning God created the heaven and the earth” (Gen 1:1) to initiate a demonstration of “the manifold wisdom of God to the principalities and powers in the heavenlies” (Eph 3:10) after which “the heavens shall pass away with a great noise, and the elements shall melt with fervent heat, the earth also and the works that are therein shall be burned up” (2Pet 3:10).", "The impreciseness of the English word “heaven” is due to the inadequacies of the English language. English provides only one word to describe both the atmosphere surrounding the earth as well as the universe containing stars and galaxies. 2Corinthians 12:2 also speaks of a “third heaven” outside our universe. However, residents of “The third heaven” had never observed “evil and death” before “God created the heaven and the earth.”", "Thus, Ephesians 3:10 reports “the principalities and powers in the heavenlies” being educated about the distinction between “good and evil.” God created “the heaven and the earth,” humans, Satan, and Satan’s demons as temporary educational tools to be used in that demonstration.", "God’s Purpose for Creation was to teach “the manifold wisdom” of God’s grace and mercy by comparing “God’s gift of everlasting life to the Church being built by Jesus” versus God’s “wrathful penalty of Thou shalt surely die” for the lost people within the earth-bound churches built by Bible scholars.", "As of AD60 “the principalities and powers” have observed the initiation of “the Church being built by Jesus” as well as the initiation of the conflicted churches being built by Bible scholars. A few humans have been “redeemed” during the process but “redemption” is merely a tool used to accomplish God’s Purpose. “The whole earth being full of His glory” will not be observed by “The whole earth” until Revelation 13:8 is accomplished.", "At “the end of time” everything except the “redeemed” will be eliminated from God’s sight “as far as the east is from the west” just as God intended “from before the foundation of the world.”", "The-title-of-this-book vs Christian-pulpit-conflict", "The title of this book “Christian preaching that devalues Scripture” is an abstract notion that cannot be proven – there is no metric for comparing the intrinsic value of Scripture with the questionable value of the conflicted preaching heard from Christian pulpits.", "Nevertheless, every time I sense “Christian preaching that devalues Scripture” I simultaneously observe a pulpit preacher conflicting with a rival pulpit preacher. Accordingly, Christian-Pulpit-Conflict ≡ Sectarianism ≡ Christian-Preaching-That- Devalues-Scripture.", "That equivalence statement is True despite any Scriptural correctness or incorrectness of the preached message. It does not judge sectarian beliefs nor does it imply polemic.", "That equivalence statement is consistent with Romans 3 regarding “The oracles of God.” The Literature of Romans 3 teaches “Let God be true but every man a liar” simply because “all have sinned, and come short of the glory of God.”", "Biblical-Preaching is always based on an Exegetical Exposition of every applicable context of “Thus saith the Lord.” Theologically-Sectarian-Preaching is always an Eisegesis of “Thus saith I about that which the Lord hath said.” But that distinction does not imply error.", "Theologically-Sectarian-Preaching is often observed to be structured as a counseling session that recommends emulating sectarian approved Christian behavior while ignoring any Scriptural-deficiency that is observable within the congregation and its pulpit.", "Pulpit preachers ought to recognize the distinction between Theologically- Sectarian-Preaching and Biblical-Preaching. But that recognition seems to be hidden by a withholding of “eyes to see and ears to hear” (Isa 6:10, Matt 13:14).", "The definitional distinction between Theologically-Sectarian-Preaching and Biblical-Preaching is critical to an analysis of “Christian preaching that devalues Scripture.”", "The God of Heaven vs Theophanies of God", "The existence of God can be assumed by simply viewing “the Heavens declaring the glory of God” (Ps 19:1). However, God’s identification of Himself is revealed only by exposition of God’s inspired Words. There is no other means for identifying The Holy God who resides in “the Heavenlies.”", "By contrast each sectarian Theophany of God is man-made by Bible scholars. The best Theophanies and the worst Theophanies each interpret or mutilate the inspired and immutable Words of God.", "Man-made Theophanies of God are typically identified by the names of historic theologians who are famous for conflicting with each other. I observe the historically named Theophanies of God are Arminius, Augustine, Calvin, Ignatius, Luther, Wesley, etc.", "Numerous lesser known Theophanies of God also exist. Lesser known Theophanies of God are honored using man-made titles such as “Pastor,” “Pope,” “Reverend,” “Vicar of Christ,” or etc.", "Every man-made Theophany of God believes doctrinal “understandings” which conflict with the “understandings” believed by rival man-made Theophanies of God.", "Every sectarian Theophany of God disagrees in some sense about the meaning God really intended when God inspired the original text of Scripture.", "Disagreement is the reason sectarians are identified as sectarian.", "Satan’s Temptation vs God’s Will", "I observe Genesys 3:1-5 being typically taught to be Satan’s temptation causing Eve to sin. However, the text simply says “the serpent said unto the women, You shall not surely die for God doth know that in the day ye eat thereof, then your eyes shall be opened, and ye shall be as gods, knowing good and evil.”", "The reality is that “The serpent which the LORD God had made” recited partial Truth to Eve despite being Scripturally identified as “the father of lies” (John 8:44) as well as “the god of this world” (2Cor 4:4).", "Satan was used by God to initiate God’s Purpose-For-Creation in the Garden of Eden by speaking partial Truth. In fact, Adam and Eve continued physical life for more than 900 years after disobeying God.", "The historic reality is that typical humans live until finally dying of old age after a life of continuously repeated sin.", "Contrary to typical hermeneutics, Satan merely interpreted that which God said will occur when Eve chooses to act contrary to God’s “command.” Satan’s partial interpretation emphasized the human aspect of death-by-old-age effectively ignoring the spiritual death of “appointed unto men once to die, but after this the judgment” (Heb 9:27).", "In that regard, Jesus warned His disciples “Take heed that no man deceives you. For many shall come in my name, saying, I am Christ; and shall deceive many” (Matt 24:4). The words “beguile,” “deceive,” “tempt,” “test,” etc. each have unique Dictionary definitions but, for Scriptural applications, those English words are essentially synonymous as to their outcome.", "Both Jesus and the Apostle Paul use variations of the English words “corrupt deception” and “beguile” as warnings. For example, “But I fear, lest by any means, as the serpent beguiled Eve through his subtilty, so your minds should be corrupted from the simplicity that is in Christ” (2Cor 11:3).", "The reality is that Satan is used by God to accomplish “beguilement” and “corrupt deceit” along with pain, suffering, and even crucifixion of God believers like Adam, Eve, Job, “The Son of Man,” and you and me.", "The literature of Job makes it clear that Satan can neither “deceive” nor “beguile” nor “tempt” nor harm in any way unless divinely enabled to do so by the authority of a “Holy” God.", "“There hath no temptation taken you but such as is common to man: but God is faithful, who will not suffer you to be tempted above that ye are able; but will with the temptation also make a way to escape, that ye may be able to bear it” (1Cor 10:13).", "Adam and Eve and Satan and you and me and every other form of life within the universe is in complete subjection to the God who created cause-and-effect to be intrinsic within all of time-and-space. The end of critical definitions and distinctions", "Perhaps these critical definitions and distinctions will encourage you to ask yourself the philosophical question “Why did an omniscient God who knows both the beginning and the end decide to cause these distinctions?”"]}, {"n": 10, "title": "The philosophical basis for this book", "paras": ["The philosophical premise for this book is that knowing why God created anything yields more “understanding” about the meaning of God’s Words than the opinions of the best educated Bible scholars. In fact, Theological Opinions cannot be “trusted with all your heart” simply because Theological Opinions are always challenged by rival theologians.", "Every church affiliation is guilty of “leaning unto the understanding” of Theologically Opinionated Bible scholars. Both sectarian and so-called independent churches affiliate with other churches to evangelize the conflicted opinions of Bible scholars even though those opinions were developed by “leaning unto a conflicted understanding.”", "“Pastor teachers” are hired by churches for pulpit ministry simply because they “Trust” specific Bible scholars. Exceptions are conceivable but “Pastor teachers” are never hired because their pulpit messages teach church attendees how to “trust in the LORD with all thine heart.” That’s the reality taught by this book.", "A correct premise is critical", "Arguably the most popular conflicted opinion about the meaning of God’s Words is rooted in “the beginning when God created the heaven and the earth.” The popular opinion is that God reacted (i.e., changed His mind) to Satan’s temptation of Eve to “sin” rather than sovereignly “predestinating” Eve to “sin.” The premise of this book was developed after observing “Christian preaching that devalues Scripture” being rooted on a bad premise about the source of Eve’s “sin.”", "The text of Ephesians 4 was inspired to reveal that God “gives pastor teachers” to churches in order to generate “the unity of the faith” (4:13). But every Bible school taught “pastor teacher” is observed rejecting God’s “gifting” by an intentional rejection of “the unity of the faith” between conflicted sectarian affiliations.", "God’s philosophical purpose for creating the universe", "Ephesians 1:5 philosophically teaches God has “predestinated those whose name is written in the Lamb’s book of life unto the adoption of children by Jesus Christ to himself, according to the good pleasure of His will.” The English word “predestinated” was translated from Strong’s G4309 “προορίζω,” “from <G4253> (pro) and <G3724> (horizo); to limit in advance, i.e. (figurative) predetermine :- determine before, ordain, predestinate.” Despite the legitimacy of translating Strong’s G4309 some Bible scholars reject the concept of “predestination” because it conflicts with their opinionated “understanding” of making-a-decision to “believeth in Him.” However, when Jesus “adopts children” it is always a decision made by deity and never a decision made by humans. Adoption is always “predestinated.”", "It is linguistically absurd to teach “adoption” is the outcome of a volitional decision made by humans who are “dead in trespasses and sin” (Eph 2:1) because “dead” people are divinely precluded from choosing to become “adopted by Jesus Christ to himself.”", "God’s “predestination” is philosophically emphasized in Ephesians 3:2-12 where the Apostle reveals “the mystery” that God created everything “to the intent that the principalities and powers” will be educated by “churches” demonstrating the distinction between the “Tares and Wheat” (Matt 13:24ff). That demonstration was “predestinated” by “the determinate counsel and foreknowledge of God before the foundation of the world.”", "Ephesians 3 philosophically reveals that “the good pleasure of God’s will” was hidden as a “mystery from the foundation of the world” until the AD60 “dispensation of the grace of God which is given me to you-ward” when God inspired the Apostle Paul to partially reveal “the mystery” to “the saints which are at Ephesus.” “The mystery” is scheduled for completion in 2Peter 3:10 when “the day of the Lord will come as a thief in the night; in the which the heavens shall pass away with a great noise, and the elements shall melt with fervent heat, the earth also and the works that are therein shall be burned up” simply because The Creator no longer needs any of the temporary and disposable tools He created for educating “the principalities and powers in the heavenlies.”", "My speculation about why God hid “the mystery”", "Scripture does not reveal the reason God delayed “the dispensation of the grace of God.” However, my observations of human nature suggest that God’s Purpose requires statistical protection from sabotage by well-intentioned humans who believe God wants you and me to resist “the evil of sin” before any of us can be saved. Bible scholars tend to ignore that an omnipotent God neither needs nor wants humans to help by resisting “the evil of sin.” It is a “deceitful lie” to teach Salvation is a shared effort between God and humans.", "I speculate that “the manifold wisdom of God” was to statistically protect God’s Purpose-For-Creation from sabotage until after “the Church” was initiated in AD 60 such that humans who have the best of religious intentions to obey God are no longer capable of sabotaging God’s plan by attempting to resist “the evil of sin.”", "One example of the risk of sabotage is that God believing Jews would never vote to crucify Jesus if they had been given “eyes to see and ears to hear” that Jesus was literally their promised Messiah (1Cor 2:8). God believing Jews also attempted to protect God’s “Holiness” by eliminating “blasphemy; because that thou, being a man, makest thyself God” (John 10:33). Similarly modern Bible scholars would never establish doctrinally conflicted sectarian churches if they had “eyes to see and ears to hear” God’s Purpose for “the church.”", "However, as of AD60 there was no longer a statistical risk of sabotage that prevents “the crucifixion of Jesus.” Accordingly, the “mystery” can now be partially revealed simply because “the unified church being built by Jesus” can now be compared with “the evil conflict between sectarian belief systems.” Some", "nd “Dispensational” aspects of God’s plan are essentially complete with the 2 coming of “the LORD” but completion of the “Covenantal” aspects (e.g., “the 144000” of Rev 7:4) of God’s plan seem to follow the resurrection of “the church” while preceding the scheduled destruction of 2Peter 3:10. God’s Purpose-For-Creation will be finalized by the destruction described in 2Peter 3:10.", "God is the authority who “predestines” which “lost” humans will be “redeemed to be included within the unified church Jesus is building.” That authority is the basis for the philosophical axiom quoted in John 3:6 “That which is born of the flesh is flesh; and that which is born of the Spirit is spirit.”", "Jesus logically builds on that philosophical axiom in John 3:7 where He instructs Nicodemus “Marvel not that I said unto thee, Ye must be born again.”", "That same philosophical axiom is the basis for John 3:16 “that whosoever believeth in him” has already been “born again of the Spirit to inherit the DNA of everlasting life as well as inherited the Spiritual discernment to believe in Him.”", "I assume my speculation is linguistically correct", "All the above is merely my own philosophical speculation about why God withheld revealing “the mystery” until Scripture was almost completely inspired. However, if you find my speculation is disagreeable then what reason do you speculate for withholding revelation of “the mystery” until AD60 when the epistle was inspired to be written?", "Nevertheless, the primary activity demonstrating “the manifold wisdom” of God’s Purpose-For-Creation was “predestined” to be Jesus “coming to seek and save the lost who would populate the church being built by Jesus.” The prehistoric preparation for that demonstration occurred when “the Lamb was slain before the foundation of the world” (Rev 13:8, et al).", "The axiom quoted in John 3:6 is the philosophical basis for the comparison between those who are “born of the flesh” versus those who are “born of the Spirit.” Everyone who is “born of the flesh is appointed once to die and after that the judgement.” On the other hand, everyone who is “born again of the Spirit” is “predestined” to inherit a new Spiritual life that is “everlasting and cannot perish” simply because a resurrected “life in the heavenlies” precludes the existence of both “sin and death.”", "Since AD60 there is no longer a statistical risk of God’s Purpose-For-Creation (i.e., the “crucifixion, death, and resurrection”) being sabotaged by humans who insist on helping God by resisting “the evil of sin.”", "God uses conflict between churches to demonstrate the distinction between “good and evil” as well as the distinction between “Holiness and Sinfulness.” As of AD60 the demonstration of that distinction is revealed in Ephesians 3 as being “to the intent that” God’s Purpose-For-Creation is being fulfilled. In other words, the conflict between sectarian churches was philosophically “predestined” by God.", "Sectarian churches are populated with both “redeemed” Christians who have “everlasting life that cannot perish” and “unredeemed” Sinners who are “appointed to death and judgement for their sin.” The admixture of “Tares and Wheat” within every sectarian congregation will be resolved “in the time of harvest” according to Matthew 13:30 when Jesus instructs “the reapers to gather ye together first the tares, and bind them in bundles to burn them: but gather the wheat into my barn.” The text is clear that Jesus already knows which of us is “wheat” to be harvested and which of us is “tares” to be burned.", "Sectarian conflict philosophically demonstrates that Bible scholars lack “eyes to see and ears to hear” as reported in Isaiah 6:10 and Matthew 13:10ff. Thus, Bible scholars cannot be “trusted” simply because each of them is evaluated as a “liar” in Romans 3:4.", "If modern “blind and deaf” Bible scholars “trusted in the Lord with all their heart” they would never “lean unto their own understanding” about the meaning of God’s Words. Even the best Bible scholars build affiliations of conflicted churches rather than “trust” Peter’s declaration in Matthew 16:16-18 “Thou art the Christ, the Son of the living God” to which Jesus responds, “I will build my church; and the gates of hell shall not prevail against it.” Without exception “the church” being built by Jesus is distinct from every sectarian church built by Bible scholars who exhibit a “predestined” lack of “eyes to see and ears to hear the oracles of God.” That same declaration by Peter is also the philosophical basis for the Matthew 24:4-6 warning by Jesus “Take heed that no man deceive you. For many <Bible scholars> shall come in my name, saying, I am Christ; and shall deceive many. And ye shall hear of wars and rumors of wars: see that ye be not troubled: for all these things must come to pass, but the end is not yet.”", "Religious conflict (i.e., “wars and rumors of wars”) is the philosophically guaranteed outcome of “coming in my name and deceiving many.” Sectarian conflict is one of many examples of “the gates of hell that shall not prevail against the church being built by Jesus.”", "Bible scholars are guilty of “deception” when they teach Matthew 24 as if it is eschatological discourse. Merriam-webster.com defines “Eschatology” as “a branch of theology concerned with the final events in the history of the world or of humankind.” “Eschatology” studies “the end of everything.”", "The rationale for assuming that Jesus is teaching eschatology is the disciple’s question “when shall these things be?” But Jesus already knew that “wars and rumors of wars” have characterized God’s creation since “Cane killed Abel.” The reality is that “In the beginning God created the heaven and the earth” to initiate “the End Times.” Every human including Adam and Eve and you and me has always lived in “the End Times.”", "Obviously there are eschatological events scheduled to occur when “time literally ends” but the scholarly opinion that “wars and rumors of wars” characterize the “End Times” negates the teaching of Jesus that conflicted Bible scholars “shall come in my name” with the best of religious intentions – Bible scholars really believe they serve God.", "Bible scholars have been philosophically “deceived” to believe “the lie” that “wars and rumors of wars” eschatologically indicate “the End Times.” Some Bible scholars even “deceptively” teach that a sovereign God who created everything does not always get His own way. Search the web for “Does God always get his way” to see examples of theological opinions being taught by Bible scholars who sincerely believe they are serving God by “leaning unto their own understandings.”", "Every eschatological opinion about “the End Times” is at risk of being incorrect simply because “the End” has not yet happened. That kind of philosophical “deception” is another example of “the gates of hell that shall not prevail against the church being built by Jesus.”", "The philosophical reality is that every event in time-and-space brings us closer to “the End.” Reality suggests “the Beginning and the End” is merely a series of events that were scheduled (i.e., “predestined”) “by the determinate counsel and foreknowledge of God before the foundation of the world.”", "If God’s Word is correct then the “cause-and-effect of time-and-space” (i.e., “predestination”) is the means chosen by God for sequentially educating “the principalities and powers in the heavenlies.” Creation of a sequential “cause-and-effect” environment was necessary because “Evil” cannot exist where God resides. Cause- and-effect is a created reality simply because absolutely nothing exists “in the heavenlies” that can demonstrate the distinction between “Good and Evil.” As of AD60 that sequential distinction had already been observed by “the principalities and powers in the heavenlies” because they can literally see “the end of time.”", "When God’s education of “the principalities and powers” is finished in time-and- space “the heavens shall pass away with a great noise, and the elements shall melt with fervent heat, the earth also and the works that are therein shall be burned up” (2Peter 3:10). There will no longer be any need for “the sequential cause-and-effect of time-and-space” simply because God’s Purpose-For-Creation will be complete.", "God’s philosophical purpose is not ambiguous", "“Deceived” Bible scholars teach the opinion that Scripture contains ambiguity that must be interpreted before it can be believed and obeyed. Those scholars “lean unto their own understanding” to manufacture conflicted hermeneutical rules for philosophically interpreting that which God really meant to say. And sectarian Bible schools teach those hermeneutics “to the intent that” conflicted “understandings” of God’s meaning are being preached from the pulpit in your own church.", "The philosophical reality is that the “deception” of religious leadership is intended by God as evidenced in Isaiah 6:9-10 as well as repeated by Jesus in Matthew 13:13-15. God intends the outcome of that kind of “deception” to be diverse forms of philosophical “wars and rumors of wars” as well as “Christian preaching that devalues Scripture.”", "Without exception every instance of philosophical and religious “wars and rumors of wars” is the outcome of God’s Purpose-For-Creation.", "God’s plan has always been to demonstrate the distinction between “good and evil” by creating “wars and rumors of wars” between philosophers. And some of those philosophers are also Bible scholars. Rival Bible schools teach rival doctrine “to the intent that” pulpit conflict is common between Bible school trained “pastor teachers.” This book analyzes the preaching of “pastor teachers” who studied at Bible schools established to compete with rival sectarian affiliated Bible schools. Religious leaders are taught that God’s Holy Words are difficult for mere humans to “understand.” Pulpit conflict indicates religious leaders think of themselves “more highly than they ought to think” (Rom 12:3). The evidence suggests that every instance of “Christian preaching that devalues Scripture” is motivated by the conflicted opinions taught by Godly and well-intentioned Bible scholars who have the best of religious intentions to teach “pastor teachers” to lead sectarian churches to believe sectarian approved conflicted doctrine.", "The observation of pervasive pulpit conflict between the wisest and best educated “pastor teachers” is confirmation of that which God inspired to be reported in 1Corinthians 1:26-29", "For ye see your calling, brethren, how that not many wise men after the flesh,", "not many mighty, not many noble, are called. But God hath chosen the foolish things", "of the world to confound the wise; and God hath chosen the weak things of the world", "to confound the things which are mighty. And base things of the world, and things", "which are despised, hath God chosen, yea, and things which are not, to bring to", "nought things that are so that no flesh should glory in his presence.", "In other words, only “few” Bible scholars have been “called and elected” to be saved despite all the decisions they think they have made.", "This book is a philosophical analysis of my personal observation that Christianity is characterized by sectarian disagreement about the Romans 3:2 “oracles of God.” Disagreement about the approved method for “redemption” of sinners is a pervasively common example.", "Some Bible scholars argue that “redemption” is attained by the free will decisions made by humans “who are already dead in trespasses and sin.” Rival Bible scholars argue that “redemption” is “predestined.”", "The wisest and best educated Bible scholars argue about the Biblical means of “redemption” of sinners rather than “trust in the LORD with all thine heart.” The mere existence of ecclesiastical conflict makes it impossible to get consensus about what “the oracles of God” really mean. Every theological contradiction can be resolved by “rightly dividing the Word of Truth” but the publicly observable evidence is that preachers are being taught to hermeneutically interpret Biblical text rather than “Study to shew thyself approved unto God, a workman that needeth not to be ashamed, rightly dividing the word of Truth” (2Tim 2:15).", "I have never attended an accredited Bible school so I have no academic credential for analyzing sectarian approved doctrine. But credentials are useless when rival Bible schools are publicly observed educating pulpit preachers to prepare messages according to a proprietary hermeneutic that results in a scholarly assumption about that which an immutable God really meant to say.", "I admit my writing could be viewed as polemic. But the publicly observable evidence of sectarian approved pulpit conflict forces me to ask who or what is the real literary source for the messages being preached in churches that claim the philosophical absurdity that their conflicted doctrinal opinions are based on God’s Words?", "Sectarian conflict between the wisest and best Bible school educated pulpit preachers indicates the text commonly used for preparation of pulpit messages is a proprietary Dataset of Literature authored by multiple sectarian approved Bible scholars who teach their conflicted hermeneutical interpretations that result in sectarian approved “deceitful lies” about the “oracles of God.”", "Some in my own family believe God inspired ambiguity into Scripture. My own family has been “deceived” into assuming the absurdity that God intends local church “pastor teachers” to clarify God’s ambiguity for the benefit of church attendees who lack Bible school training. The “deceptive” means used by sectarians to clarify Scriptural ambiguity is summarized by the English term “hermeneutics.”", "However, using hermeneutics is never “Trust in the LORD with all thine heart and He shall direct thy path.” Hermeneutics is always “leaning unto your own understanding.” Dependence on hermeneutics is an absurdity for those who “trust in the LORD with all their heart.” That kind of absurdity forces the philosophical question “Why would an omniscient and omnipotent God allow anyone to clarify any ambiguity which an omniscient God may have inspired?”", "Isn’t God capable to provide “eyes to see and ears to hear” for those whom God intends to “understand” God’s Words? It is philosophically true that being taught to depend on Bible scholars to interpret the meaning of God’s Words de facto means you are not “trusting the LORD with all your heart” and God is not “directing your path.”", "If Scriptural ambiguity can be shown to literally exist it absolutely must be assumed as fulfilling God’s Purpose-For-Creation. But why would an omniscient God inspire ambiguity? Doesn’t God want us to “know the Truth so the Truth can set us free” (John 8:32)? God’s answer to those questions is likely contrary to the “deceitful” teachings of the Bible scholars whom you “Trust with all your heart.”", "Without exception, accusations of doctrinal error are polemic. That’s the reason I avoid accusations of doctrinal error by relying on my own observation that every instance of Biblically based pulpit conflict is the outcome of a sectarian hermeneutical system of interpretation. Biblically based pulpit conflict is always the outcome of Eisegesis rather than Exegesis. The Christian religion is ostensibly based on the Words originally written in the literary compendium we identify using the English word “Scripture.” But that compendium has remained unchanged for thousands of years. Every sectarian conflict should have been resolved in that length of time yet Bible scholars are conflicted.", "This book suggests that all pulpit conflict is a cause-and-effect that was intended “In the beginning when God created the heaven and the earth.”", "It is interesting to note that those who rely on sectarian approved hermeneutics typically use the honorific “LORD” to address the Author who inspired the compendium. Modern conflict exists simply because those who address the Author of the compendium as “LORD” also rely on a sectarian created Theophany of God to manufacture the hermeneutics that an omniscient “LORD” seems to have forgotten.", "Exegesis of “the LORD’s” compendium reveals God’s Truth. Eisegesis of “the LORD’s” compendium reveals conflicted sectarian opinions. I suggest the pervasiveness of conflicted sectarian opinions explains why “the gates of hell prevail against” every “church” except “the church being built by Jesus Christ.”", "Christianity is a religion composed of philosophically conflicted sectarian affiliations which rely on sincere but conflicted Bible scholars to hermeneutically eisegete the meaning they assume God intended. An incorrect assumption of ambiguity has been “deceptively” inflicted upon Truth by the wisest and best educated Bible scholars.", "It is obvious that Biblical exposition is sometimes heard from sectarian pulpits. Nevertheless, every Bible school teaches “pastors and teachers to trust” the opinions of a sectarian created Theophany of God rather than “Trust in the LORD with all thine heart.” If that analysis is correct then Bible school taught sectarian preachers ought to admit they “lean unto the understanding of a Theophany of God” rather than “Trust in the LORD with all thine heart.”", "The mere existence of sectarian pulpit conflict irrefutably indicates Bible schools have failed to teach the academic skill of reading God’s Literary-Compendium “to the intent of rightly dividing” every statement about every identifiable subject but especially every statement about the literary subject of God’s-Purpose-For-Creation.", "God’s Purpose-For-Creation is fulfilled by a bad premise", "If God’s Purpose-For-Creation is to demonstrate the distinction between “good and evil” then conflicted hermeneutics literally fulfills God’s Purpose that the “evil” of scholarly “deception” will be observed by “the principalities and powers in the heavenlies.” The inexplicable “mystery” is that Pulpit conflict literally fulfils God’s Purpose- For-Creation. Without exception, every Biblical hermeneutical system is manufactured to analyze what God is doing to react to “sin” rather than to ask why an omniscient God chose to create “the evil of sin.” The pervasiveness of religious conflict suggests God’s Purpose-For-Creation is divinely “misunderstood.” That’s why Eve sinned immediately after God provided everything that sustains life. That’s why “God’s Chosen People” sinned immediately after Moses received “The Law.” “Called and elect Christians” sin immediately after being “redeemed.” “Pastor teachers” sin immediately after being “gifted by God for the perfecting of the saints, for the work of the ministry, for the edifying of the body of Christ.” “Sinning.” Everything is done according to God’s plan.", "“From the foundation of the world” God’s Purpose-For-Creation has been to demonstrate the distinction between “good and evil.” Thus, the statistical risk has always been that religious God believers would resist “the evil of sin.” However, God believers resisting “the evil of sin” would hinder God’s Purpose-For-Creation so an omniscient God has eliminated any probability of that kind of statistical risk by hiding His Purpose as a “mystery.”", "Modern Bible school education is typically based on the “deceptively” incorrect premise that everything was created because “God so loved the world, that he gave his only begotten Son, that whosoever believeth in him should not perish, but have everlasting life.” However, the English term “whosoever” in John 3:16 is never a universal inclusive as “deceptively” assumed by some Bible school hermeneutics. For example, the statement “whosoever believeth Ford makes the best cars” is never a universal inclusive of everyone who drives a car.", "“Whosoever believeth in him” is always the outcome of “predestination unto the adoption of children by Jesus Christ to himself, according to the good pleasure of his will” (Eph 1:5ff). It is an “outcome” rather than a “requirement.”", "It is philosophically conclusive that both Testaments of the Bible are being mis- interpreted by conflicted sectarian hermeneutics deliberately designed to support the invalid premise that anyone can be saved. That premise is “deceptive” simply because it is a linguistic absurdity. And yet that seems to be exactly as God intended.", "Every “deceptive” interpretation fulfills God’s Purpose-For-Creation. A literal “Trust in the LORD with all your heart” is manifest by continuously asking “why” would an omniscient God do it that way? God created a philosophical Case Study", "The reality is that God created everything as a Case Study to teach “the manifold wisdom of God to the principalities and powers in the heavenlies.” God initiated His Case Study by planting “the tree of the knowledge of Good and Evil” in the midst of the Garden. God may have also had additional reasons for creation but God’s inspired epistle to the Ephesians reports only this single reason.", "The subject studied in secular Case Studies is always hidden to protect statistical validity – the statistical term “double blind” is used to describe Case Study security. Search the web for “double blind case study” if you are not familiar with the term.", "I believe the necessity for “double blind” security is the philosophical reason God’s Purpose-For-Creation had to be hidden as a “mystery” until the epistle to the Ephesians was inspired in AD60.", "Modern Bible school teachers and students ought to be aware the “mystery” was revealed several thousand years ago in AD60 with the Apostle Paul’s conditional KJV statement “If ye have heard of the dispensation of the grace of God which is given me to you-ward” (Eph 3:2).", "That conditional introduces Paul’s explanation that “the determinate counsel and foreknowledge of God” has always been to educate “the principalities and powers in the Heavenlies” by creating a double-blind time-and-space Case Study to be used as a cause-and-effect teaching tool.", "Double-blind Case Study participants (i.e., disposable humans) are continuously being replaced by new disposable “born of the flesh” humans to populate God’s time- and-space laboratory until God’s Purpose for His time-and-space Case Study has been completed.", "The apostolic initialization of “The Church which is being built by Jesus” was completed sometime prior to AD60 so there is no longer any need for “double blind” Case Study security. All that remains is for “the principalities and powers” to observe the foolishness of Bible scholars as they create every cause-and-effect of “evil” sectarian conflict.", "Before creation it was impossible for “Seraphim” to intellectually “cry unto another, and say, Holy, holy, holy, is the LORD of hosts: the whole earth is full of his glory” simply because “the whole earth” did not yet exist.", "The need for a “double blind” Case Study also explains why conflicted hermeneutics are taught in Bible schools. Bible scholars and the Bible schools they established were “predestined from before the foundation of the world” to teach conflicted hermeneutics. The invalid premise of Free-Will is assumed by “many” sectarians. But there is literally no such thing as Free Will in all of God’s creation just as there is no such thing as a Random Event. God’s creation operates according to the cause-and-effect of Newton’s 2nd Law of Motion. For example, the location of every celestial body is known in perpetuity. The sectarian premise of a Free-Will effectively rejects God’s Sovereign Will.", "Readers who are Biblically proficient are also requested to appraise my quotes from Scripture to affirm I have accurately applied “Thus saith the Lord” rather than manufacture the kind of polemic that would have been discovered and rejected by the Bereans in Acts 17:11.", "I humbly confess I am a member of the set of those whom God evaluates as “liars” in Romans 3. Thus, my prideful words ought never be conflated with statements of Truth. Nevertheless, I humbly request that you pause reading my book to meditate on the philosophical implications to World History if Adam and Eve had obeyed God and the implications to World History if every Biblical scholar would “trust in the LORD with all your heart and lean not unto thine own understanding.”", "The most significant question asked in this book", "As you meditate on those philosophical implications please also meditate on this particularly revealing question:", "Can you conceive any justification for the existence of so many doctrinally similar Sectarian Churches and Affiliations who compete with each other despite believing similar Biblically based doctrines?", "That single question may be the most critically revealing question asked in this entire book. Sectarian “pastor teachers” deliberately and purposefully reject “the unity of the faith” as gifted by God (Eph 4:11ff)."]}, {"n": 11, "title": "The Biblical justification for this book", "paras": ["The prior chapter presented a Philosophical justification for this book. This chapter presents a Biblical justification for the same book.", "Even though I am the author of this book my pen name is Theophilus. The only reason my pen name is significant is that I am addressed in both Biblical documents divinely inspired to be authored by Luke.", "This is the way I am addressed in the Gospel of Luke.", "Forasmuch as many have taken in hand to set forth in order a declaration of", "those things which are most surely believed among us, even as they delivered them", "unto us, which from the beginning were eyewitnesses, and ministers of the word; it", "seemed good to me also, having had perfect understanding of all things from the", "very first, to write unto thee in order, most excellent Theophilus, that thou mightest", "know the certainty of those things wherein thou hast been instructed.", "And this is the way I am addressed in the Acts of the Apostles.", "The former treatise have I made, O Theophilus, of all that Jesus began both to", "do and teach, until the day in which he was taken up, after that he through the Holy", "Ghost had given commandments unto the apostles whom he had chosen.", "Luke wants Theophilus to be aware of certain Truths", "Luke teaches “the certainty of those things” (Lk 1:4) such as “the Son of Man is come to seek and to save that which was lost” (Lk 19:10) by “the determinate counsel and foreknowledge of God to be crucified and slain by wicked hands” (Acts 2:23).", "I am “certain” that the English term “the Son of Man” refers to the offspring of the womb of a human female virgin named Mary (Lk 1:26ff). Mary’s child was named Jesus as ordered by “the angel Gabriel.”", "Jesus is “The Son of Man” simply because Mary, His mother, was descended from Adam and Eve.", "I am also “certain” that Mary’s virgin womb was impregnated by “God’s Holy Spirit” (Lk 1:35). Thus, Jesus was also the “Son of God” simply because Jesus was a descendant of God the Father.", "Both “certainties” were “predestined” by “the determinate counsel and foreknowledge of God” such that the “Son of Man” co-existed with the “Son of God” in the incarnated human body of “the Lamb slain before the foundation of the world.” That co-existence was announced by Jesus in John 14:7 when “the incarnated Son of Man” declared “If ye had known me, ye should have known my Father also: and from henceforth ye know him, and have seen him.”", "That co-existence also established God’s DNA pattern for the “born of the flesh humans” whom “the Son of Man came to seek and to save.” It is “certain” that every “born of the flesh” human co-exists with a “born of the Spirit” human whose name was registered in “the book of Life before the foundation of the world” (Rev 13:8). Thus, I am “certain” that both “human life” and “Spiritual life” are “the gift of God lest any man should boast” (Eph 2:9).", "The English word “lost” in Luke 19:10 was translated from the Greek word “ἀπόλλυμι”; Strong’s G622, “from <G575> (apo) and the base of <G3639> (olethros); to destroy fully (reflexive to perish, or lose), literal or figurative :- destroy, die, lose, mar, perish.” That definition applies to every “born of the flesh” human whom God made to be a child of “your father the devil” (John 8:44) who is also “the god of this world” (2Cor 4:4).", "“The devil” was created by God to be “the god of this world” who owns every “born of the flesh” human including “The Son of Man” who “died and after that was judged to be without sin so that He could ransom the lost.” “The determinate counsel and foreknowledge of God” planed the “redemption” that paid the ransom price established to purchase “a few” (Matt 7:14) of the “slaves of sin” (Rom 6:17) who were owned by “the god of this world.”", "“The Son of Man” was divinely prepared for His assignment to “redeem that which is lost” from ownership by “the god of this world” by being “led by the Spirit into the wilderness, being forty days tempted of the devil” (Matt 4:1). The fact that “he fasted forty days and forty nights” simply emphasizes that Jesus was “tempted of the devil” both physically as well as morally. In fact, the incarnate Jesus “was tempted in all points” as the worst-case example of every “born of the flesh” human slave owned by “your father the devil.”", "God established “the born of the flesh Son of Man” as the final “Sin-Offering” which was officially initiated in Leviticus 4:1ff even though “Able,” the second son of Adam and Eve implied that he already knew about that “Sin-Offering.” “The Son of Man” declared His assignment was complete “when Jesus had cried with a loud voice, he said, Father, into thy hands I commend my spirit: and having said thus, he gave up the ghost” (Lk 23:46). Until that instant “the Son of Man” was still capable of submitting to “the god of this world.” However, while still on the cross “he said, it is finished: and he bowed his head, and gave up the ghost” after which He was buried as a “born of the flesh” human who had died.", "The only thing that distinguished “The Son of Man” from every other “born of the flesh” human is that Jesus “was in all points tempted like as we are, yet without sin” (Heb 4:15) – no other “born of the flesh” human can make that claim.", "The official Levitical command to sacrifice for infractions of the Law was divinely replaced when God “abolished the Law” (Eph 2:15) as reported in Galatians 4:4-5 “But when the fulness of the time was come, God sent forth his Son, made of a woman, made under the law, to redeem them that were under the law, that we might receive the adoption of sons.”", "It was necessary for “the Son of Man” to be crucified because neither “God-the- Father” nor “God-the-Son” can be “tempted to sin” nor can either of them “die.” Only the shed blood of a completely “sinless” human could provide the ransom paid to “your father the devil” for the “redemption” of those who had been born to be “slaves to sin” (Rom 6:16).", "Some Bible school trained religious leaders teach that Ephesians 1:7 defines “redemption” to be nothing more than “forgiveness of sin.” Please affirm that “redemption from sin” can never be conflated with “forgiveness of sin.” Non- equivalence was emphasized by Jesus when He charged those whom He “forgave” to not reveal their “forgiveness” to anyone because that knowledge could sabotage His eventual crucifixion by the most religious God believers in the world.", "The conclusion of Luke’s Certain Truth", "The point of this review of Luke’s assertions of “certain” Truth is to allow God’s own Words to describe “the manifold wisdom of God to the intent that now unto the principalities and powers in heavenly places might be known BY THE CHURCH the manifold wisdom of God” (Eph 3:10). And Jesus, “the Son of Man” predicted “I will build my church and the gates of Hell shall not prevail against it” (Matt 16:18). “The gates of Hell” are not defined but “prevailing against unity” is the equivalent of religiously “leaning unto your own conflicted understandings.”", "The initiation of “THE CHURCH” is critically important to the fulfillment of God’s Purpose-For-Creation. However, “seeking and saving the lost” is merely a single step in the process of “Jesus building His CHURCH” so that “the manifold wisdom of God’s salvation” can be demonstrated to “the principalities and powers in heavenly places.”", "“The eleven disciples” (Matt 28:16-20) were commissioned to “Go ye therefore, and teach all nations, baptizing them in the name of the Father, and of the Son, and of the Holy Ghost: teaching them to observe all things whatsoever I have commanded you: and, lo, I am with you always, even unto the end of the world.” But none of “the eleven disciples” is reported to have appealed to Isaiah 49:6 “I will also give thee for a light to the Gentiles, that thou mayest be my salvation unto the end of the earth.” Without exception, the Apostle Paul is only Apostle described in Scripture as fulfilling God’s promise to Isaiah when Paul became “the Apostle to the Gentiles” (Rom 11:1-13). Accordingly, the so-called “Church Age” is one of the “Dispensations” revealed in Scripture.", "The only non-apostolic “Christian church” identified in Scripture was led by James, the half-brother of Jesus. It seems the church located in Jerusalem was populated entirely by Jews who believed that the crucified and resurrected Jesus merely fulfilled the Law of Moses. Churches organized to practice some denominational form of obedience to the Law of Moses are never Biblically organized. By contrast, God is the Organizer of “the unified church being built by Jesus.”", "Please affirm that neither “the eleven disciples” nor “the apostle to the Gentiles” has responsibility to “seek and save that which is lost.” Only Jesus has that divine responsibility. And only “the eleven disciples” were given the “Great Commission to go into all the world and preach the Gospel.” “Preaching the Gospel” proclaims the Good News rather than “win souls” (Prov 11:30).", "God’s Purpose-For-Creation was never that Adam and Eve and their descendants would be without sin else there would be no one for Jesus to “Seek and Save.” Rather, every descendant of Adam and Eve is a sinner who is “born of the flesh” to be “that which is lost.” Every “born of the flesh” human is a temporary and disposable tool for demonstrating the need for “the Son of Man to seek and save that which was lost.” Adam and Eve immediately demonstrated their need for salvation exactly as God intended (i.e., “predestined”). Every “born of the flesh” descendant of Adam and Eve continues to demonstrate that need exactly as God intended (i.e., “predestined”).", "It has always been a “mystery” that Adam and Eve and their descendants each enter life as children of “your father the devil” to be used as an object lesson in the education of “the principalities and powers.” Readers who are Biblically proficient are asked to affirm Ephesians 3:2-10 literally reveals “The mystery” of God’s Purpose- For-Creation.", "Luke’s assertion of “certain Truth” is the God inspired source for all the above conclusions derived by “Trusting the LORD with all my heart.”", "Luke was there when the Gospel was challenged", "Luke also wants Theophilus to know “the certainty” that the Grecian Luke “had perfect understanding of all things from the very first” (Lk 1:3). That suggests that Luke was present when “some of them were men of Cyprus and Cyrene, which, when they were come to Antioch, spoke unto the Grecians, preaching the Lord Jesus” (Acts 11:20). Or else Luke’s assertion “from the very first” may refer to the Acts 13:2 event when “the Holy Ghost said, separate me Barnabas and Saul for the work whereunto I have called them.” Or “from the very first” may reveal that Luke literally interviewed Mary after the birth of Jesus was angelically announced.", "Doctor Luke may have already been hired to serve as the personal physician of a prominent Jewish Pharisee named Saul.", "Scripture is not clear when Luke’s “perfect understanding” began. But it is not important because tradition teaches that Luke was “the Grecian Doctor” who always traveled with Saul/Paul. Thus, “the certainty of” 1st Century God-believers challenging the doctrine taught by “Barnabas and Saul/Paul” was personally observed by “The Grecian Doctor” Luke as those events happened in time-and-space after “Barnabas and Saul” had been “called and separated” by “the Holy Ghost” (Acts 13:1ff) but before the Acts 15 Church council was called.", "The 1st Century challenges by Jewish God-believers were driven by their faith that a “righteous” God would never “abolish” the requirement to obey “The Law of Commandments” which God explained so thoroughly in the books of Leviticus (the 1st report of the Levitical Law) and Deuteronomy (the 2nd report of the Levitical Law).", "Perhaps your Bible scholars taught you to believe that obeying the “Law of Commandments” describes the process by which you attain the Holiness of Entire Sanctification. But the Old Testament reveals “God’s righteous Law” being continuously disobeyed by “God’s Chosen People.” The uncomfortable truth is that everyone shares the same guilt as “God’s chosen people.” God teaches that even the slightest instance of “sin” must be paid for by a blood-shedding sacrifice. Ephesians 2:15 teaches “The Law of Commandments” was never intended to “redeem sinners.”", "The 1st Century Jewish believers assumed the means for attaining Entire Sanctification was obedience of the Mosaic Law. Some modern sectarians essentially agree with those 1st Century God-believers that Entire Sanctification is a process that is divinely shared between God and humans. Some sectarians literally teach the Ephesians 1:7 divine gift of “redemption” is nothing more than “forgiveness of sins” that precedes Entire Sanctification. But Ephesians 2:15 is clear that obedience is “abolished” as the means for attaining Entire Sanctification because “the Law” never offered “redemption.”", "“God’s Chosen People” as well as some modern sectarians are correct that “Holiness unto the LORD” is defined by God’s “righteous Law.” However, neither God nor Moses nor any prophet taught God’s “righteous Law” financed “redemption” from Satan’s ownership.", "Contrary to a common sectarian “understanding” of Ephesians 1:7, “forgiveness” is merely a function of “redemption.” “Forgiveness” is neither equivalent to nor a substitute for “redemption.” “Redemption” finances an “everlasting” purchase from the ownership of Satan while “forgiveness” is always temporary (i.e., Jesus said “go and sin no more”). In other words, Christians are “forgiven” eternally only because they have been eternally “redeemed” rather than receiving a temporary “forgiveness” that must be followed by the command to “go and sin no more.”", "It is intuitively obvious an omniscient God never expected “God’s Chosen People” to comply with “the Law” simply because “God’s Chosen People” were “predestined” by God to “crucify the Lord of Glory” (1Cor 2:8).", "Biblically proficient readers know the assumptions of 1st Century God-believing “Chosen People” were wrong because “the Apostle who was commissioned by the resurrected Jesus as the Apostle to the Gentiles” (Acts 9:15) was inspired to reveal that “abolishment of the law of commandments” has always been God’s Purpose “which in other ages was not made known unto the sons of men (e.g., God’s Chosen People), as it is now revealed unto his holy apostles and prophets by the Spirit … To the intent that now, unto the principalities and powers in heavenly places, might be known BY THE CHURCH the manifold wisdom of God” (Eph 3:2-10).", "God’s Purpose-For-Creation was to teach “the knowledge of good and evil” to “the principalities and powers in heavenly places” so they could intelligently worship God by declaring “Holy, holy, holy, is the LORD of hosts: the whole earth is full of his glory” (Is 6:3). Education of “the principalities and powers” divinely began by viewing Eve’s proclivity to “evil lust” (James 1:14-15) and continued by viewing that same “evil lust” in “God’s chosen people.”", "As of AD60 the time-and-space education of “the principalities and powers” has been partially completed by the Apostle Paul’s initiation of “THE CHURCH being built by Jesus.” The next step of God’s Purpose is the “resurrection” of earthly church attendees who have been “called and elect” out of “the earthly version of THE CHURCH” to be instantly reinstated as “the Heavenly version of THE CHURCH which Jesus is building.”", "Eventually, “the heavens shall pass away with a great noise, and the elements shall melt with fervent heat, the earth also and the works that are therein shall be burned up” (2Peter 3:10). The time-and-space attribute of creation will no longer exist because a completed educational process eliminates any further need for the intrinsic cause- and-effect of time-and-space. Before “God created the heavens and the earth” “The principalities and powers in the 3rd heaven” (2Cor 12:2) had no opportunity to learn about “evil.” But, since “creation of the heavens and the earth, the principalities and powers” literally observe every time- and-space occurrence of “the evil of sin.”", "Establishment of “THE CHURCH” was “predestined by the manifold wisdom of God before the foundation of the world.” God’s Old Testament teaches the need for “the lost to be sought and saved” (Gal 3:24). God’s New Testament teaches God’s “mysterious” plan for resolving that need. Both Testaments describe disposable humans being used to demonstrate “God’s manifold wisdom” to “the principalities and powers in the heavenlies.”", "“The time-and-space version of THE CHURCH” is populated with both “redeemed” and “un-redeemed” God-believers. But “the Heavenly version of THE CHURCH” is populated with only “redeemed” God-believers who have been “Spiritually born again to have the DNA of everlasting life” and whose “names were written in The Lamb’s Book of Life before the foundation of the world.”", "God’s Purpose-For-Creation was “To the intent that the principalities and powers” could view “the coming of the Son of Man to seek and to save” everyone who was listed in “the Lamb’s book of life” (Rev 20:12). Accordingly, “The Law was our schoolmaster to bring the called and elect unto Christ so that they might be justified according to the faithfulness of God to fulfil His promise” (Gal 3:23-25). The evidence also suggests God created humans to have the appearance of self-generated faith but a self-generated human faith has never justified anything. “God’s justifying Faith is not of yourselves. God’s justifying Faith is always the gift of God. God’s justifying Faith is not of works lest any man should boast” (Eph 2:8-9).", "The reality is that God does whatever God wants to do despite any conflicted opinions about the self-generated “faith” that may be manufactured by sectarian Christians who have been “deceived” into believing “the lie” that they were given a volitional free will to make those kinds of “everlasting life” decisions.", "Those whom “Jesus came to seek and save” were “predestinated unto the adoption of children by Jesus Christ to Himself, according to the good pleasure of His will” (Eph 1:5). “Adopted children” never “choose” their adopting parents. Every “adopted child of God” has been divinely “chosen” (i.e., “called and elect”) by “the good pleasure of Jesus Christ” to eventually become the “redeemed” population of “The Heavenly Version of THE CHURCH.”", "Every “un-redeemed” and “un-adopted” member of “the earthly version of THE CHURCH” will spend eternity in Hell along with “their father the devil” simply because they are each “vessels of wrath fitted to destruction” (Rom 9:20ff). By contrast, the “called and elect” are re-created as “vessels unto honor” who will “not perish but have everlasting life” (John 3:16) simply because they have been “born again of the Spirit” (John 3:3ff) to inherit a Spiritual DNA that guarantees “everlasting life” as well as enables “believeth in Him.”", "Each “calling and election” is an outcome of God’s Purpose-For-Creation. God “predestined” that Purpose by creating a “world” having a dimension of time-and- space controlled by cause-and-effect. It is impossible for an immutable God’s cause- and-effect to be altered by “whosoever believeth in Him.” Accordingly, church attendees who depend on self-generated “faith” have never been Spiritually “born again.” Saving “faith” is “not of yourselves: that kind of faith is the gift of God” (Eph 2:8).", "Church attendees typically listen to stories about Jesus yet they remain “un- redeemed and un-adopted” humans who are owned by “the God of this world” until the God of Heaven “lovingly and graciously” causes (i.e., “predestines”) a “new Spiritual birth.”", "God’s “determinate counsel and foreknowledge” has no provision for volitionally generated belief. God’s created cause-and-effect results in religious conflict between sectarian affiliations being divinely established by precluding “many who say to me in that day, Lord, Lord” (Matt 7:22ff) from “understanding God’s Words” even though they were trained at an approved Bible school. “There shall be weeping and gnashing of teeth” (Lk 13:28). “Nay but, O man, who art thou that replies against God? Shall the thing formed say to him that formed it, why hast thou made me thus?” (Rom 9:20).", "All the above is Scripturally reinforced in 1John 5:1 “Whosoever believeth that Jesus is the Christ is born of God.” But “believing” is never the cause of salvation. “Believing” is always an after-the-fact human response that results from being “predestined” to be “born of God.” Thus, God’s salvation is Eternally Secure for “whosoever” has been divinely “born again” but salvation is Eternally Insecure for “whosoever” merely self-generates “belief in Him” by a volitional-free-will decision.", "God’s plan has always been for the benefit of “the principalities and powers in Heavenly places” rather than for the benefit of disposable humans who incidentally may be either “redeemed” or “un-redeemed.” “Redeemed” humans are merely incidental beneficiaries of God’s plan by being graciously “adopted” for “everlasting” residence in “Heavenly places.”", "The prophet Ezekiel predicted “being born again” in 36:26 “A new heart also will I give you, and a new spirit will I put within you: and I will take away the stony heart out of your flesh, and I will give you a heart of flesh.” Some theologians argue the context of Ezekiel’s prediction allows only “God’s chosen people” to benefit, nevertheless, God’s New Testament adds detail to Ezekiel’s prediction by “That which is born of the flesh is flesh; and that which is born of the Spirit is spirit” (John 3:6) “therefore, if any man be in Christ, he is a new creature: old things are passed away, behold, all things are become new” (2Cor 5:17). Those verses seem to apply to both “God’s chosen people” as well as Gentiles who are “called and elect” to be divinely gifted with “a new heart.”", "It was “determined before the foundation of the world” (Eph 1:4; 1Pet 1:20) that God- the-Father would supernaturally create natural birth as well as spiritual re-birth.", "Some disposable humans will eventually learn they were “called and elect according to the good pleasure of His will” (Eph 1:5). However, only “called and elect” Gentiles as well as “a predestined number of God’s chosen people” will benefit from the divinely provided gift of being “born again of the Spirit” according to God’s Purpose- For-Creation.", "The issue of “abolishing the law” forced the Acts 15 council at the Jerusalem church. Luke reports the Jewish challenges were rejected by the council in an epistle written by James to be hand-delivered to the churches established by “Barnabas and Saul/Paul.”", "The document described in Acts 15:23 may have been recorded for modern Christians as the New Testament epistle that bears the name of “James, the brother of the Lord.” The epistle of “Jude, the servant of Jesus Christ, and brother of James” may also be based on that Acts 15:23 document simply because God’s intention has always been for Scripture to explain Scripture thus avoiding even the hint of ambiguity that must be theologically interpreted by conflicted Bible scholars.", "Nevertheless, Luke is concerned because “the certainty of those things delivered to us by the Apostle whom Jesus had chosen” is being denied by 1st Century “chosen people” who mutilate God’s immutable Words.", "Sincere theological scholars frequently suggest alternative ways to change (i.e., mutilate) God’s immutable Words. Despite the sincerity of Bible scholars, pulpit messages are observed being based on theological mutilations of God’s Words rather than based on an exposition of God’s Words. However, the Biblical requirement for pulpit messages is “the things that thou hast heard of me among many witnesses, the same commit thou to faithful men, who shall be able to teach others also” (2Tim 2:2). It sounds like Paul is commanding preachers to exposit Scripture rather than preach a sectarian approved “understanding” of Scripture.", "However, preachers must know “the things that thou hast heard of me” before “those things” can be preached. Thus, Biblical proficiency ought to be a priority – there are no alternatives to Biblical proficiency. Proficiency in counseling (i.e., topical preaching) may offer some benefit to those who lack “trust in the Lord” but proficient counseling skills ought never be an alternative to proficient Biblical exposition.", "Theological writings, especially the conflicted writings of sectarian Theophanies of God such as Calvin and Wesley, are never a source for Truth. Theological writings are of value only as added affirmation of local preachers who “trust in the Lord for eyes to see and ears to hear.” The only source for Truth is God’s Literature. The opinions of sectarian Theophanies of God are never a source for Truth.", "Luke is concerned because knowing “the determinant counsel and foreknowledge of God” is of more eternal importance to “The principalities and powers” than learning about any sectarian challenges (i.e., “the gates of hell”) to the eternal church being built by Jesus (Matt 16:18).", "Theophilus has observed similar challenges", "Theophilus shares Luke’s concern because modern Bible school trained preachers are observed challenging the beliefs of rival preachers just as 1st Century Jewish leaders challenged “the certainty of those things delivered unto the apostles.” Modern preachers emulate the doctrinal challenges of 1st Century Jewish leaders.", "Modern challenges to God’s Words are publicly observable in the form of “Christian preaching that devalues Scripture.”", "For example, modern Bible school trained sectarians devalue John 3 by teaching “anybody can be saved by believing in Him.” I have literally heard Bible school trained sectarians emulate Nicodemus as recorded in John 3:4 by assuming that Jesus was using the metaphor of birth to offer the option of volitional belief to “Whosoever believeth.” But that kind of doctrinal assumption is a devaluing (i.e., a literary corruption) of the message being delivered to Nicodemus.", "Jesus responded lovingly and graciously to Nicodemus as well as to modern Bible school trained sectarians by explaining in John 3:5ff that a Sovereign God “Verily, verily” controls “being born of the Spirit” just as God “Verily, verily” controls “the wind.” Both “the wind” and every instance of “the birth process” is “Verily, verily, by the good pleasure of God’s will.”", "I have heard 21st Century sectarian preachers devaluing Scripture by claiming the term “whosoever believeth in Him” is a universal inclusive that invites every human to “believeth in him.” But John 3:16 teaches the exact opposite of the “deception” that salvation is universally inclusive.", "For example, baseball fans talk about the exploits of “whosoever” plays baseball for the Cubs but “whosoever is dead” is eternally precluded from playing baseball for the Cubs. Neither can “whosoever is dead in trespasses and sins” (Eph 2:1) make a volitional decision to stop being “dead” by volitionally deciding to “have everlasting life.” The common sectarian doctrine of universal inclusiveness is a “deceptive” academic abuse of the English language.", "The linguistic problem with “whosoever believeth in him” is emphasized by the literature of James 2:19 “Thou believest that there is one God; thou doest well: the devils also believe, and tremble.” Sectarians emulate “the devils.”", "My caveat", "All the above was the outcome of simply reading the Biblical Epistle to the Ephesians without any attempt to interpret the meaning. The Apostle Paul reveals the “mystery” that God’s Purpose-For-Creation was to educate “The principalities and powers.” Nevertheless, you may think I have been overly zealous in my Biblical justifications for my book – you may think I have manufactured Scriptural detail to surreptitiously prove my point.", "I have literally experienced vehement religious resistance to my claim of Biblical justifications. Thus, I humbly beg you to forgive any accidental polemic you may think you have observed.", "Here is the literal reality:", "• Those who agree with me have been led by God to agree.", "• Those who disagree with me are also led by God to disagree.", "• God sovereignly leads both agreement and disagreement.", "God never requires God’s Purpose-For-Creation to be acknowledged. It is conceivable that even preachers who preach a “lie” may have literally been “Born again of the Spirit.” In fact, I “Trust” it to be so. The reality is that God’s Purpose- For-Creation has always been a “mystery” to believers as well as unbelievers. The evidence is that it continues to be a “mystery” despite God’s inspiration in AD60.", "The point of this book is that those who either agree or disagree with me are each temporary and disposable educational tools used by God such that God’s Purpose is being accomplished. In fact, “God is good all the time; All the time God is good” even when we vehemently disagree.", "I am constantly reminded of Romans 12:3 “For I say, through the grace given unto me, to every man that is among you, not to think of himself more highly than he ought to think, but to think soberly, according as God hath dealt to every man the measure of faith.” I write using the pseudonym Theophilus to disguise my embarrassment about the weakness of my own self-generated faith. All my words have been evaluated by God in Romans 3:4 “God forbid: yea, let God be true, but every man a liar, as it is written, that thou mightest be justified in thy sayings, and mightest overcome when thou art judged.” That verse evaluates me as being a “liar” while God alone is “justified in thy sayings.”", "Accordingly, I confess that I am a “liar.” But then, God also evaluates Augustine of Hippo, Jacobus Arminius, John Calvin, Ignatius of Loyola, the current Pope, Joseph Smith, John Wesley, as well as the very best radio and TV preachers as “liars.” God evaluates the leadership of every affiliation of churches as being “liars.”", "And God evaluates that you also are a “liar” despite your agreement or disagreement about God’s Purpose-For-Creation as revealed in this book.", "“Leaning unto your own understanding” may be an eternal problem for those who address Jesus as “LORD” but that kind of “understanding” has nothing to do with your “predestined” listing in “the Lamb’s book of life.”", "My caveat is that “leaning unto your own understanding” of that which God really meant to say is of no consequence to God’s gift of “everlasting life.” God graciously “predestines” salvation despite your absurd decision to “lean unto your own understanding” rather than “Trust in the LORD with all your heart.”", "“Believeth in Him” is absolutely required but none of us is saved because of our self-generated belief. “Believeth in Him” is the “predestined” outcome of “your name being listed in the Lamb’s book of life” rather than a sectarian approved method for attaining “everlasting life” by making a volitional free will decision to no longer be “dead in trespasses and sin.”"]}, {"n": 12, "title": "The rationale of God's plan", "paras": ["The conditions preceding God’s creative effort", "God’s literature is the only source document that can reveal the rationale motivating God to create anything. That document teaches that time-and-space did not exist before God was motivated to create it.", "In that regard, Exodus 3:14 identifies God as “I AM.” God was the present tense “I AM” who pre-existed everything in time-and-space. Revelation 1:8 declares “I AM Alpha and Omega, the beginning and the ending, saith the Lord, which is, and which was, and which is to come, the Almighty.” God existed before “the beginning” of creation and will continue to exist after “the ending” of creation. God is eternal.", "The names “I AM” and “Alpha and Omega” indicate it is continuously “now” (present tense) where God resides. Th
