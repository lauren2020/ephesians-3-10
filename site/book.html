ry human is “appointed once to die, but after this the judgment” (Heb 9:27). The reality is that both “redeemed” and “unredeemed” humans are merely temporary and disposable tools being used by God to educate “the principalities and powers in the heavenlies” (Eph 3:10).", "Educated religious leaders tend to “think of themselves more highly than they ought to think” (Rom 12:3). Egotistical religious leaders never characterize themselves by the Beatitudes listed in Matthew 5:3-11. However, I have no academic credential for criticizing the doctrines manufactured by egotistical Bible scholars and city-wide Evangelists.", "I have never enrolled in an academic Bible school. Thus, I admit I lack academic credentials as a Biblical scholar I am totally dependent on the opinionated teaching of Bible school trained “pastor teachers” who preach from the pulpit of whichever church I happen to be attending. However, I am typically disappointed by the lack of Biblical proficiency displayed by Bible school trained pulpit preachers. I observe Bible school trained preacher’s contradicting God’s inspired Words with their", "As a Bible believer I claim to “Trust in the LORD with all my heart” simply because I know from experience that every time anyone attempts to “lean unto their own understanding” we humans always end up conflicting with each other. The mere existence of sectarian affiliations and denominations is irrefutable evidence of that kind of universal conflict between Bible believing sectarians.", "This book is a call to Bible school trained pulpit preachers to encourage exposition of the Literature of Scripture and to do it just as if you really believe Scripture is God’s Holy Words because WHY God inspired Scripture to be written Is more valuable than any conflicted opinion about WHAT God meant to say."]}, {"n": 5, "title": "The importance of Bible school education", "paras": ["Students choose to attend a specific Bible school because they already believe the doctrines being taught at that school. Students may claim they are learning Biblically proficiency but the school they select always justifies conflicted doctrinal beliefs with a hermeneutical system of “leaning unto thine own understanding.” Exceptions are conceivable but I am not aware of any Bible school that deliberately exposits Scripture to discover the reason why “In the beginning God created the heavens and the earth.”", "Trusting Bible scholars to reveal God’s Purpose-For-Creation is a wasted exercise simply because their Biblical knowledge was attained by “leaning unto their own understanding” of conflicted theological opinions about what God really meant to say. The reality is that each Bible school prefers to teach the hermeneutical methods preferred by uniquely conflicted sectarian theologians.", "The honorific of “Biblical scholar” is never a degree granted by a Bible school. That honorific merely indicates the preference of biased theologians who claim to be familiar with WHAT God has done. Bible scholars are each theologically opinionated when they cite proof-texts they manufactured to support their opinions. Despite what they may claim, every Bible school exists only by the financial approval of conflicted sectarian leaders. And God declares that conflict is “very good” because God’s Purpose-For-Creation requires conflict.", "Bible schools teach the doctrines manufactured by conflicted theologians who wrote commentaries and study helps about that which God really meant to say even though a sovereign and omniscient God personally inspired every Word written in Scripture. Every Bible school ignores God command to “Trust in the LORD and He shall direct our paths.” Instead, every Bible school, every commentary, every study help teaches us to “lean unto your own understanding” by becoming proficient in sectarian hermeneutics which authorize the interpretation of doctrinally conflicted religious opinions.", "Accordingly, Churches that hire Bible school graduates typically hear Christian preaching that devalues Scripture rather than hear contextual expositions of that which God literally said. The “understanding” of John 3:16 I grew up trusting was the outcome of conflicted Bible schools teaching students to “lean unto thine own understanding” about that which God really meant to say rather than teaching “Trust in the LORD with all thine heart” as commanded in Proverbs 3:5.", "I later concluded my prior “trust” about the meaning of John 3:16 literally disobeyed God’s command in 1Timothy 6:20 “keep that which is committed to thy trust, avoiding profane and vain babblings, and oppositions of science falsely so called.” The English word “science” was translated from the Greek word “γνῶσις” (Strong’s G1108) “from <G1097> (ginosko); knowing (the act), i.e. (by implication) knowledge :- knowledge, science.” Thus, that verse instructs us to avoid “knowledge falsely so called” by “Trust in the LORD with all thine heart, and He shall direct thy paths.”", "Scientific knowledge is repeatable else it is scientific speculation. But God’s creation cannot be repeated. Thus, the pervasiveness of scientific speculations about WHY God created anything” is the reason Paul warns religious leaders like Timothy in 1Timothy 6:20 and the Mars hill philosophers in Acts 17:18ff as well as all Bible school educated “pastor teachers” that “scientific theological speculations” are being idolatrously worshipped just as if those “speculations” are literal Truth. The mere existence of sectarian affiliations and denominations is proof that 1Timothy 6:20 is being disobeyed by modern Bible school educated “pastor teachers.”", "In the past I trusted the “theological speculation” that God created the world so that humans who are “dead in trespass and sin” could make-a-decision to no longer “be dead” by volitionally choosing to have “everlasting life.” But, that kind of “speculation” ignores the fact that “dead” people are incapable of choosing anything simply because they are “dead.”", "The reality is that humans who are “dead in trespasses and sin” must be “Spiritually born again” before God’s Truth can be known.", "Every Bible school “speculation” is the outcome of manufactured hermeneutics which conflict with rival Bible school hermeneutics. Without exception, the outcome of every hermeneutical conflict is Christian preaching that devalues Scripture rather than Scriptural exposition.", "Nevertheless, Biblical education is necessary despite any reliance on conflicted opinions because it is impossible to have correct opinions about that which God planned to do and say unless the entire context of God’s inspired Words are “rightly divided” from beginning to end.", "Bible schools ought to teach Biblical proficiency rather than teach proficiency in sectarian “speculations.” But every Bible school teaches proficiency in hermeneutical systems that are used to manufacture conflicted “speculations” about WHY an omniscient God created a world where “God’s only begotten Son” was murdered by crucifixion.", "Conflicted theological “speculations” de facto reject the Ephesians 4:11ff doctrine that God “gifts pastor teachers” so that church people will “come in the unity of the faith, and of the knowledge of the Son of God, unto a perfect man, unto the measure of the stature of the fulness of Christ.”", "As a matter of fact, every instance of sectarian and/or denominational preference (Baptist, Catholic, Evangelical Free, Holiness, Methodist, Presbyterian, etc.) is a theologically approved rejection of “the unity of the faith.” Without exception “pastor teachers” are trained to deliberately and purposefully reject “the unity of the faith.”", "Admittedly, Bible school professors frequently teach a version of theologically manufactured opinions that partially agrees with God’s Purpose-For-Creation so that God is partially glorified. Bible school professors may even cite proof texts of Scripture which seem to verify those manufactured opinions. However, proof text opinions are never “rightly divided” expositions of “Truth.”", "1Corinthians 2:14 argues against Bible school taught hermeneutics “But the natural man receives not the things of the Spirit of God: for they are foolishness unto him: neither can he know them, because they are spiritually discerned.” Bible schools use hermeneutics as substitutes for “the Spirit of God.” “Spiritual discernment” is withheld from Bible scholars who egotistically “think of themself more highly than they ought to think” (Rom 12:3). And yet, an omniscient God declared that egotistical opinions are “very good” simply because that’s exactly the reason God Created Bible scholars.", "Withholding “Spiritual discernment” was literally commanded by God when Isaiah was commissioned as a prophet in 6:9ff; “Make the heart of this people fat, and make their ears heavy, and shut their eyes; lest they see with their eyes, and hear with their ears, and understand with their heart, and convert, and be healed.” Jesus references Isaiah 6:9ff in Matthew 13:13ff when explaining correct doctrine to His disciples. Modern sectarian conflict between Bible school trained “pastor teachers” always without exception indicates a lack of “spiritual discernment.”", "A modern example of “withheld Spiritual discernment” is the “theological speculation” that God requires “whosoever believeth in Him” to fulfil the so-called “Great Commission” as specifically commanded (Matthew 28:16ff) to “eleven disciples” who “went away into Galilee, into a mountain where Jesus had appointed them” as Apostles for fulfilling their God assigned mission.", "The English word “commission” appears only once in KJV Bibles when Paul describes his trip to Damascus in Acts 26:12 as being “with authority and commission from the chief priests.” The English word “commission” was translated from Greek “ἐπιτροπή” (Strong’s G2011) “from <G2010> (epitrepo); permission, i.e. (by implication) full power :- commission.”", "Thus, the so-called “Great Commission” is merely a theological concept manufactured by Bible scholars who without God’s permission have expanded the Matthew 28:20 “Apostolic command” to include all “disciples.”", "Those Bible scholars are “liars” according to Romans 3:4.", "The English word “command” in Matthew 28:20 is translated in multiple texts from the Greek word “ἐντέλλω” (Strong's 1781) “from <G1722> (en) and the base of <G5056> (telos); to enjoin :- (give) charge, (give).”", "Thus, it seems that the so-called “Great Commission” is being erroneously taught as a literal “command” to “all disciples to teach all nations to observe all things whatsoever I have commanded you.” It is erroneous simply because only the “eleven Apostles” had been taught “all things whatsoever I have commanded you.” Every other disciple of Jesus was taught only “some things” rather than “all things.” Thus, the “many” disciples of Jesus lack “Spiritual discernment” for teaching “the unity of the faith to all nations.”", "It is utter nonsense to expect poorly trained “disciples” to teach “all things whatsoever I have commanded you.” So, I ask why any highly respected Biblical scholar would teach that “whosoever believeth in Him” is required to “go and teach all nations.” But that’s exactly what many Bible scholars teach from church pulpits.", "God’s Words are inexplicably silent about the “churches” established by the “eleven apostles.” Instead, God’s own inspired Words emphasize the New Testament churches that were established by a Jewish Pharisee who was educationally highly credentialed and who “diligently” opposed Christianity until he was divinely “called and elect” on the road to Damascus by the resurrected Jesus Christ to become “the Apostle of the Gentiles” (Rom 11:2). The Christ-trained Apostle Paul (Gal 1:17-18) literally fulfilled God’s Ephesians 3:10 Purpose-For-Creation “To the intent that now unto the principalities and powers in heavenly places might be known BY THE CHURCH the manifold wisdom of God.” The apostle Paul rather than any of the “COMMISSIONED” disciples literally initiated “THE CHURCH.”", "However, if God actually “intends” to use “THE CHURCH” to display “the manifold wisdom of God” to “the principalities and powers in heavenly places” then it is intuitive that God’s Purpose for the “the book of life of the Lamb slain from the foundation of the world” (Rev 13:8) was nothing more than preparation for Paul’s establishment of THE CHURCH. Paul’s epistles reveal each CHURCH established by Paul had problems that needed to be corrected. That’s because God’s Purpose-For-Creation is fulfilled by conflicted churches which are populated with “redeemed” as well as “unredeemed” people (i.e., with “tares and wheat”).", "The churches established by Paul are pre-imaged in the Garden of Eden as “the tree of the knowledge of good and evil which God planted in the midst of the Garden” (Gen 2:9). In that regard I have literally heard a highly respected Bible scholar instruct both “redeemed” and “unredeemed” radio listeners to “make no mistake about it” that every Christian is “commanded” to fulfil the humanly titled “Great Commission” even though Matthew 28:16 reports only “eleven disciples” being appointed as Apostles. In other words, the very best Bible scholars (he had been the President of a major theological seminary) devalue “The Acts of the Apostles” by ignoring the 1:2 declaration “Until the day in which he was taken up, after that he through the Holy Ghost had given commandments unto the Apostles whom he had chosen.”", "I confess I taught that same false “understanding” of God’s Words to my own young children as well as to AWANA children. Thus, I am ashamed to confess I share the guilt of judging the “oracles of God” by “God’s chosen people” whom the inspiration of God evaluated as “liars” in Romans 3:4.", "The reality is that Bible scholars hermeneutically manufacture the need to “win souls” rather than exposit the Scriptural “command” that established every conflicted church which is being used by God to educate “the principalities and powers” in Ephesians 3:10. God’s Words teach that God and His “only begotten Son” are the only Ones having the responsibility to “seek and save that which is lost.” Romans 3 teaches “There is none that understandeth, there is none that seeketh after God. They are all gone out of the way. They are together become unprofitable. There is none that doeth good, no, not one.”", "So, where do popular Purpose Driven book writers find the Biblical concept that teaches all Christians should be “Seeker sensitive?” God’s inspired Words in Romans 3 teach us that “Seekers” don’t even exist.", "The term “proof-text” is defined in Mirriam-Webster.com as “a Scriptural passage adduced as proof for a theological doctrine, belief, or principle.” Thus, proof-texting 2Peter 3:9 is nothing more than a strongly held “theological doctrine, belief, or principle” about a theologically assumed need to “win souls.”", "God’s Words never teach the need for “winning souls.” The term appears only as an obscure Old Testament reference in Proverbs 11:30. That reference is obviously obscure because the wisdom of “winning souls” is neither explained nor repeated in either Testament of Scripture. The concept of “soul winning” is incorrectly “proof-texted” by wisdom deficient academic scholars to manufacture a justification for generating an evangelistic application of Biblical counseling.", "Those same scholars interpret John 3:16 to teach “all who are dead in trespasses and sin” can “come forward to the prayer room” to learn how to choose “everlasting life” during their “Hour of decision.” However, a contextual exposition of John’s Gospel, as well as Peter’s 2nd epistle, and Acts 16:31 teaches the exact opposite “understanding.”", "Both “good and evil” interpretations of Scripture are the outcome of “leaning unto thine own understanding.” Neither “good” nor “evil” interpretations are ever the outcome of “Trusting the LORD with all your heart.” The reality is that a sovereign God intends His inspired Words to be exposited rather than interpreted.", "Biblical proficiency always requires “Study to shew thyself approved unto God” (2Tim 2:15). The alternative to Biblical proficiency is the hermeneutical proficiency that without exception is taught in every sectarian Bible school.", "In AD60 the Apostle Paul was inspired to write “to the saints which are at Ephesus, and to the faithful in Christ Jesus.” In Ephesians 1:3-5 Paul introduces God’s inspired Words with the invocation “Blessed be the God and Father of our Lord Jesus Christ, who hath blessed us with all spiritual blessings in heavenly places in Christ: according as he hath chosen us in him before the foundation of the world, that we should be holy and without blame before him, in love having predestinated us unto the adoption of children by Jesus Christ to himself according to the good pleasure of his will.”", "Within approximately that same time period, the Apostle John was inspired to write “to the seven churches which are in Asia” (i.e., the same churches that were established by the Apostle Paul rather that by any of the “eleven” disciples). John implied that “from the foundation of the world” God had already written “the Lamb’s book of life that predestined those who are to be adopted as children of Jesus Christ” (Rev 13:8).", "The English word “church” is translated from the Greek word “ἐκκλησία” (Strong's G1577) “from a compound of <G1537> (ek) and a derivative of <G2564> (kaleo); a calling out, i.e. (concretely) a popular meeting, especially a religious congregation (Jewish synagogue, or Christian community of members on earth or saints in heaven or both) :- assembly, church.” And the English word “assembly” in Acts 19:39 was translated from the same G1577 to describe an unruly mob of angry rioters in Ephesus led by “Demetrius.”", "Thus, Biblical usage of the English word “church” merely refers to an identifiable group of people. The point is that the Greek word “ἐκκλησία” in Ephesians 3:10 describes a group of people whom Jesus parabolically describes in Matthew 13:24ff as being populated by an admixture of “Tares and Wheat.” The term “Wheat and Tares” parabolically emulates “the tree of the knowledge of Good and Evil” that God planted in the Garden of Eden. That parabolic emulation would NOT have been possible if Eve had NOT “sinned by eating the fruit of the tree of the knowledge of good and evil.” It is an incredibly difficult concept for modern wisdom deficient Christians to “understand,” but Eve was “predestined to sin” by God’s Purpose-For-Creation as described in Ephesians 3:10.", "Some Bible scholars teach that both Proverbs and the Parables of Jesus are merely wise examples of the behavior preferred by God. The invalid assumption is that Jesus was teaching “disciples” to be examples of righteous living in order that they could emulate an unattainable “Holiness unto the LORD.”", "However, if Proverbs 3:5 is literally God’s inspired command to “Trust in the LORD with all our heart” then we must “Trust” that “from the foundation of the world” God had already “predestined” which humans would become “an adopted child of Jesus Christ according to the good pleasure of his will.” That kind of “predestination” includes blind people as well as seeing people, deaf people as well as hearing people, good people as well as evil people, etc. That kind of “predestination” could also include babies who die at birth before they have ever been either “good or evil.” The “predestination” of babies could result in millions of souls from “every tribe and nation” populating Heaven. “Predestination” is always by “the determinant counsel and foreknowledge of God.” God’s “predestination” is never an outcome of “believing in Him.” The conversion of a dedicated unbeliever on the road to Damascus is an example of God’s “predestined determinant counsel and foreknowledge” rather than an example of making-a-volitional-decision to “believe in Him.”", "However, “pastor teachers” often chant that “God is good all the time. All the time, God is good.” “Pastor teachers” are typically taught that a “good God” loves everyone and really wants everyone to be saved even though a “good God” could have prevented Eve’s “sin” if that’s what a “good God” really wanted. The reality is that a “good God” literally “predestined” Eve to introduce “the knowledge of good and evil” into God’s created environment of time-and-space “to the intent that the principalities and powers in the heavenlies” can be educated by observing the distinction between “good and evil.”", "Prior to “God creating the heaven and the earth” it was impossible for “the principalities and powers” to compare “good” vs “evil” simply because “evil and death” had never existed “in the heavenlies” where God resides.", "The “Lord Jesus Christ” about whom Paul writes in Ephesians 1:3 was the same “Lamb that was slain from the foundation of the world” who only a few decades prior to AD60 had been divinely incarnated to become the “born of the flesh” son of a “sinful born of the flesh” human virgin named Mary (Luke 1:27). The incarnated “Lamb that was slain” inherited Mary’s “sinful” DNA including Mary’s gene that guaranteed “a propensity to sin and death.”", "The Apostolic writings of John, Paul, and Peter have been unchanged for 2000 years. That’s more than enough time for everyone to “understand” that which God literally said so it is intuitively obvious that every Bible school has been divinely “predestined” to neglect teaching the reason why God delayed reporting the “mystery” until after Jesus had been crucified and after Jesus was resurrected and after “the New Testament Church” had been established to contain both “Tares and Wheat” and after “Jesus prepared the means for adopting the children” who were “predestined” in “the Lamb’s book of life.”", "Without exception, Bible schools are “predestined” by “the determinant counsel and foreknowledge of God” to be doctrinally conflicted simply because doctrinal conflict between “CHURCHES” is an absolute requirement of God’s Purpose-For- Creation.", "The inspired epistle to the Ephesians was written by the Apostle Paul “to the faithful in Christ Jesus” to reveal that all creation was “to the intent that now unto the principalities and powers in the heavenlies might be known by the CHURCH the manifold wisdom of God” (Eph 3:10). Please exposit the context of Ephesians 1:1 to 3:9 to affirm that I have “rightly divided the Word of Truth” rather than “leaned unto my own understanding.”", "The Apostles John, Paul, and Peter were each inspired by God to write about “God’s purpose from the foundation of the world” but Paul’s inspiration adds the fact that “CHURCHES” which are populated with both “Wheat and Tares” were created “to the intent that the principalities and powers in the heavenlies” needed to learn “the knowledge of good and evil.” In other words, “the principalities and powers” need to learn the distinction between the “Wheat and Tares” (Matt 13:24ff) who populate every “local CHURCH.”", "Bible schools never teach the reason why God delayed revealing God’s Purpose- For-Creation. That neglect has resulted in pervasive Christian preaching that devalues Scripture. Each Bible school neglect is a “predestined evil” in fulfillment of God’s Purpose-For-Creation as revealed in Ephesians 3:10.", "“The mystery” of God’s Purpose-For-Creation was publicly revealed in AD60 when Paul was inspired to write the epistle to the Ephesians. That public revelation happened about 2000 years ago.", "However, Bible schools continue to ignore and/or devalue “the mystery” that “the conflicted population of churches” (i.e., “the Wheat and Tares”) was “predestined” before “God created the heavens and the earth” (Gen1:1). The reality is that God’s Purpose-For-Creation “from before the foundation of the world” has always been “to the intent that now unto the principalities and powers in the heavenlies might be known the manifold wisdom of God” by observing the eternal status of conflicted church people.", "Bible scholars and “pastor teachers” tend to egotistically “think of themself more highly than they ought to think” (Rom 12:3). Bible scholars are rarely if ever characterized by the Beatitudes in Matthew 5 (i.e., “poor in spirit,” “mourn,” “meek,” “persecuted.” etc.) Thus, Bible scholars tend to egotistically ignore or devalue the fact that absolutely nothing was created for the benefit of temporary and disposable humans who are “appointed once to die, but after that the judgement” (Heb 9:27).", "The reality is that Adam, Eve, and each of their descendants, as well as “the tree of the knowledge of good and evil” (Gen 1:17) and “the serpent which the LORD God had made” (Gen 3:1) and “churches” (Eph 3:10) are each merely temporary and disposable teaching tools to be used by “the manifold wisdom of God” in the process of educating “the principalities and powers in the heavenlies.”", "Nevertheless, an omniscient God declared in Genesis 1:31 the everything was created to be “very good” simply because is initiated God’s Purpose-For-Creation.", "A specific example of temporary and disposable educational tools is reported in John 8:41ff where the incarnated “Lamb of God” reveals that the most religious God believers in all of God’s creation are “predestined as children of your father the devil” “to the intent that” God’s educational Purpose could be accomplished without well- intentioned and sincere religious resistance to God’s demonstration of the distinction between “good and evil.”", "An additional example of temporary and disposable educational tools is reported in Matthew 7:21ff when Jesus (i.e., “the incarnated Lamb of God”) commands “many who address Jesus as LORD” to “depart from me, ye that work iniquity.” Scripture deliberately teaches that “many” church leaders are “predestined” to be judged with their “father the devil” despite religiously pretending that Jesus is their “LORD.”", "The “mystery” revealed in AD60 is that “slaying the Lamb” and listing the names of disposable humans who were “predestined” to be included “in the Lamb’s book of life” are each nothing more than preparation for the Ephesians 3:10 “demonstration of the manifold wisdom of God to the principalities and powers in the heavenlies” by “making him” (i.e., “the incarnated Lamb”) “to be a little lower than the angels” (Ps 8:4-5; Heb 2:6- 7). The reality is that every human including “the incarnated Lamb of God” is “appointed once to die and after this the judgment” (Heb 9:27).", "Nevertheless, Bible school trained religious experts ignore “the mystery” that God’s plan is to populate “churches with both Wheat and Tares to the intent that the principalities and powers who reside in the heavenlies” can learn the distinction between “Good and Evil.” That has always been God’s Purpose-For-Creation “from before the foundation of the world” before “the beginning of time.”", "Bible school trained religious leaders chant that “God is good all the time; all the time God is good” even though John 8:44 teaches “many” of those same religious leaders are “predestined to die as children of the god of this world” and despite Matthew 7:22-23 teaching that “many” religious leaders will claim “Lord, Lord, have we not prophesied in thy name? and in thy name have cast out devils? and in thy name done many wonderful works?” to which Jesus will respond “depart from me, I never knew you.”", "Bible scholars teach everything was “very good” (Gen 1:31) until “the serpent which the LORD God had made” (Gen 3:1) temped Eve to sin. In other words, Bible scholars believe the nonsense that “the foreknowledge of an immutable God” reacted to “Eve’s sin” rather than “predestined Eve’s sin.”", "However, 1Corthians 1:25 teaches “the foolishness of God is wiser than men; and the weakness of God is stronger than men.” Scripture teaches that “many of the wisest and best educated Bible scholars” have been “predestined” to reside in Hell eternally with Satin and his demons. Although, “a few of the best educated Bible scholars” are “predestined” to be “adopted as children of Jesus Christ according to the good pleasure of his will.”", "The problem with Biblical education", "I observe modern Bible school trained religious leaders attempting to force a “wise and strong” God whom they believe to be “good all the time” to react to sin by requiring “whosoever” to “believeth in Him” before God’s “promised gift of everlasting life” can be gifted by a sovereignly omnipotent and immutable God who always does whatever He wants to do.", "In other words, modern Bible school trained religious leaders “lean unto their own understanding” to manufacture that which God really meant to say.", "Thus, the problem with Biblical education is that every Bible school is staffed with academically trained Bible scholars who have been taught to “lean unto their own understanding” about that which God really meant to say rather than being taught to “trust in the LORD with all your heart and lean not unto your own understanding.” That kind of academic training always results in Christian preaching that devalues Scripture as well as results in a dedicated belief in conflicted sectarian belief systems.", "The Biblical concept of “predestination” is observed to be denied rather than exposited by “many” Bible school trained religious leaders. That kind of denial of God’s literally inspired Words is always publicly observable in the form of Christian preaching that devalues Scripture.", "You may think this book is repetitive just to try to make a point. I acknowledge you are correct simply because I continuously observe a preference for theological commentaries and study helps that encourage “leaning unto your own understanding” about the literal meaning of Scripture.", "I sincerely believe repetition and over-kill is the only way to highlight or emphasize those observations. I sincerely intend doctrinal error by wisdom deficient Bible scholars to be refuted in this book.", "My prayer is that every Bible scholar will “Trust in the LORD with all thine heart; and lean not unto thine own understanding” so that they will “In all thy ways acknowledge him, and he shall direct thy paths.” Amen.", "The alternative to “Trust in the LORD” has always been to trust the opinions of conflicted Bible scholars who teach mere speculations about that which God really meant to say. However, Partial Truth is never Literal Truth. The outcome of partial Truth is always Christian preaching that devalues Scripture despite who is partially right and who is completely wrong.", "My caveat", "Ecclesiastical conflict between Bible scholars motivated me to write this book about Christian preaching that devalues Scripture. The unfortunate reality is that Bible scholars are Theologically proficient rather than proficient in Biblical knowledge. Church pulpits are dedicated to teaching the opinions of conflicted theologians rather than dedicated to expositing the contextual Words inspired by God.", "The inexplicable reality is that God has “mysteriously predestined” Bible scholars to be conflicted. However, this book claims to reveal “the mystery” which “the determinant counsel and foreknowledge of God” had “predestined” to be hidden “from before the foundation of the world.” Accordingly, I freely admit that I struggle with the possibility that God does not want this book to be published simply because that “mystery” continues to pervasively describe currently conflicted pulpit preaching.", "The fact that the “the mystery” was “predestined” to be hidden “from before the foundation of the world” is evidence that God didn’t want “the mystery” to be publicly revealed even though in AD60 God inexplicably inspired the Apostle Paul to reveal “the mystery.” Bible scholars and “pastor teachers” continue to be unaware that “the mystery” has been revealed. Even my own family and friends resist the message of this book. My own family and friends tend to be dedicated to the historic doctrines being taught by their preferred set of conflicted Bible scholars. Many of my own family and friends were educated at the best Bible schools in the USA. Some even have advanced academic degrees in religious studies.", "If God hid “the mystery” for thousands of years prior to AD60 then perhaps I am being presumptive to reveal “the mystery” in this book?", "That question really bothers me because God’s Purpose-For-Creation is clearly dependent on the inherent conflict between the “Wheat and Tares” who populate every “church.” The conflict between “Good and Evil” is the reality being “mysteriously” demonstrated to “the principalities and powers in the heavenlies.” Thus, merely asking the question may be wrong.", "The only reason I continue writing this book is that current events seem to suggest the predicted 2nd coming of the resurrected Jesus Christ will occur in my lifetime. My humble opinion is that God is emphasizing His Purpose-For-Creation once again simply because the time scheduled for the 2nd coming is nigh.", "My “faith and trust” is that my humble recognition of God’s Purpose-For-Creation is linguistically confirmed by quoting God’s own inspired Words rather than by “leaning unto my own understanding” about the conflicted speculations of Biblically trained theologians.", "Nevertheless, I admit I continue to be concerned."]}, {"n": 6, "title": "The dispensations reported in Scripture", "paras": ["2Peter 3:10 reveals that “the heavens shall pass away with a great noise, and the elements shall melt with fervent heat, the earth also and the works that are therein shall be burned up” when God’s education of “the principalities and powers in the heavenlies” is finally complete. The reason for that final destruction is that all those temporary and disposable educational tools are no longer needed simply because God’s Purpose- For-Creation has been completely fulfilled as divinely “predestined from the foundation of the world.”", "Please be aware that the position of 2Peter 3:10 in proximity with verse 3:9 does NOT imply that the destruction of Creation happens immediately after “the CHURCH” has been completely populated and ultimately “resurrected.” As a matter of fact, the “resurrection of the church” merely introduces the next dispensation of God’s Purpose-For-Creation.", "Every Christian must recognize that the division of Scripture into “The Old Testament” and “The New Testament” was a naming technique developed by wisdom deficient humans who were divinely precluded from knowing the implications of what they were doing. That unfortunate naming decision made by wisdom deficient humans has resulted in a conflicted “understanding” between theologians who emphasize either a “Dispensational” or a “Covenant” interpretation of Scripture. The reality is that there are at least eight (8) distinct dispensations within God’s Purpose-For-Creation and each of those dispensations contains a particular covenant made by God. Perhaps there are more than eight dispensations and eight covenants.", "Despite the number of dispensations God has described in His inspired Words, all of God’s Creation is scheduled for utter destruction as reported in 2Peter 3:10."]}, {"n": 7, "title": "God had a Purpose for Creation", "paras": ["It is axiomatic that “failing to plan is to plan to fail.” Plans are publicly announced with public Purpose Statements. Successful Purpose Statements always provide benefit to both providers and users else those Plans will always fail. (search the web for “What is a Purpose Statement” if you are not familiar with the concept)", "In that regard, the Apostle Peter tells us in The Acts of the Apostles that “the determinate counsel and foreknowledge of God” had literally authored a successful Purpose Statement that prepared the way for “wicked hands to deliverer Jesus to be crucified and slain” (2:23). God planned it all before “In the beginning God created the heavens and the earth.”", "However, God’s plan was “a mystery that had been hidden” from “God’s chosen people” who “delivered Jesus to be slain by crucifixion.” If “God’s chosen people” had been aware of God’s plan they would never have “delivered Jesus to be slain by crucifixion.” But that decision would have sabotaged God’s plan for “the Lamb that was slain from the foundation of the world.” Thus, it was necessary that God’s plan would be a “mystery, which from the beginning of the world hath been hid in God, who created all things by Jesus Christ” (Eph 3:9).", "Tradition tells us the Apostle Paul was inspired in AD60 to write “to the saints which are at Ephesus, and to the faithful in Christ Jesus” (1:1) to reveal “the mystery” of God’s plan was “To the intent that now unto the principalities and powers in heavenly places might be known by THE CHURCH the manifold wisdom of God” (3:10). However, “the principalities and powers in heavenly places” are the only beneficiaries of God’s “mysterious” Purpose Statement. God’s Purpose Statement continues to be a “mystery” to modern Bible scholars who are taught to believe everything was created to benefit “sinful” humans.", "Apostle Peter’s 2nd epistle reveals that “a few called and elect humans” will also benefit from God’s successful plan “According as his divine power hath given unto us <few humans> all things that pertain unto life and godliness, through the knowledge of him that hath called us <few humans> to glory and virtue: whereby are given unto us <few humans> exceeding great and precious promises: that by these ye might be partakers of the divine nature, having escaped the corruption that is in the world through lust” (2:3-4). Peter identifies “us few humans” as “the brethren” who were created to be “dead in trespasses and sin” (Eph 2:1) but “before the foundation of the world were called and elect” to be used as examples in the demonstration of God’s divine gift of “redemption” for the education of “the principalities and powers in heavenly places.”", "Despite the teaching of Apostles Peter and Paul, wisdom deficient Bible scholars “lean unto their own understanding” to speculate conflicted opinions about who really benefits from God’s plan rather than “trust the LORD with all their heart.” “The mystery” is that only “a few redeemed temporary and disposable humans” will benefit from God’s plan to educate “the principalities and powers in heavenly places.”", "However, please note that God’s plan depends on the existence of “THE CHURCH” and every “CHURCH” is populated with both “Wheat and Tares” (Matt 13:24ff and Eph 3:2-10). Church attendees are either “redeemed Wheat” or else they are “unredeemed Tares.” Both “Wheat and Tares” are nothing more than tools being used to fulfill God’s successful plan.", "Despite the eternal status of current church attendees, God’s plan is guaranteed to be successful because both God and “the principalities and powers” benefit from a demonstration of “THE CHURCH.” God benefits because God’s “Holiness” is learned by observing God’s distinction between “the redeemed Wheat” and “the unredeemed Tares.” “The principalities and powers” benefit because God’s gift of “redemption” becomes a tool for intellectually learning the Isaiah 6:3 need to “cry Holy, holy, holy, is the LORD of hosts simply because the whole earth is full of his glory.”", "The “principalities and powers in the heavenlies” could not possibly know “the whole earth is full of his glory” unless “a future glorified earth” was already observable “in the heavenlies” when in 6:1 Isaiah reported “ In the year that king Uzziah died I saw also the Lord sitting upon a throne, high and lifted up, and his train filled the temple.” Please affirm that everyone “in the heavenlies” exists outside the creation of time-and-space. Thus, everyone “in the heavenlies” sees both “the beginning and the end” as a present tense event.", "Jesus teaches in Matthew 7:13-14 that only a “few” humans will benefit from God’s Purpose-For-Creation. However, both “many” as well as “few” humans are “predestined” (i.e., “appointed unto men once to die, but after this the judgment” as described in Hebrews 9:27) to be temporary and disposable tools who are being used to educate “the principalities and powers.” All Creation will be destroyed when God’s education of the “principalities and powers” is finally complete as predicted in 2Peter 3:10.", "Nevertheless, Bible scholars continue to be unaware that only a “few” temporary and disposable humans will benefit from the 3:9 promise that “The Lord is not slack concerning his promise” of “everlasting life” for the “few” who are “called and elect” as reported in 2Peter 1:10.", "Human authors of “mystery” stories withhold pertinent information until the end of their story. That is also true of the Author of both Ephesians and Revelations when the divine Author withholds pertinent inspiration until AD60 near the end of God’s inspired story (i.e., History).", "Temporary and disposable humans are accused in Romans 12:3 of “thinking of themself more highly than they ought to think.” God rejects that egotistical “thinking” by asserting Adam, Eve, and each of their human descendant has a DNA that is “appointed once to die, but after this the judgment” (Heb 9:27). Nevertheless, God inspired Apostles Peter, John, and Paul to jointly teach “humans whose names are listed in the Lamb’s book of Life are predestined to be born again of the Spirit to inherit a new DNA that provides everlasting life” before God’s scheduled destruction of everything in 2Peter 3:10.", "Please affirm the philosophical reality that “God’s Holiness” cannot be demonstrated to “the principalities and powers in the Heavenlies” unless “evil and death” already exist. However, neither “evil” nor “death” exist “in the heavenlies where both God and the principalities reside.” That’s the reason why God had to create a time-and- space environment that contains both “evil” and “death” “to the intent that” God could sequentially demonstrate His cause-and-effect “Holiness” to the “principalities and powers in the heavenlies.” Scripture may hint about other reasons, but Scripture reveals only one reason why God created anything at all.", "Ephesians 3:10 asserts “conflicted churches” are temporary and disposable tools created by God specifically for the process of educating “the principalities and powers in the heavenlies” about God’s “Holiness.”", "God’s rationale for creating “THE CHURCH” is that every “church” is populated with both “Tares and Wheat” (Matt 13:24ff). Thus, every earthly version of “THE CHURCH” demonstrates “the knowledge of good and evil” that was initiated by Eve when she ate “of the tree of the knowledge of good and evil.”", "The entirety of Scripture simply records God’s sequential cause-and-effect activity in His successful fulfillment of God’s Purpose-For-Creation. Scripture simply records what God did.", "God’s “only begotten Son” was prepared for that process when He became “the Lamb that was slain from the foundation of the world.” He is the same “Lamb” whom Revelations 13:8 predicts “all that dwell upon the earth shall worship him, whose names are not written in the book of life of the Lamb slain from the foundation of the world.” The Apostle Paul agrees in Romans 14:11. Every “unredeemed Tare” will recognize the Lordship of Jesus Christ despite all the “redeemed Wheat” who have already been “resurrected to everlasting life in the Heavenlies.”", "The reality is that “everyone whose name is written in the book of life” is “predestined” to be “redeemed” (i.e., “purchased”) by God to be saved from the penalty of death using the shed blood of the “slain Lamb” as the “ransom” (i.e., the “purchase” price) paid to “the god of this world.”", "The “Lamb of God” was “predestined from the foundation of the world” to be incarnated as a temporary “born of the flesh” human who was “appointed once to die, but after this the judgment.” The DNA of “the Lamb of God” became the pattern for the DNA gene of “death” as well as the gender determining chromosomes used by God to “make” Adam and Eve (Gen 1:26-27) so that every “born of the Flesh” male and female human would “die and be judged” according to the DNA already established for “the Lamb of God.”", "God is a Spirit who has neither an “image” nor chromosomes that determine gender. Thus, it is physically impossible for God to “create man in God’s image; male and female created he them.” Instead, God used “His only begotten Son” as the pattern for the temporary and disposable “image (i.e., the DNA) that had already been prepared before the foundation of the world.”", "Contrary to modern theological speculation, humans do not have the freedom to volitionally choose “everlasting life.” The reality is that every human is “born of the flesh to be dead in trespasses and sin” (Eph 2:1). And “dead humans” are incapable of choosing to no longer be “dead.”", "Please affirm that every human DNA and chromosome is patterned after the “image and DNA” of the temporary “Lamb of God” who was supernaturally incarnated into time-and-space as the “born of the flesh male child” of a “born of the flesh” virgin mother named Mary.", "God continuously repopulates “the world” with male and female descendants of Adam and Eve who share the temporary incarnated “image” of “the Lamb of God” including the chromosomes that determines gender and including the characteristic of being “appointed once to die, but after this the judgment.”", "Mathew 7:14 reports “the manifold wisdom of God has planned redemption” for a “few” “born of the flesh” temporary humans who will become “born of the Spirit” (John 3:6) to inherit a Spiritual DNA of “everlasting life.” Nevertheless, “THE CHURCH” is populated with both “redeemed” and “unredeemed” God believers. And every “church” including so-called Independent “churches” affiliates with other “churches” to evangelize their preferred list of conflicted doctrines. Conflicted “churches” are tools created by God to demonstrate “the Evil of conflict” while “the manifold wisdom of God” is demonstrating “the sinless church Jesus is building against which the gates of Hell (i.e. death) cannot prevail” (Matt 16:18).", "God also prepared a tree named “The Knowledge of Good and Evil” as well as “the serpent which the LORD God had made” to be tools for that same educational demonstration. But until the promised “resurrection,” both “redeemed” and “unredeemed” church attendees are temporary and disposable tools who demonstrate the distinction between “Tares and Wheat” as well as the distinction between “Good and Evil.”", "That same “manifoldly wise and good” God graciously inspired various disposable humans to either record or else predict God’s cause-and-effect plan as it is being sequentially executed within the time-and-space that was specifically planned and designed to fulfil God’s Purpose-For-Creation. English speaking humans have titled that multi-authored literary compendium of diverse books as “Scripture.”", "The compendium of Scripture describes “sin” as being “evil” while “the manifold wisdom of God” demonstrates everything God declares to be “Good.” God’s Purpose- For-Creation benefits “the good principalities and powers in the heavenlies” rather than benefiting “the many dead” humans.", "God had a Purpose-For-Creation “from before the foundation of the world.”", "God’s Purpose-For-Creation was statistically at risk", "However, God also had “foreknowledge” of the statistical probability that His plan would be sabotaged by temporary and disposable humans who sincerely attempt to please God by resisting “the evil of sin.”", "A historic example of the statistical probability of a religious attempt to resist “the evil of sin” was recorded in Matthew 26:65-68 to reveal “the high priest of God’s chosen people” attempting to resist “the evil of blasphemy.” A more modern example is “pastor teachers” sabotaging God’s Purpose-For-Creation by resisting the “evil of sin.” Bible school trained “pastors” teach the nonsense that humans who are “dead in trespasses and sin” can make-a-volitional-decision to “stop being dead” by being persuaded that they can acquire “everlasting life” by “their own free-will effort.”", "It is linguistically obvious that “Holiness” must be defined before “Holiness unto the LORD” can be observed. It is also linguistically obvious that the symbiotic attributes of “Evil,” “Sin,” “Good,” and “Holiness” are each dependent on the existence of each other. No symbiotic attribute can exist by itself without the existence of all other symbiotic attributes.", "Accordingly, God simultaneously created every symbiotic attribute when “In the beginning God created the heaven and the earth” to include both “the Tree of the knowledge of Good and Evil” as well as “an angelic Lucifer/Satan whom God had already determined would be the god of this world.” All creation was merely God’s preparation for God’s intention to demonstrate the distinction between “Good and Evil” to “the principalities and powers in the heavenlies.”", "Prior to Genesis 1:1 “the Holiness of God” was impossible to be known “in the heavenlies” because neither “the evil of sin” nor “death” exists “in the heavenlies.” God had to create “both the evil of sin and death” before God could demonstrate “there is none righteous, no, not one: there is none that understands, there is none that seeks after God … for all have sinned and come short of the glory of God.”", "God defined “the Holy Law” that was delivered to Moses but “God’s chosen people” immediately and repeatedly disobeyed “the Holy Law.” Yet the sin of “God’s chosen people” was exactly what God planned to happen.", "However, God also planned for “the enmity of the Law to be abolished in His flesh, even the law of commandments contained in ordinances; for to make in Himself of twain one new man, so making peace” (Eph 2:15). “Abolishment of the Law” had always been God’s plan “from before the foundation of the world.”", "Prior to AD60 it was a “mystery” that God’s plan was to demonstrate the distinction between “Good and Evil” to “the principalities and powers in the heavenlies.” For example, the “mystery” was never revealed to “God’s chosen people” who were “chosen” to demonstrate the impossibility of God’s Holy Law being obeyed by “unredeemed” humans (Gal 3:21ff). For example, David was “a man after God’s own heart” (1Sam 13:14) but David was never taught the “mystery” that he was “predestined to be a man after God’s own heart.” In fact, David was an exceedingly sinful “born of the flesh” human. Nevertheless, David always “Trusted the LORD with all his heart.”", "I am a modern example of that same “mysterious” ignorance. The first half of my life I was taught that “God so loved the world” that He created everything to enable me and other free agent humans who are “dead in trespasses and sin” to volitionally choose to “no longer be dead” by the impossible act of “a dead person making a decision to believe in Him.”", "You were likely taught to that same wisdom deficient absurdity.", "But the absurdity of my own doctrinal belief led me to ask who caused Eve to commit sin in an “ex nihilo” environment (Heb 11:3)? The Latin term “ex nihilo” is defined in English as “from or out of nothing.” The problem with theology", "It is intuitive that an omnipotent God can create “ex nihilo.” However, God’s omnipotent “ex nihilo” effort does not explain the source for “sin” despite the sincere but absurd belief of theologians who “lean unto their own understanding” that the source for “sin” was Satan’s temptation.", "For example, if Satan caused “ex nihilo” “sin” then were did Satan get that “sin?” Did “sin” exist before an “ex nihilo” creation? Did “hell” exist before an “ex nihilo” creation? Where will Satan and “sinners who are dead in their trespasses and sin” exist after God’s “ex nihilo” creation is destroyed and replaced by “a new heaven and a new earth”?", "Similar questions ought to force every God believer to ask, “Why did an omniscient God who knows both the beginning and the ending of everything decide to create ex nihilo?”", "Can we “trust in the LORD with all our heart” to give us an answer to that question or do we have to “lean unto our own understanding” so that our “dead in trespasses and sin” intellect can manufacture an answer?", "This book reports my observation of rival belief systems being preached from rival sectarian pulpits as if “pastor teachers” already know the answer. My conclusion based on those observations is that sincere sectarian church leaders “lean unto their own understanding” to market and sell conflicted opinions about that which God meant to say rather than “trust in the LORD with all their heart and He shall direct thy path.”", "I admit I am guilty of the same sin as every sectarian preacher because I sincerely think I “understand” the meaning of God’s Words. However, my “understanding” conflicts with the “understanding” of rival Bible believers. That kind of “conflicted understanding” is characteristic of every religious leader who leads sectarian church affiliations to believe conflicted doctrinal opinions. I confess I am aware of my own susceptibility to that kind of “sinful” error.", "I am linguistically compelled to agree that Romans 3 teaches “let God be true, but every man a liar.” Every conflicted Bible school taught “liar” attempts to “judge” that which “the oracles of God” (3:2) really meant to say. My “Trust” is that I have grown in my own “understanding” to finally desire “That thou mightest be justified in thy sayings, and mightest overcome when thou art judged” (3:4).", "Despite my confessed susceptibility to the “lies” of doctrinal error, my intention for this book is to contextually analyze each rival “understanding” of that which God meant to say according to 2Timothy 2:15 “Study to shew thyself approved unto God, a workman that needeth not to be ashamed, rightly dividing the word of truth.” The alternative is to “lean unto my own understanding” about the real meaning of various texts of Scripture which “lying” rivals have interpreted to have conflicted meanings.", "Please affirm that every decision made by those who “lean unto thine own understanding” is disobedience of God’s command to “lean not unto thine own understanding.”", "Please affirm the absurdity of believing that an omnipotent, omniscient, and immutable sovereign God would create anyone or anything with the capability of altering God’s own Will by making-a-volitional-free-will-decision.", "Yet, that absurdity is pervasive among those who claim to be Christian."]}, {"n": 8, "title": "God's purpose was deliberately hidden", "paras": ["My 1st hint that God had a mysterious purpose", "About halfway through my Christian life, I joined a Bible study concentrating on “the Church being built by Jesus” as predicted in Matthew 16:18 and actualized by the Apostle Paul in The Acts of the Apostles. That Bible study led me to finally recognize God’s Purpose-For-Creation.", "The Acts of the Apostles provides the cultural and historical background for every New Testament document that follows the four Gospels. That Bible study included the establishment of the Ephesian church as well as the epistle addressed to “the saints” in that same church.", "I was philosophically intrigued by Paul’s writing style in the KJV of Ephesians 3:2-12 where Paul “mysteriously” breaks into his inspired explanation to explain why God did anything. The Apostle Paul inserted his parenthetic beginning with the KJV conditional “If ye have heard of the dispensation of the grace of God which is given me to you-ward …” I originally thought that parenthetic seemed artificially inserted into the context of The Gospel which Paul resumes teaching in 3:13ff. The translators of more modern Biblical versions tend to disguise the parenthetic to appear as a continuous explanation of what God did but the reality of an inserted parenthetic of God’s Purpose-For-Creation is apparent none the less.", "What was Paul trying to tell us? Why did Paul insert this “mysterious” parenthetic after his 2:1 assertion that “you hath he quickened, who were dead in trespasses and sins” by being 2:8 “saved through a faith that is not of yourselves: that faith is God’s gracious gift” and before the 3:13ff continuation of teaching the behavior expected of “dead sinners” whom God “promises to gift with a Spiritual birth” that de facto inherits a Spiritual DNA which both “believeth in Him” as well as inherits “everlasting life”?", "My intrigue with Paul’s literature was heightened by discovering that Bible scholars are also conflicted about this parenthetic. I have never heard a Bible scholar exposit Ephesians 3:10 as if it literally reveals God’s Purpose-For-Creation. It really seems as if God has “mysteriously” withheld that “understanding” until the imminent scheduled “resurrection of the church.” That is to say that “understanding” God’s Purpose-For-Creation was “mysteriously” withheld from Bible scholars until just now. I naively assumed my new-found intrigue would also intrigue my family and friends. But they each preferred to “lean on” the sectarian “understandings” we previously learned from conflicted Bible scholars.", "My family, friends, and I had each been taught to believe the “sectarian understandings” of Bible scholars whose conflicted opinions about “the oracles of God” are evaluated in Romans 3:4 as being a “lie.” Some family and friends even suggested I was allowing myself to be influenced by the “lies” of fringe theological con artists or cult leaders.", "Perhaps you also are dedicated to the “sectarian understandings” of a Biblical scholar whom Scripture evaluates as “a liar.” My humble advice is to immediately convert to “Trust in the LORD with all thine heart; and lean not unto thine own understanding. In all thy ways acknowledge him, and he shall direct thy paths.” That’s a summary of the conclusion of this entire book.", "Nevertheless, I continued to be intrigued by Paul’s parenthesis.", "The verse that intrigued me most was Ephesians 3:10 where Paul asserts God’s philosophical Purpose Statement beginning with the KJV words “to the intent that …” The complete KJV translated Purpose Statement is “To the intent that, now unto the principalities and powers in heavenly places might be known BY THE CHURCH the manifold wisdom of God.”", "I admit my prior dependance on “sectarian understandings” made that text difficult to parse. However, even the best Bible scholars have the same difficulty. Publicly observable commentaries and pulpit messages reveal “conflicted understandings” (i.e., interpretations) of Ephesians 3:10.", "My 2nd hint that God had a mysterious purpose", "God later made me aware of Isaiah 6:9-10 when God commissioned Isaiah as a prophet with these “mysterious” preclusions: “Go, and tell this people, hear ye indeed, BUT UNDERSTAND NOT; and see ye indeed, BUT PERCEIVE NOT. Make the heart of this people fat, and make their ears heavy, and shut their eyes; LEST THEY SEE WITH THEIR EYES, AND HEAR WITH THEIR EARS, AND UNDERSTAND WITH THEIR HEART, AND CONVERT, AND BE HEALED.” Jesus essentially repeats these preclusions in Matthew 13:14.", "These “mysterious” preclusions immediately follow Isaiah’s 6:3 vision of “Seraphim” who cry “Holy, holy, holy, is the LORD of hosts: the whole earth is full of his glory.” However, “Seraphim” could not possibly know “the whole earth is full of his glory” unless “the whole earth” had already been re-created. Nevertheless, “the whole earth” has never been “full of his glory” since “the woman saw that the tree was good for food, and that it was pleasant to the eyes, and a tree to be desired to make one wise, she took of the fruit thereof, and did eat, and gave also unto her husband with her; and he did eat.”", "So, why did “Seraphim” conclude that “the whole earth is full of his glory”? The only answer is that both God and “Seraphim in the Heavenlies” can see future events such as “God’s gifting of redemption” which mere humans cannot see until those events have literally happened in sequential time-and-space.", "Nevertheless, the preclusions of Isaiah 6:9ff protect “predestined” events from statistical sabotage. For example, 1Corinthians 2:8 reports “none of the princes of this world knew: FOR HAD THEY KNOWN IT, they would not have crucified the Lord of glory.” That verse teaches that “before the foundation of the world” God had already guaranteed (i.e., “predestined”) the “crucifixion of the Lord of glory.”", "The point of this discussion is that the “crucifixion of the Lord of glory” was precluded from statistical sabotage by precluding the leadership of “God’s chosen people” from having “eyes to see and ears to hear” the critical importance of “the crucifixion” within God’s Purpose-For-Creation.", "That protection from sabotage was implemented by “the determinate counsel and foreknowledge” of a SOVEREIGN and OMNIPOTENT God.", "My 3rd hint that God had a mysterious purpose", "Luke 19:10 reports the time-and-space incarnation of “The Lamb of God who is come to seek and to save that which was lost.” John 3:16 reports “For God so loved the world, that he gave his only begotten Son, that whosoever believeth in him should not perish, but have everlasting life.” 2Peter 3:9 reports that “The Lord is not slack concerning his promise, as some men count slackness; but is longsuffering to us-ward, not willing that any should perish, but that all should come to repentance.” And Hebrews 6:18 reports it is “impossible for God to lie.”", "I observe those verses are used as proof-text by Bible scholars who “lean unto their own understanding” to teach the salvation of temporary and disposable humans is attained when “whosoever is dead in trespasses and sin” makes a volitional decision to “no longer be dead.”", "However, Romans 3:4 teaches “let God be true, but every man a liar; as it is written, that thou mightest be justified in thy sayings, and mightest overcome when thou art judged.” The phrase “when thou art judged” refers to God believing scholars who “lean unto their own understanding” about that which God really meant to say when Jesus declares in Matthew 16:18 “I will build my church.” Bible scholars incorrectly “lean to the judgement” that this declaration by Jesus along with Matthew 28:19-20 is a “Great Commission” to persuade those who are already “dead” to populate earthly churches that publicly “Trust” non-Biblically manufactured sectarian concepts such as “dead people making-a-decision to be everlastingly saved from death unto life.”", "Matthew 24:4-6 explains the reason Jesus “is building His church” when He warns “Take heed that no man deceives you. For many shall come in my name, saying, I am Christ; and shall deceive many. And ye shall hear of wars and rumors of wars: see that ye be not troubled: for all these things must come to pass, but the end is not yet.”", "Please affirm “Christ” is warning that “many who come in my name” will teach “deceptive understandings” as if those “understandings” are literally “Thus saith the LORD.” Each earthly church competes with rival earthly churches as well as competes with “the church being built by Jesus.”", "Without exception every “conflicted sectarian doctrine” is the outcome of “leaning unto thine own understanding.” “Conflicted sectarian doctrines” are never the outcome of expositing the Literature of “Thus saith the LORD.”", "Without exception every earthly church is established by a Biblical scholar who “deceitfully comes in my name” with the intent to religiously compete with rivals who are also “deceitful.”", "No thinking person can deny that sectarian conflict is always the outcome of Bible scholars intentionally rejecting “the unity of the faith.”", "Without exception Biblical context is ignored when “deceptive understandings” are being taught that a “good” God wants to “save everyone who is lost” simply because God is “not willing that any should perish, but that all should come to repentance.” If a “rightly divided” 2Peter 3:9 literally means that “God is not willing that any should perish without repentance” then God is “lying” to us because 2Peter repeatedly “reminds us” that many have already “perished.” The entire epistle of 2Peter is a “remembrance” of a “wrathful” God destroying “sinful” beings of whom some were actually human.", "The immediate context of 2Peter 3:9 is the “remembrance” that “scoffers” or “mockers” teach the “lie” that a “good and loving” God will never cause unbelievers to “perish” simply because “all things continue as they were from the beginning of the creation” (2Pet 3:4).", "Bible scholars who “lean unto their own understanding” tend to agree it is impossible for God to “lie.” Thus, it is intuitively obvious that the “scoffers” are literally conflicted Bible scholars whom Peter claims are “deceiving” modern Christians into “understanding a lie.”", "2Peter 3:9 is quoted by Bible scholars as proof-text that everyone has been enabled to “make a volitional decision to choose to be saved.” But that “lie” contradicts Peter’s purpose for the epistle as stated in 2Peter 1:10 “give diligence to make your calling and election sure.” Only those who are “called and elect” can “give diligence” with respect to God’s 2Peter 3:9 promise “that all who are called and elect will come to repentance before the end of time” – that promise is guaranteed by Creator God.", "Wisdom deficient Bible scholars tend to “deceitfully” ignore that “In the beginning God created the heaven and the earth” after which He destroyed “the earth” with a flood along with its entire human population except for Noah and his family. And they tend to ignore that God drowned Pharoah and his army in the Red Sea. And that same God commanded Joshua to kill all the men, women, and children who currently inhabited the promised land. It is intuitive that “GOD KILLING PEOPLE ALL THE TIME” contradicts the sectarian religious chant that “GOD IS GOOD ALL THE TIME.”", "That’s the reason Jesus warns His disciples that Bible scholars are being “deceptive” to the point of initiating “wars and rumors of wars” to defend their incorrect “understanding” that a “GOD IS GOOD ALL THE TIME” wants “whosoever is already dead to volitionally stop being dead.”", "Conflicted Bible scholars teach that a “good” God is like the fabled Genie who granted Aladdan’s wishes (search the web for “Aladdan and the lamp” to read about that fable). Bible scholars predict healing from physical suffering, healing from financial losses, and healing from everything else if we simply express our wishes to a Genie-like God by “praying without ceasing.” In other words, sectarians teach that repeated prayers convince God that He ought to answer at least some of those requests that we repeat every week.", "So, why does a “GOOD” God withhold Biblical “understanding” from all those Bible scholars who pray to a “Genie like god” to do that which the God of the Bible has already promised in Matthew 6:1-8 “your Father knoweth what things ye have need of before ye ask him” so “use not vain repetitions as the heathen.” In other words, God wants us to avoid using the same prayer list week after week until we finally convince an omniscient God to do something about the requests we prayed for last week.", "Sectarian Bible scholars ignore that a “GOOD” God is actually “Holy and righteous all the time.” It is linguistic reality that “goodness,” “Holiness,” and “righteousness” are linguistically impossible to devalue unless “the evil of sin” already exists. God immediately demonstrated the existence of “the evil of sin” by “predestining” Eve’s “sin before the foundation of the world.”", "The philosophical reality is that a demonstration of God’s “Holiness” to “the principalities and powers in the heavenlies” requires the cause-and-effect of “evil conflict” to be sequentially demonstrated by “CHURCHES.” My 4th hint that God had a mysterious purpose", "Scripture teaches that neither “evil” nor “death” exist “in the heavenlies” where God resides. Thus, if God expects “Seraphim” to intelligently “say Holy, holy, holy, is the LORD of hosts: the whole earth is full of his glory” they must be shown “God’s Holiness being opposed by evil as well as being opposed by death.”", "The evidence reported in Genesis 3 is irrefutable that God created “evil and death.” It is obvious that “the serpent which the Lord God had made” was divinely inserted into the Garden of Eden to be used by Satan. The reality is that the God whom sectarian scholars chant as being “good all the time” created an environment where “evil and death” could be demonstrated “to the intent that the principalities and powers in the heavenlies” could observe the cause-and-effect of Eve’s “sin” as well as observe Adam and Eve’s eventual “death from old age, and after that the judgement.”", "The “manifold wisdom of God” is summarized in John 3:7 “Marvel not that I said unto thee, Ye must be born again.” That summarization is based on the irrefutable axiom of John 3:6 “That which is born of the flesh is flesh; and that which is born of the Spirit is spirit.” John 3 teaches “a Spiritual rebirth financed by the slaying of the Lamb” which was “predestined from the foundation of the world.”", "Every “born of the flesh” descendant of Adam and Eve demonstrates “the evil of sin” simply because “all have sinned and come short of the Glory of God.” And each instance of “sin” is guaranteed to result in “death” simply because “it is appointed unto men once to die, but after this the judgment.”", "God’s plan is that a “Holy and manifoldly wise” God will “call and elect a few evil and spiritually dead” humans to be “born again of the Spirit to the intent that” God’s “Holiness” can be observed “in the heavenlies” by viewing an “earthly” comparison of the distinction between “good and evil.”", "“Predestined sinful behavior” guarantees the success of God’s plan so God wisely prevents any chance of statistical risk to His plan by causing God’s Purpose-For- Creation to be a “mystery” to “God’s chosen people” when He withholds “eyes to see and ears to hear” (Isa 6:9-10).", "Please also reference the context of Jeremiah 4:23 where God discusses His intentions for creation as if those intentions are the direct outcome of “the sinfulness of God’s chosen people and the way sin effects The Promised Land.” Every Old Testament prophet predicts God’s intentions to destroy except for the prophesies predicting the restoration of the glory of Israel. It is incredible to read that the land of Israel will again be “a land flowing with milk and honey” when today it looks like an arid desert covered with rocks and sand. God’s preclusion of “eyes to see and ears to hear” also applies to modern Bible scholars (Matt 11:25, 13:16). Bible scholars never exposit the Ephesians 3:3 “mystery” from a pulpit simply because they lack “eyes and ears to understand.” If God had given Jewish leadership “eyes to see and ears to hear” that Jesus was their “Messiah” they would never have crucified Him. Similarly, modern Bible scholars would never establish conflicted sectarian churches if God had given them “eyes to see and ears to hear and understand the mystery of God’s purpose for the church.” God- believers are precluded by “predestination” from accidentally sabotaging God’s demonstration to “the principalities and powers in the heavenlies” of the distinction between “good vs evil as well as life vs death.”", "That’s the same reason Jesus repeatedly charged “don’t tell anyone about this” to those whom He divinely forgave. Neither God nor Jesus want anyone or anything to sabotage the “predestined crucifixion of Jesus.”", "God’s withholding of “understanding” was only hinted in the Garden of Eden when God seemed to forget to teach Adam and Eve the distinction between “good and evil.” However, God’s hints were eventually made official when God commanded Isaiah “Go, and tell this people, hear ye indeed, but understand not; and see ye indeed, but perceive not …” (Isa 6:9-10). In other words, an omniscient God didn’t forget anything.", "“From the foundation of the world” humans have been precluded from having “eyes to see and ears to hear” that God created “evil” “to the intent that” God’s “Holiness” could be observed “by the principalities and powers in the heavenlies” (Eph 3:10) without any risk of statistical sabotage.", "God’s Purpose-For-Creation has always been a “mystery” (e.g., Matthew 13:13ff and 1Cor 2:8) but the “mystery” is finally revealed in AD60 by God’s “dispensation of grace” according to Ephesians 3:2-12.", "Tradition teaches AD 60 is when the Apostle Paul was inspired by God to write The Epistle to the Ephesian. God authorized Paul to give you and me initial “understanding” of “the mystery” simply because the education of “principalities and powers” is already initialized by the planned formation of “churches against which the gates of Hell cannot prevail.”", "The final completion of God’s Purpose is described in 2Peter 3:10 when God finally destroys everything that exists in “time-and-space.”", "Scripture is easily “understood” by anyone who has been given “eyes to see and ears to hear.” But pulpit conflict between sectarian religious leaders indicates “God’s gifting” is withheld from “many pastor teachers.” My 5th hint that God had a mysterious purpose", "“In the beginning God created the heaven and the earth” (Gen 1:1) “to the intent that now unto the principalities and powers in heavenly places might be known by the church the manifold wisdom of God” (Eph 3:10) “but the day of the Lord will come as a thief in the night; in the which the heavens shall pass away with a great noise, and the elements shall melt with fervent heat, the earth also and the works that are therein shall be burned up” (2Peter 3:10).", "That summarization of Scriptural statements reveals God’s Purpose-For- Creation from start to finish.", "The remainder of Scripture is simply a report of “What” God is doing to accomplish the “Why” of His Purpose. Intuitively, the “What” can be correctly “understood” only after the “Why” is known.", "It is conceivable that a sovereign God had additional reasons for creation but Ephesians 3:10 seems to be the only reason reported in the Literature of Scripture. God’s inspired revelation of “The Mystery” occurred about AD60 when tradition teaches the epistle to the Ephesians was inspired by God.", "A possible additional reason for God’s Purpose-For-Creation is the distinction between “Dispensational” and “Covenantal” theological interpretations of Scripture. For example, it is conceivable that the resurrection of “the church” merely ushers in the events described in Revelations 7 when the “hundred and forty four thousand from the tribes of the children of Israel” are described as having been “sealed as the servants of our God in their foreheads.”", "In other words, it is conceivable that both “Dispensational” and “Covenantal” interpretations of Scripture are True. But that’s beyond the scope of this book.", "The final hint that God had a mysterious purpose", "This is the hint that finally resolved all my intrigue about God’s Purpose-For- Creation. 1Corinthians 1:9-29 is conclusive that", "God is faithful, by whom ye were called unto the fellowship of his Son Jesus", "Christ our Lord … For it is written, I will destroy the wisdom of the wise and will bring", "to nothing the understanding of the prudent. Where is the wise? Where is the scribe?", "Where is the disputer of this world? Hath not God made foolish the wisdom of this", "world?", "For after that in the wisdom of God the world by wisdom knew not God, it pleased", "God by the foolishness of preaching to save them that believe. For the Jews require", "a sign, and the Greeks seek after wisdom. But we preach Christ crucified, unto the", "Jews a stumbling block, and unto the Greeks foolishness. But unto them which are called, both Jews and Greeks, Christ the power of God, and the wisdom of God.", "Because the foolishness of God is wiser than men; and the weakness of God is", "stronger than men.", "For ye see your calling, brethren, how that not many wise men after the flesh,", "not many mighty, not many noble, are called: But God hath chosen the foolish things", "of the world to confound the wise; and God hath chosen the weak things of the world", "to confound the things which are mighty. And base things of the world, and things", "which are despised, hath God chosen, yea, and things which are not, to bring to", "nought things that are. So that no flesh should glory in his presence.", "The point of this lengthy context is that God deliberately withholds “understanding” from the wisest and best educated Bible scholars “To the intent that now unto the principalities and powers in heavenly places might be known BY THE CHURCH the manifold wisdom of God.” This point is especially likely with respect to the distinction between “Dispensational” and “Covenantal” theological “understandings” of the best educated Bible scholars.", "Thus, my intrigue with Paul’s parenthetic in Ephesians 3:2-12 is resolved by simply “rightly dividing” God’s inspired Words to finally “understand” that the wisest and best Bible scholars cannot be trusted to explain God’s Words. Each wise and knowledgeable Biblical scholar is evaluated as a “liar” (Rom 3:4) and cannot be trusted.", "Only “called and elect” humans have been enabled to “rightly divide” God’s Words despite any educational attainment.", "The context of 1Corinthians 1:9-29 has similarity with the introduction to the Sermon on the Mount in Matthew 5:3-11 where Jesus teaches the so-called Beatitudes. Please affirm the Beatitudes literally refute “the wisdom of the wise.” In other words, Bible scholars are never characterized as being “poor in spirit,” “mournful,” “meek,” “hunger and thirst after righteousness,” “pure in heart,” “peacemakers,” or “persecuted.” Rather than being “humble” Bible scholars typically characterize themselves as having excellent academic credentials. It is only those who “were called unto the fellowship of his Son Jesus Christ our Lord” that are characterized by the Beatitudes described in Matthew 5:3-11.", "The “rightly divided Truth” teaches that “the manifold wisdom of God” is deliberately hidden from the wisest and best educated Bible scholars. The fact that “God hath chosen the weak things of the world to confound the things which are mighty” is the reason why only simple folk who are characterized by the Beatitudes can “Trust the LORD with all our heart.” I humbly suggest you ought to allow yourself to also become intrigued by God’s Purpose-For-Creation by a humble “study to show thyself approved unto God” by “rightly dividing the Word of Truth.”", "My purpose for writing this book is described in the Sub-Title of this book to encourage every pulpit preacher to humbly de-value every conflicted “understanding” you were taught in a sectarian approved Bible school by deliberately choosing to “Trust in the Lord with all your heart” so that “God will direct thy paths.” The Bereans in Acts 17:10-11 were complimented for exactly that kind of purposeful analysis. My humble prayer is for “pastor teachers” to reject every instance of pridefully “leaning unto your own theological understanding” and eliminate every absurd instance of Christian preaching that devalues Scripture from ever being heard from the pulpit in your own church.", "My caveat", "I am not aware of any Scriptural text that requires Christian preaching to be consistent with God’s Purpose-For-Creation. As a matter of fact, God’s Purpose Statement ACTUALLY REQUIRES SECTARIAN CONFLICT in order to demonstrate the distinction between
